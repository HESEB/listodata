name: Update Market Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write

jobs:
  build-market-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect public source status
        run: python scripts/collect_public_sources.py

      - name: Build market metrics
        run: python scripts/build_market_metrics.py

      - name: Commit updated metrics and source status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update market metrics and source status"
          file_pattern: app/data/market_metrics.json app/data/source_snapshots/fetch_status.json
