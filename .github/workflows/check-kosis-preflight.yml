name: Check KOSIS preflight

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-kosis-preflight
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build KOSIS preflight status
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python scripts/build_kosis_preflight_status.py

      - name: Commit preflight status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh KOSIS preflight status"
          file_pattern: app/data/admin/kosis_preflight_status.json app/data/analysis/kosis_preflight_status.json
