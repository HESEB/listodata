name: Check KOSIS approval JSON

on:
  workflow_dispatch:
  push:
    paths:
      - "app/data/admin/kosis_detail_approvals.json"
      - "app/data/admin/kosis_detail_research.json"
      - "app/data/config/kosis_approval_precheck_policy.json"
      - "scripts/validate_kosis_approval_json.py"

permissions:
  contents: write

concurrency:
  group: check-kosis-approval-json
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate KOSIS approval JSON
        run: python scripts/validate_kosis_approval_json.py

      - name: Commit approval precheck status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update KOSIS approval JSON precheck"
          file_pattern: app/data/admin/kosis_approval_precheck.json app/data/analysis/kosis_approval_precheck.json
