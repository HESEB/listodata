name: Diagnose KOSIS first run

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update market data"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: diagnose-kosis-first-run
  cancel-in-progress: true

jobs:
  diagnose:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Diagnose KOSIS first run
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python scripts/diagnose_kosis_first_run.py

      - name: Score and prioritize KOSIS candidates
        run: python scripts/score_kosis_candidates.py

      - name: Build KOSIS P1 batch review queue
        run: python scripts/build_kosis_p1_batch_review.py

      - name: Commit diagnostic and candidate review status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update KOSIS diagnosis and P1 review queue"
          file_pattern: app/data/admin/kosis_first_run_diagnostic.json app/data/analysis/kosis_first_run_diagnostic.json app/data/admin/kosis_candidate_quality.json app/data/analysis/kosis_candidate_quality.json app/data/admin/kosis_p1_batch_review.json app/data/analysis/kosis_p1_batch_review.json
