name: Update market data

on:
  workflow_dispatch:
  schedule:
    # Every hour at minute 20. GitHub uses UTC; site displays KST.
    - cron: "20 * * * *"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh market data JSON
        run: python scripts/update_market_data.py

      - name: Filter non-livestock false positives
        run: python scripts/filter_collected_news.py

      - name: Add common OTHER fallback
        run: python scripts/postprocess_dashboard_other.py

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh livestock market data"
          file_pattern: app/data/market_dashboard.json app/data/market_metrics.json app/data/events/events_news.json app/data/events/events_official.json app/data/update_status.json
