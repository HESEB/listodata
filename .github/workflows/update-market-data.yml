name: Update market data

on:
  workflow_dispatch:
  schedule:
    # Every hour at minute 20. GitHub uses UTC; site displays KST.
    - cron: "20 * * * *"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Snapshot fallback data
        run: python scripts/protect_fallback_data.py snapshot

      - name: Refresh market data JSON
        run: python scripts/update_market_data.py

      - name: Collect official metrics
        env:
          KOSIS_LIVESTOCK_API_URL: ${{ secrets.KOSIS_LIVESTOCK_API_URL }}
          DATA_GO_KR_LIVESTOCK_API_URL: ${{ secrets.DATA_GO_KR_LIVESTOCK_API_URL }}
          OFFICIAL_LIVESTOCK_CSV_URL: ${{ secrets.OFFICIAL_LIVESTOCK_CSV_URL }}
        run: python scripts/collect_official_metrics.py

      - name: Apply approved admin patches
        run: python scripts/apply_admin_patches.py

      - name: Filter non-livestock false positives
        run: python scripts/filter_collected_news.py

      - name: Build quality and score layers
        run: python scripts/build_quality_layers.py

      - name: Build classification review queue
        run: python scripts/build_classification_review.py

      - name: Enhance evidence chains
        run: python scripts/enhance_evidence_chains.py

      - name: Detect conflicts and hold decisions
        run: python scripts/detect_conflicts_and_holds.py

      - name: Enhance cross market matrix
        run: python scripts/enhance_cross_market_matrix.py

      - name: Update history and prediction
        run: python scripts/update_history_prediction.py

      - name: Enhance market memory
        run: python scripts/enhance_market_memory.py

      - name: Build case comparison
        run: python scripts/build_case_comparison.py

      - name: Add common OTHER fallback
        run: python scripts/postprocess_dashboard_other.py

      - name: Build admin change log
        run: python scripts/build_change_log.py

      - name: Check update stability
        run: python scripts/check_update_stability.py

      - name: Build version info
        run: python scripts/build_version_info.py

      - name: Verify fallback coverage
        run: python scripts/protect_fallback_data.py verify

      - name: Build quality alerts
        run: python scripts/build_quality_alerts.py

      - name: Build source health
        run: python scripts/build_source_health.py

      - name: Build freshness alerts
        run: python scripts/build_freshness_alerts.py

      - name: Build update history
        run: python scripts/build_update_history.py

      - name: Build operational readiness
        run: python scripts/build_operational_readiness.py

      - name: Validate official data layers
        run: python scripts/validate_official_data_layers.py

      - name: Commit refreshed data
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh livestock market data"
          file_pattern: app/data/market_dashboard.json app/data/market_metrics.json app/data/events/events_news.json app/data/events/events_official.json app/data/events/event_calendar.json app/data/update_status.json app/data/system/version.json app/data/raw/events_raw.json app/data/clean/events_clean.json app/data/clean/events_rejected.json app/data/analysis/evidence_scores.json app/data/analysis/evidence_chains.json app/data/analysis/cross_market_matrix.json app/data/analysis/conflict_report.json app/data/analysis/history_prediction.json app/data/analysis/market_memory.json app/data/analysis/case_comparison.json app/data/analysis/classification_review.json app/data/analysis/change_log.json app/data/analysis/update_stability.json app/data/analysis/fallback_status.json app/data/analysis/quality_alerts.json app/data/analysis/source_health.json app/data/analysis/freshness_alerts.json app/data/analysis/patch_status.json app/data/analysis/update_history.json app/data/analysis/operational_readiness.json app/data/analysis/official_data_structure.json app/data/analysis/official_data_collection.json app/data/history/signal_history.json app/data/display/market_dashboard_phase1.json app/data/admin/filter_dictionary.json app/data/admin/classification_overrides.json app/data/admin/patch_status.json app/data/admin/quality_report.json app/data/admin/conflict_report.json app/data/admin/cross_market_matrix.json app/data/admin/history_prediction.json app/data/admin/market_memory.json app/data/admin/case_comparison.json app/data/admin/classification_review.json app/data/admin/change_log.json app/data/admin/update_stability.json app/data/admin/fallback_status.json app/data/admin/quality_alerts.json app/data/admin/source_health.json app/data/admin/freshness_alerts.json app/data/admin/update_history.json app/data/admin/operational_readiness.json app/data/admin/official_data_structure.json app/data/admin/official_data_collection.json app/data/official/** app/data/fallback/**

      - name: Restore fallback data on failure
        if: failure()
        run: python scripts/protect_fallback_data.py restore

      - name: Commit restored fallback data
        if: failure()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: restore fallback livestock market data"
          file_pattern: app/data/market_dashboard.json app/data/market_metrics.json app/data/events/events_news.json app/data/events/events_official.json app/data/events/event_calendar.json app/data/update_status.json app/data/system/version.json app/data/raw/events_raw.json app/data/clean/events_clean.json app/data/clean/events_rejected.json app/data/analysis/evidence_scores.json app/data/analysis/evidence_chains.json app/data/analysis/cross_market_matrix.json app/data/analysis/conflict_report.json app/data/analysis/history_prediction.json app/data/analysis/market_memory.json app/data/analysis/case_comparison.json app/data/analysis/classification_review.json app/data/analysis/change_log.json app/data/analysis/update_stability.json app/data/analysis/fallback_status.json app/data/analysis/quality_alerts.json app/data/analysis/source_health.json app/data/analysis/freshness_alerts.json app/data/analysis/patch_status.json app/data/analysis/update_history.json app/data/analysis/operational_readiness.json app/data/analysis/official_data_structure.json app/data/analysis/official_data_collection.json app/data/history/signal_history.json app/data/display/market_dashboard_phase1.json app/data/admin/filter_dictionary.json app/data/admin/classification_overrides.json app/data/admin/patch_status.json app/data/admin/quality_report.json app/data/admin/conflict_report.json app/data/admin/cross_market_matrix.json app/data/admin/history_prediction.json app/data/admin/market_memory.json app/data/admin/case_comparison.json app/data/admin/classification_review.json app/data/admin/change_log.json app/data/admin/update_stability.json app/data/admin/fallback_status.json app/data/admin/quality_alerts.json app/data/admin/source_health.json app/data/admin/freshness_alerts.json app/data/admin/update_history.json app/data/admin/operational_readiness.json app/data/admin/official_data_structure.json app/data/admin/official_data_collection.json app/data/official/** app/data/fallback/**
