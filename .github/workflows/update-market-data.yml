name: Update market data

on:
  workflow_dispatch:
  schedule:
    # Every hour at minute 20. GitHub uses UTC; site displays KST.
    - cron: "20 * * * *"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Snapshot fallback data
        run: python scripts/protect_fallback_data.py snapshot

      - name: Refresh market data JSON
        run: python scripts/update_market_data.py

      - name: Collect KOSIS statistics-list candidates
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python scripts/collect_kosis_catalog_candidates.py

      - name: Collect KOSIS item and classification candidates
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python scripts/collect_kosis_detail_codes.py

      - name: Build KOSIS code research status
        run: python scripts/research_kosis_table_codes.py

      - name: Build approved KOSIS mapping
        run: python scripts/build_kosis_approved_mapping.py

      - name: Validate KOSIS table mappings
        run: python scripts/validate_kosis_table_mapping.py

      - name: Build KOSIS API URL templates
        run: python scripts/build_kosis_api_urls.py

      - name: Validate official API setup
        env:
          KOSIS_LIVESTOCK_INVENTORY_API_URL: ${{ secrets.KOSIS_LIVESTOCK_INVENTORY_API_URL }}
          KOSIS_LIVESTOCK_PRODUCTION_API_URL: ${{ secrets.KOSIS_LIVESTOCK_PRODUCTION_API_URL }}
          DATA_GO_KR_LIVESTOCK_MARKET_API_URL: ${{ secrets.DATA_GO_KR_LIVESTOCK_MARKET_API_URL }}
        run: python scripts/validate_official_api_setup.py

      - name: Snapshot KOSIS official data before runtime collection
        run: python scripts/snapshot_kosis_official_data.py

      - name: Collect real official source data
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          KOSIS_LIVESTOCK_INVENTORY_API_URL: ${{ secrets.KOSIS_LIVESTOCK_INVENTORY_API_URL }}
          KOSIS_LIVESTOCK_PRODUCTION_API_URL: ${{ secrets.KOSIS_LIVESTOCK_PRODUCTION_API_URL }}
          DATA_GO_KR_LIVESTOCK_MARKET_API_URL: ${{ secrets.DATA_GO_KR_LIVESTOCK_MARKET_API_URL }}
        run: python scripts/collect_real_official_sources.py

      - name: Validate KOSIS operational collection and legacy phaseout
        run: python scripts/validate_kosis_operational_collection.py

      - name: Validate KOSIS API key only runtime and auto rollback
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          KOSIS_LIVESTOCK_INVENTORY_API_URL: ${{ secrets.KOSIS_LIVESTOCK_INVENTORY_API_URL }}
          KOSIS_LIVESTOCK_PRODUCTION_API_URL: ${{ secrets.KOSIS_LIVESTOCK_PRODUCTION_API_URL }}
        run: python scripts/validate_kosis_single_key_runtime.py

      - name: Collect official metrics
        run: python scripts/collect_official_metrics.py

      - name: Apply approved admin patches
        run: python scripts/apply_admin_patches.py

      - name: Filter non-livestock false positives
        run: python scripts/filter_collected_news.py

      - name: Enrich original article publication dates
        run: python scripts/enrich_original_news_dates.py

      - name: Build quality and score layers
        run: python scripts/build_quality_layers.py

      - name: Build classification review queue
        run: python scripts/build_classification_review.py

      - name: Enhance evidence chains
        run: python scripts/enhance_evidence_chains.py

      - name: Detect conflicts and hold decisions
        run: python scripts/detect_conflicts_and_holds.py

      - name: Enhance cross market matrix
        run: python scripts/enhance_cross_market_matrix.py

      - name: Update history and prediction
        run: python scripts/update_history_prediction.py

      - name: Enhance market memory
        run: python scripts/enhance_market_memory.py

      - name: Build case comparison
        run: python scripts/build_case_comparison.py

      - name: Add common OTHER fallback
        run: python scripts/postprocess_dashboard_other.py

      - name: Build admin change log
        run: python scripts/build_change_log.py

      - name: Check update stability
        run: python scripts/check_update_stability.py

      - name: Build version info
        run: python scripts/build_version_info.py

      - name: Verify fallback coverage
        run: python scripts/protect_fallback_data.py verify

      - name: Build quality alerts
        run: python scripts/build_quality_alerts.py

      - name: Build source health
        run: python scripts/build_source_health.py

      - name: Build freshness alerts
        run: python scripts/build_freshness_alerts.py

      - name: Build update history
        run: python scripts/build_update_history.py

      - name: Build operational readiness
        run: python scripts/build_operational_readiness.py

      - name: Validate official data layers
        run: python scripts/validate_official_data_layers.py

      - name: Build official data quality
        run: python scripts/build_official_data_quality.py

      - name: Build Direction Engine 2.0
        run: python scripts/build_direction_engine_v2.py

      - name: Build Recommendation Engine
        run: python scripts/build_recommendation_engine.py

      - name: Build representative news and Context Filter v2
        run: python scripts/build_representative_news.py

      - name: Build representative news date estimates
        run: python scripts/build_news_date_estimates.py

      - name: Merge original-page date metadata into review
        run: python scripts/merge_original_date_estimates.py

      - name: Build Report Sentence Engine
        run: python scripts/build_report_sentences.py

      - name: Build Data First Dashboard
        run: python scripts/build_data_first_dashboard.py

      - name: Build Admin 2.0 Dashboard
        run: python scripts/build_admin2_dashboard.py

      - name: Validate Phase 8 final readiness
        run: python scripts/validate_phase8_readiness.py

      - name: Validate DSS 2.0 final readiness
        run: python scripts/validate_dss2_final.py

      - name: Commit refreshed data
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh livestock market data"
          file_pattern: app/data/**

      - name: Restore fallback data on failure
        if: failure()
        run: python scripts/protect_fallback_data.py restore

      - name: Commit restored fallback data
        if: failure()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: restore fallback livestock market data"
          file_pattern: app/data/**
