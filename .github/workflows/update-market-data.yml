name: Update market data

on:
  workflow_dispatch:
  schedule:
    # Every hour at minute 20. GitHub uses UTC; site displays KST.
    - cron: "20 * * * *"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh market data JSON
        run: python scripts/update_market_data.py

      - name: Filter non-livestock false positives
        run: python scripts/filter_collected_news.py

      - name: Build quality and score layers
        run: python scripts/build_quality_layers.py

      - name: Enhance evidence chains
        run: python scripts/enhance_evidence_chains.py

      - name: Detect conflicts and hold decisions
        run: python scripts/detect_conflicts_and_holds.py

      - name: Enhance cross market matrix
        run: python scripts/enhance_cross_market_matrix.py

      - name: Add common OTHER fallback
        run: python scripts/postprocess_dashboard_other.py

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh livestock market data"
          file_pattern: app/data/market_dashboard.json app/data/market_metrics.json app/data/events/events_news.json app/data/events/events_official.json app/data/update_status.json app/data/raw/events_raw.json app/data/clean/events_clean.json app/data/clean/events_rejected.json app/data/analysis/evidence_scores.json app/data/analysis/evidence_chains.json app/data/analysis/cross_market_matrix.json app/data/analysis/conflict_report.json app/data/display/market_dashboard_phase1.json app/data/admin/quality_report.json app/data/admin/conflict_report.json app/data/admin/cross_market_matrix.json
