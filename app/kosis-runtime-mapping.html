<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOSIS 운영 매핑 실행 상태 | HESEB</title>
<style>
:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{border-bottom:1px solid var(--line);background:rgba(245,250,252,.95);position:sticky;top:0;z-index:5}.top,main{max-width:1120px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.55}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--text);background:#fff;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:820}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(5,1fr)}.kpi{font-size:26px;font-weight:820}.row{border-top:1px solid var(--line);padding-top:11px;margin-top:11px}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.empty{padding:20px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:16px}@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}
</style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>KOSIS 운영 매핑 실행 상태</h1><div class="sub">운영 승격본이 URL 생성·공식데이터 수집 경로에서 실제로 사용되는지 확인합니다.</div></div><div><a class="btn" href="./kosis-mapping-promotion.html">운영 승격</a> <a class="btn" href="./real-official-sources.html">공식데이터 연결</a> <a class="btn" href="./admin2-dashboard.html">Admin 2.0</a></div></div></div></header>
<main>
<div class="hero"><div><div class="sub">Phase 9-6</div><div class="headline" id="headline">상태를 불러오는 중...</div><div class="sub" id="updated"></div></div></div>
<section class="grid kpis" id="kpis"></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">실행 경로</h2><div class="sub" id="route" style="margin-top:8px"></div></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">KOSIS 소스별 상태</h2><div id="sources" style="margin-top:10px"><div class="empty">불러오는 중...</div></div></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">보안 기준</h2><div class="sub" style="margin-top:8px">KOSIS_API_KEY와 완성된 실행 URL은 메모리에서만 사용합니다. 상태 JSON과 GitHub Pages에는 인증키·쿼리 URL을 저장하지 않습니다.</div></section>
</main>
<script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
(async()=>{try{const r=await fetch('./data/admin/kosis_runtime_mapping_status.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{},active=s.status==='active';$('headline').textContent=active?'운영 매핑이 실제 수집 경로에서 활성화되었습니다.':'운영 승격 전 fallback 경로를 사용 중입니다.';$('updated').textContent=`갱신 ${d.updated_at||'Actions 실행 전'} · 매핑 ${s.mapping_source||'-'} · 승격 ${s.promotion_status||'-'}`;$('kpis').innerHTML=[['실행 상태',s.status||'-'],['런타임 URL',s.runtime_url_count||0],['KOSIS 소스',s.kosis_source_count||0],['수집 성공',s.successful_kosis_source_count||0],['Fallback',s.fallback_used?'사용':'미사용']].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');$('route').innerHTML=active?'<span class="badge good">operational</span> 운영 매핑 + KOSIS_API_KEY → 실행 URL 메모리 생성 → 공식데이터 수집':'<span class="badge warn">fallback</span> 운영 매핑 미승격 → 기존 Secret URL 경로 유지';const rows=Array.isArray(d.sources)?d.sources:[];$('sources').innerHTML=rows.length?rows.map(x=>`<div class="row"><b>${esc(x.source_id||'-')}</b> <span class="badge ${x.status==='success'?'good':x.status==='failed'?'bad':'warn'}">${esc(x.status||'-')}</span><div class="sub">${esc(x.endpoint_mode||'-')} · ${esc(x.mapping_source||'-')} · ${esc(x.message||'')}</div></div>`).join(''):'<div class="empty">다음 Actions 실행 후 소스별 상태가 표시됩니다.</div>';}catch(e){$('headline').textContent='상태 파일을 불러오지 못했습니다.';$('sources').innerHTML='<div class="empty">GitHub Pages 반영 후 다시 확인하세요.</div>';}})();
</script>
</body>
</html>
