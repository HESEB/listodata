<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phase 9 최종검증 · 운영 전환 체크리스트</title>
<style>
:root{font-family:Arial,"Noto Sans KR",sans-serif;color:#182231;background:#f4f7fb}body{margin:0}.wrap{max-width:1100px;margin:auto;padding:28px 18px 60px}.hero,.card{background:#fff;border:1px solid #dfe6ef;border-radius:22px;box-shadow:0 12px 30px rgba(25,40,60,.07)}.hero{padding:26px}.hero h1{margin:0 0 8px;font-size:28px}.muted{color:#657388;font-size:13px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-top:18px}.metric{padding:15px;border-radius:16px;background:#f7f9fc;border:1px solid #e4eaf1}.metric b{display:block;font-size:22px;margin-top:5px}.card{margin-top:14px;padding:20px}.check{display:grid;grid-template-columns:110px 1fr;gap:12px;padding:14px 0;border-bottom:1px solid #edf1f5}.check:last-child{border:0}.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:6px 10px;font-weight:700;font-size:12px}.pass{background:#dff7e8;color:#17643b}.fail{background:#fff0d7;color:#815200}.optional{background:#e8efff;color:#31518b}.steps{counter-reset:step;display:grid;gap:8px}.step{padding:11px 13px;border-radius:14px;background:#f7f9fc}.step:before{counter-increment:step;content:counter(step);display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:#253b59;color:#fff;margin-right:9px;font-size:12px}a{color:#315b9e}.status-ready{color:#16804c}.status-limited{color:#9a6300}.status-setup_required{color:#a53f3f}@media(max-width:650px){.check{grid-template-columns:1fr}}
</style>
</head>
<body><main class="wrap">
<section class="hero"><div class="muted">HESEB DSS 2.0 · Phase 9</div><h1>최종검증 · 운영 전환 체크리스트</h1><p class="muted">KOSIS 코드 조사부터 단독키 수집과 자동 롤백까지 실제 운영 준비도를 분리 판정합니다.</p><div id="summary" class="summary"></div></section>
<section class="card"><h2>검증 항목</h2><div id="checks"><p class="muted">상태 불러오는 중…</p></div></section>
<section class="card"><h2>운영 전환 순서</h2><div id="steps" class="steps"></div></section>
<section class="card"><h2>판정 의미</h2><p><b>ready</b> — 운영 매핑 승격과 단독키 연속 성공까지 완료</p><p><b>limited</b> — 구조는 완료됐지만 승인·실행 표본 검증 중</p><p><b>setup_required</b> — 인증키 등록, 후보 승인 또는 운영 승격 필요</p><p class="muted">Secret 값과 인증 URL은 이 화면에 표시되지 않습니다.</p></section>
</main>
<script>
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
fetch('./data/admin/phase9_readiness.json?ts='+Date.now()).then(r=>r.json()).then(d=>{
 const s=d.summary||{};
 document.getElementById('summary').innerHTML=`<div class="metric">최종 상태<b class="status-${esc(s.status)}">${esc(s.status)}</b></div><div class="metric">판정<b>${esc(s.verdict)}</b></div><div class="metric">필수 통과<b>${esc(s.passed_required_check_count)} / ${esc(s.required_check_count)}</b></div><div class="metric">운영 매핑<b>${s.operational_mapping_promoted?'승격':'미승격'}</b></div><div class="metric">단독키 운영<b>${s.single_key_ready?'READY':'대기'}</b></div>`;
 const rows=d.checks||[];
 document.getElementById('checks').innerHTML=rows.length?rows.map(x=>`<div class="check"><div><span class="badge ${x.passed?'pass':(x.required?'fail':'optional')}">${x.passed?'PASS':(x.required?'ACTION':'OPTION')}</span></div><div><b>${esc(x.label)}</b><div class="muted">현재: ${esc(x.status)}</div>${x.passed?'':`<div>다음 작업: ${esc(x.next_action)}</div>`}</div></div>`).join(''):'<p class="muted">첫 Actions 실행 후 상세 체크리스트가 생성됩니다.</p>';
 document.getElementById('steps').innerHTML=(d.transition_order||[]).map(x=>`<div class="step">${esc(x)}</div>`).join('');
}).catch(e=>{document.getElementById('checks').innerHTML='<p>상태 JSON을 불러오지 못했습니다. 잠시 뒤 새로고침하세요.</p>'});
</script></body></html>
