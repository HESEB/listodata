<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 10 최종 실행검증 | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}.top,main{max-width:1240px;margin:auto;padding:14px}header{position:sticky;top:0;background:rgba(245,250,252,.96);border-bottom:1px solid var(--line);z-index:5}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(5,1fr)}@media(max-width:850px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:27px;font-weight:820}.row{border-top:1px solid var(--line);padding:12px 0}.row:first-child{border-top:0}.head{display:flex;justify-content:space-between;gap:10px}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.empty{padding:20px;text-align:center;border:1px dashed var(--line);border-radius:16px;color:var(--sub)}.next{font-weight:750;margin-top:5px}</style></head><body><header><div class="top"><div class="brand"><div><h1>Phase 10 최종 실행검증</h1><div class="sub">설정·후보·승인·Dry Run·운영 승격·첫 수집·이상치 검수를 한 화면에서 확인합니다.</div></div><div><a class="btn" href="./kosis-preflight-guide.html">설정 가이드</a> <a class="btn" href="./kosis-dry-run.html">Dry Run</a> <a class="btn" href="./kosis-first-collection-anomalies.html">이상치 검수</a></div></div></div></header><main><div class="hero"><div><div class="sub">Phase 10 Final</div><div class="headline">현재 막힌 첫 단계와 다음 행동을 바로 확인</div><div id="updated" class="sub">불러오는 중...</div><div id="next" class="next"></div></div></div><section id="kpis" class="grid kpis"></section><section class="card" style="margin-top:12px"><h2 style="margin-top:0">전체 단계</h2><div id="stages"></div></section></main><script>const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));function c(x){return x.passed?'good':x.blocked?'bad':'warn'}fetch('./data/admin/phase10_final_validation.json?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>{const s=d.summary||{};$('updated').textContent=`${d.updated_at||'-'} · ${s.status||'-'}`;$('next').textContent='다음 조치: '+(d.next_action||'-');$('kpis').innerHTML=[['완료 단계',s.passed_stage_count||0],['남은 단계',s.remaining_stage_count||0],['승인 지표',s.approved_metric_count||0],['Dry Run',s.dry_run_passed?'통과':'대기'],['운영 수집',s.successful_kosis_source_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');$('stages').innerHTML=(d.stages||[]).map((x,i)=>`<div class="row"><div class="head"><div><b>${i+1}. ${esc(x.stage)}</b><div class="sub">${esc(x.status)}</div></div><span class="badge ${c(x)}">${x.passed?'완료':x.blocked?'차단':'진행 필요'}</span></div><div class="sub">${esc(x.next_action||'')}</div></div>`).join('')||'<div class="empty">최종 검증 Workflow 실행 후 표시됩니다.</div>'}).catch(()=>{$('updated').textContent='상태를 불러오지 못했습니다.';$('stages').innerHTML='<div class="empty">Workflow 실행 후 확인하세요.</div>'});</script></body></html>
