<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Official Data Structure | HESEB DSS 2.0</title>
  <style>
    :root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.66);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}.top,main{max-width:1120px;margin:0 auto;padding:14px}header{position:sticky;top:0;background:rgba(245,250,252,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:10}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:18px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero,.card{border:1px solid var(--line);background:var(--card);border-radius:22px;padding:16px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.hero{background:linear-gradient(145deg,rgba(241,133,174,.18),rgba(107,178,255,.18));margin-bottom:14px}.headline{font-size:25px;font-weight:820}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}.kpi{font-size:28px;font-weight:850}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;font-size:11px;border:1px solid var(--line)}.ready,.ok{color:var(--good);background:rgba(22,138,91,.08)}.warning{color:var(--warn);background:rgba(193,138,24,.09)}.critical{color:var(--bad);background:rgba(217,60,97,.08)}.row{border-top:1px solid var(--line);padding:9px 0}.row:first-child{border-top:0}.mono{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:#263b72}.empty{padding:20px;text-align:center;color:var(--sub)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Official Data Structure</h1><div class="sub">Phase 7-1 공식 데이터 스키마·저장계층</div></div><div><a class="btn" href="./phase7-design.html">Phase 7 설계</a> <a class="btn" href="./admin.html">Admin</a></div></div></div></header>
<main>
  <section class="hero"><div class="sub">DSS 2.0 Data First</div><div class="headline">Raw → Clean → Snapshot → History</div><div class="sub" id="updated">구조 검증 결과를 불러오는 중...</div></section>
  <section class="grid kpis" id="kpis"></section>
  <section class="grid cols" style="margin-top:12px"><article class="card"><h2>저장계층</h2><div id="layers"></div></article><article class="card"><h2>축종별 필수지표</h2><div id="species"></div></article></section>
  <section class="card" style="margin-top:12px"><h2>검증 결과</h2><div id="checks"></div></section>
</main>
<script>
const PATH='./data/admin/official_data_structure.json';const $=id=>document.getElementById(id);const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function init(){try{const r=await fetch(PATH+'?t='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(r.status);const d=await r.json();const s=d.summary||{};$('updated').textContent='갱신 '+(d.updated_at||'-')+' · '+(d.notice||'');const k=[['상태',s.label],['카탈로그 지표',s.catalog_metric_count],['축종',s.species_count],['저장계층',s.layer_count],['현재 레코드',s.record_count],['오류',s.critical_count]];$('kpis').innerHTML=k.map(x=>`<article class="card"><div class="sub">${esc(x[0])}</div><div class="kpi">${esc(x[1]??0)}</div></article>`).join('');$('layers').innerHTML=Object.entries(d.layers||{}).map(([k,v])=>`<div class="row"><b>${esc(k)}</b> <span class="badge ${esc(v.status)}">${esc(v.status)}</span><div class="sub mono">${esc(v.path)}</div><div class="sub">records ${esc(v.record_count)}</div></div>`).join('');$('species').innerHTML=Object.entries(d.species_required_metrics||{}).map(([k,v])=>`<div class="row"><b>${esc(k)}</b><span style="float:right">${esc(v)}개 지표</span></div>`).join('');$('checks').innerHTML=(d.checks||[]).map(x=>`<div class="row"><span class="badge ${esc(x.status)}">${esc(x.status)}</span> <b>${esc(x.id)}</b><div class="sub">${esc(x.message)}</div></div>`).join('');}catch(e){$('checks').innerHTML='<div class="empty">다음 자동 업데이트 실행 후 검증 결과가 생성됩니다.</div>';}}
init();
</script>
</body>
</html>
