<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Report | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--up:#d93c61;--down:#2474d8;--flat:#c18a18;--good:#168a5b}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.btn.primary{background:linear-gradient(90deg,rgba(241,133,174,.22),rgba(107,178,255,.20));font-weight:760}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick a{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:999px;padding:6px 9px;text-decoration:none;color:var(--text)}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(270px,1fr))}.layout{grid-template-columns:360px 1fr}@media(max-width:980px){.layout{grid-template-columns:1fr}}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.up{color:var(--up);background:rgba(217,60,97,.08)}.badge.down{color:var(--down);background:rgba(36,116,216,.08)}.badge.hold{color:#777;background:rgba(0,0,0,.05)}.badge.neutral{color:var(--flat);background:rgba(193,138,24,.09)}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}.mini{border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:16px;padding:11px}.mini b{font-size:13px}.mini .s{font-size:12px;color:var(--sub);line-height:1.45;margin-top:5px}.pre{white-space:pre-wrap;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;font-size:13px;line-height:1.68;background:rgba(255,255,255,.90);border:1px solid var(--line);border-radius:18px;padding:16px;min-height:620px}.note{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media print{header,.hero,.toolbar,.note,.side{display:none!important}body{background:white}.card,.pre{box-shadow:none;border:0}.top,main{max-width:none;padding:0}.layout{display:block}.pre{font-size:12px;line-height:1.6}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Weekly Report</h1><div class="sub">주간 축산 시황 보고서 자동 생성</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./reasoning.html">종합근거</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 4-8</div><div class="headline">주간 시황 보고서</div><div class="sub" id="updatedAt">분석 데이터를 불러오는 중...</div><div class="quick"><a href="./score-engine.html">점수근거</a><a href="./evidence-chain.html">근거체인</a><a href="./conflict-report.html">충돌검수</a><a href="./history-prediction.html">추세검수</a><a href="./case-comparison.html">사례비교</a></div></div></div>
  <section class="grid layout">
    <aside class="side grid">
      <div class="card"><h2>보고서 작업</h2><div class="sub" style="margin-top:6px">자동 생성 초안을 복사해 주간 시황 보고에 활용합니다.</div><div class="toolbar"><button class="btn primary" id="copyBtn">보고서 복사</button><button class="btn" id="downloadBtn">TXT 다운로드</button><button class="btn" id="printBtn">인쇄</button><button class="btn" id="refreshBtn">새로고침</button></div></div>
      <div class="card"><h2>축종별 신호</h2><div class="grid" id="speciesCards" style="margin-top:10px"><div class="empty">불러오는 중...</div></div></div>
      <div class="note">자동 생성 초안입니다. 최종 보고 전 공식 가격·도축·질병 자료 및 협력사 견적을 확인하세요.</div>
    </aside>
    <section class="card"><h2>보고서 본문</h2><div class="sub" style="margin-top:6px">팀장님 보고 스타일에 맞춰 배경 → 근거 → 구매 검토 순서로 구성합니다.</div><div class="pre" id="reportText">불러오는 중...</div></section>
  </section>
</main>
<script>
const PATHS={scores:'./data/analysis/evidence_scores.json',chains:'./data/analysis/evidence_chains.json',history:'./data/analysis/history_prediction.json',conflicts:'./data/analysis/conflict_report.json',cross:'./data/analysis/cross_market_matrix.json'};
const ORDER=['BEEF','PORK','POULTRY','DUCK','EGG','OTHER'];
const LABEL={BEEF:'한우',PORK:'돈육',POULTRY:'계육',DUCK:'오리',EGG:'계란',OTHER:'공통'};
const AXIS={price:'가격',supply:'수급/도축',disease:'질병/방역',policy:'정책/고시',news:'뉴스/수요'};
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let REPORT='';
async function fetchJSON(url){const r=await fetch(url+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(url);return r.json();}
function todayKST(){try{return new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).format(new Date());}catch(e){return new Date().toISOString().slice(0,10);}}
function statusWord(s){const d=s?.direction;if(d==='hold')return '판단 유보';if(d==='up')return s.status||'상방 가능성';if(d==='down')return s.status||'하방 가능성';return s?.status||'보합/혼조';}
function badgeClass(d){return d==='up'?'up':d==='down'?'down':d==='hold'?'hold':'neutral';}
function topAxes(s){const b=s?.score_breakdown||{};return Object.entries(b).sort((a,b)=>Number(b[1])-Number(a[1])).filter(x=>Number(x[1])>0).slice(0,3).map(([k,v])=>`${AXIS[k]||k} ${v}점`);}
function trendText(p){const v=p?.prediction;if(!v)return '추세 데이터 누적 중';return `${v.label||'보합/혼조'}(${v.confidence||0}점)`;}
function actionText(code,chain,score){if(chain?.purchase_action)return chain.purchase_action;const d=score?.direction||'hold';const map={BEEF:{up:'정육류 비축 또는 고정가 협의 검토',neutral:'명절·행사 물량 중심 선별 매입 검토',down:'필요 물량 중심 운영 검토',hold:'공식 가격·도축 자료 추가 확인'},PORK:{up:'후지·등심 등 하부위 비축/견적 재점검',neutral:'부위별 수요와 냉동재고 확인 후 분할 매입 검토',down:'가격 하락 확인 후 집행 검토',hold:'ASF·도축·가격 공식자료 추가 확인'},POULTRY:{up:'가슴살·안심·조각정육 단기 확보 검토',neutral:'도계량과 성수기 수요 확인 후 분할 확보 검토',down:'고정계약 물량 중심 운영 및 추가매입 보류 검토',hold:'도계량·AI 공식자료 추가 확인'},DUCK:{up:'행사물량 중심 견적 재확인 및 대체처 확보 검토',neutral:'행사수요·AI·도축량 확인 후 필요 물량 운영 검토',down:'확정 행사 물량 중심 운영 검토',hold:'오리 도축·AI 자료 보강 후 판단'},EGG:{up:'계란 가격·산란계·AI 이슈 확인 후 원가 영향 점검',neutral:'가격안정 정책과 산란계 흐름 관찰',down:'가격 안정 여부 확인 후 반영 검토',hold:'계란 가격·산란계 자료 추가 확인'},OTHER:{up:'공통 변수의 축종별 전이 가능성 확인',neutral:'수입·환율·사료·물류 보조지표 관찰',down:'공통 하방 요인 반영 여부 확인',hold:'공통자료 보강 후 판단'}};return (map[code]||map.OTHER)[d]||'추가 확인 필요';}
function reasonText(score,chain){let reason=score?.reason||chain?.reason||topAxes(score).join(' + ')||'유효 근거 부족';const hold=score?.hold_decision;if(hold?.should_hold)reason+=` / 판단유보 사유: ${(hold.reasons||[]).join(', ')}`;if(score?.conflict?.has_conflict)reason+=` / 충돌축: ${(score.conflict.axes||[]).join(', ')}`;return reason;}
function sentence(code,score,chain,hist){const name=LABEL[code]||code;const axes=topAxes(score).join(', ')||'근거 축 누적 중';return `[${name}]\n${name}은 ${axes} 근거를 기준으로 ${statusWord(score)} 신호 확인.\n- 판단근거: ${reasonText(score,chain)}\n- 신뢰도/커버리지: ${score?.confidence_score||0}점 / ${score?.coverage_rate||0}%\n- 추세참고: ${trendText(hist)}\n- 구매 검토: ${actionText(code,chain,score)}\n`;}
function summary(scores){const valid=safeArray(scores).filter(s=>s.id!=='OTHER');const up=valid.filter(s=>s.direction==='up').map(s=>s.name);const down=valid.filter(s=>s.direction==='down').map(s=>s.name);const hold=valid.filter(s=>s.direction==='hold').map(s=>s.name);const parts=[];if(up.length)parts.push(`${up.join('·')} 상방 가능성`);if(down.length)parts.push(`${down.join('·')} 하방 가능성`);if(hold.length)parts.push(`${hold.join('·')} 판단 유보`);return parts.length?parts.join(', '):'축종별 시황은 보합/혼조 중심으로 관찰 필요';}
function crossSummary(cross){const items=safeArray(cross?.items).slice().sort((a,b)=>Math.abs(Number(b.strength)||0)-Math.abs(Number(a.strength)||0)).slice(0,3);if(!items.length)return '축종 간 전이 영향은 추가 데이터 누적 필요';return items.map(x=>`${x.from_name}→${x.to_name} ${x.effect}(${x.strength})`).join(' / ');}
function build(data){const scores=safeArray(data.scores.species);const chain=Object.fromEntries(safeArray(data.chains.items).map(x=>[x.id,x]));const hist=Object.fromEntries(safeArray(data.history.items).map(x=>[x.id,x]));const lines=[];lines.push('[주간 축산 시황 보고서 초안]');lines.push(`작성기준: ${todayKST()}`);lines.push('');lines.push('■ 종합 판단');lines.push(`- ${summary(scores)}`);lines.push(`- 축종 간 영향: ${crossSummary(data.cross)}`);lines.push('- 본 보고서는 자동수집 공개자료 기반 참고 초안이며, 최종 보고 전 공식 지표 및 업체 견적 확인 필요.');lines.push('');lines.push('■ 축종별 시황 및 구매 검토');ORDER.filter(x=>x!=='OTHER').forEach(code=>{const score=scores.find(s=>s.id===code)||{id:code,name:LABEL[code],direction:'hold'};lines.push(sentence(code,score,chain[code],hist[code]));});const other=scores.find(s=>s.id==='OTHER');if(other){lines.push('[공통 변수]');lines.push(`수입·환율·사료·물류·정책 등 공통 변수는 ${statusWord(other)} 수준으로 관찰 필요.`);lines.push(`- 판단근거: ${reasonText(other,chain.OTHER)}`);lines.push('');}lines.push('■ 확인 필요사항');lines.push('- 가격 기준 데이터와 도축·도계량 공식자료 업데이트 여부 확인');lines.push('- 질병·방역 이슈 발생 시 이동제한 및 공급차질 영향 재점검');lines.push('- 행사/명절/성수기 운영 물량은 협력사 견적과 재고 현황 병행 검토');return lines.join('\n');}
function renderSpecies(scores){$('speciesCards').innerHTML=safeArray(scores).filter(s=>s.id!=='OTHER').map(s=>`<div class="mini"><b>${esc(s.name||LABEL[s.id]||s.id)}</b><div class="s"><span class="badge ${badgeClass(s.direction)}">${esc(statusWord(s))}</span> <span class="badge">${esc(s.signal_score||0)}점</span> <span class="badge">신뢰도 ${esc(s.confidence_score||0)}</span></div><div class="s">${esc(topAxes(s).join(' · ')||'근거 누적 중')}</div></div>`).join('')||'<div class="empty">축종 신호 없음</div>';}
async function load(){try{const [scores,chains,history,conflicts,cross]=await Promise.all([fetchJSON(PATHS.scores),fetchJSON(PATHS.chains),fetchJSON(PATHS.history).catch(()=>({items:[]})),fetchJSON(PATHS.conflicts).catch(()=>({species:[]})),fetchJSON(PATHS.cross).catch(()=>({items:[]}))]);const data={scores,chains,history,conflicts,cross};REPORT=build(data);$('reportText').textContent=REPORT;renderSpecies(scores.species);$('updatedAt').textContent='갱신 '+(scores.updated_at||new Date().toISOString())+' · report_page_v1';}catch(e){console.error(e);$('reportText').textContent='보고서 데이터를 불러오지 못했습니다. 자동 업데이트 후 다시 확인하세요.';}}
function download(){const blob=new Blob([REPORT+'\n'],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='weekly_livestock_market_report.txt';a.click();URL.revokeObjectURL(url);}
$('copyBtn').onclick=async()=>{await navigator.clipboard.writeText(REPORT);$('copyBtn').textContent='복사 완료';setTimeout(()=>$('copyBtn').textContent='보고서 복사',1200);};$('downloadBtn').onclick=download;$('printBtn').onclick=()=>window.print();$('refreshBtn').onclick=load;load();
</script>
</body>
</html>
