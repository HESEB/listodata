<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Update Stability | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.ok,.badge.stable{color:var(--good);background:rgba(22,138,91,.08)}.badge.warn,.badge.watch{color:var(--warn);background:rgba(193,138,24,.09)}.badge.fail,.badge.risk{color:var(--bad);background:rgba(217,60,97,.08)}.badge.blue{color:var(--blue);background:rgba(36,116,216,.08)}.bar{height:9px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#F185AE,#F8B871,#A573ED,#6BB2FF)}.row{border-top:1px solid var(--line);padding:10px 0}.row:first-child{border-top:0}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:#263b72}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.82);cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.20),rgba(107,178,255,.18));font-weight:760}.panel{display:none}.panel.active{display:block}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Update Stability</h1><div class="sub">자동 업데이트 안정성 점검</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./change-log.html">변경로그</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 6-1</div><div class="headline">데이터 업데이트 안정성 점검</div><div class="sub" id="updatedAt">점검 리포트를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <section class="card" style="margin-top:12px"><h2>안정성 점수</h2><div class="kpi" id="score">-</div><div class="bar"><i id="scoreBar" style="width:0%"></i></div><div class="chips" id="summaryChips"></div></section>
  <div class="tabs"><button class="tab active" data-panel="files">파일 점검</button><button class="tab" data-panel="workflow">Workflow</button><button class="tab" data-panel="recommendations">권장조치</button></div>
  <section id="panel-files" class="panel active"><div class="grid cols" id="fileCards"><div class="empty">불러오는 중...</div></div></section>
  <section id="panel-workflow" class="panel"><div class="card"><h2>Workflow 점검</h2><div id="workflowBox"><div class="empty">불러오는 중...</div></div></div></section>
  <section id="panel-recommendations" class="panel"><div class="card"><h2>권장조치</h2><div id="recommendations"><div class="empty">불러오는 중...</div></div></div></section>
</main>
<script>
const PATH='./data/admin/update_stability.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['전체파일',s.total_files||0],['정상',s.ok_count||0],['주의',s.warn_count||0],['실패',s.fail_count||0],['누락',s.missing_count||0],['파싱오류',s.parse_fail_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function renderSummary(s){$('score').innerHTML=`${esc(s.stability_score||0)}점 <span class="badge ${esc(s.stability_grade||'watch')}">${esc(s.stability_label||'주의')}</span>`;$('scoreBar').style.width=Math.max(0,Math.min(100,Number(s.stability_score)||0))+'%';$('summaryChips').innerHTML=`<span class="chip">workflow ${esc(s.workflow_status||'-')}</span><span class="chip">ok ${esc(s.ok_count||0)}</span><span class="chip">warn ${esc(s.warn_count||0)}</span><span class="chip">fail ${esc(s.fail_count||0)}</span>`;}
function renderFile(x){return `<article class="card"><div><span class="badge ${esc(x.status)}">${esc(x.status)}</span> <span class="badge ${x.parse_ok?'ok':'fail'}">JSON ${x.parse_ok?'OK':'FAIL'}</span> <span class="badge ${x.exists?'ok':'fail'}">${x.exists?'존재':'누락'}</span></div><h2 style="margin-top:8px">${esc(x.label)}</h2><div class="small mono">${esc(x.path)}</div><div class="chips"><span class="chip">건수 ${esc(x.count??'-')}</span><span class="chip">크기 ${esc(x.size_bytes||0)}B</span><span class="chip">갱신 ${esc(x.updated_at||'-')}</span><span class="chip">정책 ${esc(x.policy||'-')}</span></div>${safeArray(x.issues).length?`<div class="small" style="margin-top:8px;color:#d93c61">${esc(x.issues.join(' / '))}</div>`:''}</article>`;}
function renderWorkflow(w){$('workflowBox').innerHTML=`<div><span class="badge ${esc(w.status)}">${esc(w.status)}</span> <span class="badge ${w.order_ok?'ok':'warn'}">순서 ${w.order_ok?'OK':'확인'}</span> <span class="badge ${w.stability_output_in_commit_pattern?'ok':'warn'}">커밋패턴 ${w.stability_output_in_commit_pattern?'포함':'누락'}</span></div><div class="small mono" style="margin-top:8px">${esc(w.path||'')}</div>${safeArray(w.missing_steps).length?`<div class="small" style="margin-top:8px;color:#d93c61">누락 단계: ${esc(w.missing_steps.join(', '))}</div>`:''}<div class="row"></div>${safeArray(w.steps).map(s=>`<div class="row"><span class="badge ${s.found?'ok':'fail'}">${s.found?'found':'missing'}</span> <span class="mono">${esc(s.script)}</span></div>`).join('')}`;}
function renderRecommendations(rows){$('recommendations').innerHTML=safeArray(rows).map(x=>`<div class="row"><span class="badge blue">권장</span><div class="small" style="margin-top:6px">${esc(x)}</div></div>`).join('')||'<div class="empty">권장조치 없음</div>';}
function bindTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+btn.dataset.panel));}));}
async function init(){try{const data=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'');renderKpis(data.summary||{});renderSummary(data.summary||{});$('fileCards').innerHTML=safeArray(data.files).map(renderFile).join('')||'<div class="empty">파일 점검 없음</div>';renderWorkflow(data.workflow||{});renderRecommendations(data.recommendations||[]);bindTabs();}catch(e){console.error(e);$('fileCards').innerHTML='<div class="empty">안정성 리포트를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
