<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS 첫 운영 수집 이상치 검수</title><style>body{font-family:system-ui;margin:0;background:#f5fafc;color:#182231}main,header{max-width:1100px;margin:auto;padding:16px}.card{background:#fff;border:1px solid #dfe6eb;border-radius:18px;padding:14px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.kpi{font-size:26px;font-weight:800}.sub{font-size:12px;color:#66717d}.row{border-top:1px solid #e4e9ed;padding:10px 0}.row:first-child{border-top:0}.critical{color:#d93c61}.warning{color:#c18a18}.ok{color:#168a5b}a{color:#2474d8}</style></head><body><header><h1>KOSIS 첫 운영 수집 이상치 검수</h1><div class="sub">값·단위·기간·중복·급변을 점검하며 원본 수집값은 자동 수정하지 않습니다.</div><a href="./kosis-dry-run.html">Dry Run</a> · <a href="./phase9-readiness.html">운영 준비도</a></header><main><div id="updated" class="card">불러오는 중...</div><div id="kpis" class="grid"></div><div class="card"><h2>검수 항목</h2><div id="rows"></div></div></main><script>const g=id=>document.getElementById(id),e=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));fetch('./data/admin/kosis_first_collection_anomalies.json?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>{const s=d.summary||{};g('updated').textContent=(d.updated_at||'-')+' · '+(s.status||'-')+' · '+(d.next_action||'');g('kpis').innerHTML=[['수집 레코드',s.record_count||0],['지표',s.metric_count||0],['치명',s.critical_count||0],['경고',s.warning_count||0],['단위 불일치',s.unit_mismatch_count||0],['급변',s.change_rate_issue_count||0]].map(x=>'<div class="card"><div class="sub">'+x[0]+'</div><div class="kpi">'+x[1]+'</div></div>').join('');g('rows').innerHTML=(d.findings||[]).map(x=>'<div class="row"><b class="'+e(x.severity)+'">'+e(x.severity)+'</b> · '+e(x.type)+' · '+e(x.metric_id||'-')+'<div class="sub">'+e(JSON.stringify(x))+'</div></div>').join('')||'<div class="sub ok">현재 검수 항목이 없습니다.</div>'}).catch(()=>g('updated').textContent='상태를 불러오지 못했습니다.');</script></body></html>
