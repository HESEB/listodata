<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Log | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--up:#d93c61;--mix:#7457d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}.badge.warn{color:var(--warn);background:rgba(193,138,24,.09)}.badge.missing{color:var(--up);background:rgba(217,60,97,.08)}.badge.policy{color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11))}.timeline{display:flex;flex-direction:column;gap:8px}.event{border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:16px;padding:11px}.event b{font-size:13px}.event .msg{font-size:13px;line-height:1.45;margin-top:5px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.filters select{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:8px 10px;font-family:inherit}.file-row{border-top:1px solid var(--line);padding:9px 0}.file-row:first-child{border-top:none}.file-row a{color:#2474d8;text-decoration:none}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.82);cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.20),rgba(107,178,255,.18));font-weight:760}.panel{display:none}.panel.active{display:block}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Change Log</h1><div class="sub">관리자 변경 로그 · 정책 버전 · 파일 상태</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./main.html">Dashboard</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 3-5</div><div class="headline">변경 로그</div><div class="sub" id="updatedAt">불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="tabs"><button class="tab active" data-panel="timeline">타임라인</button><button class="tab" data-panel="files">파일상태</button><button class="tab" data-panel="policies">정책버전</button></div>
  <section id="panel-timeline" class="panel active"><div class="card"><h2>최근 변경 타임라인</h2><div class="timeline" id="timeline"><div class="empty">불러오는 중...</div></div></div></section>
  <section id="panel-files" class="panel"><div class="filters"><select id="categoryFilter"><option value="ALL">전체 카테고리</option></select><select id="existsFilter"><option value="ALL">전체 상태</option><option value="Y">존재</option><option value="N">누락</option></select></div><div class="card"><h2>파일 상태</h2><div id="fileList"><div class="empty">불러오는 중...</div></div></div></section>
  <section id="panel-policies" class="panel"><div class="card"><h2>정책 버전</h2><div id="policyList"><div class="empty">불러오는 중...</div></div></div></section>
</main>
<script>
const PATH='./data/admin/change_log.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let DATA={files:[],timeline:[],policies:[]};
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['감시 파일',s.watch_file_count||0],['존재',s.exists_count||0],['누락',s.missing_count||0],['검수대상',s.classification_review_items||0],['Clean',s.quality_clean_count||0],['Rejected',s.quality_rejected_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function renderTimeline(){const rows=safeArray(DATA.timeline).slice(0,60);$('timeline').innerHTML=rows.map(x=>`<div class="event"><b>${esc(x.category||'-')}</b><div class="msg">${esc(x.message||'')}</div><div class="chips"><span class="chip">${esc(x.time||'-')}</span><span class="chip mono">${esc(x.path||'')}</span><span class="chip">${esc(x.admin_action||'')}</span></div></div>`).join('')||'<div class="empty">변경 로그 없음</div>';}
function passFile(x){const c=$('categoryFilter').value,e=$('existsFilter').value;if(c!=='ALL'&&x.category!==c)return false;if(e==='Y'&&!x.exists)return false;if(e==='N'&&x.exists)return false;return true;}
function renderFiles(){const rows=safeArray(DATA.files).filter(passFile);$('fileList').innerHTML=rows.map(x=>`<div class="file-row"><div><span class="badge ${x.exists?'good':'missing'}">${x.exists?'존재':'누락'}</span> <span class="badge policy">${esc(x.category||'')}</span></div><div class="small mono" style="margin-top:6px">${esc(x.path||'')}</div><div class="chips"><span class="chip">갱신 ${esc(x.updated_at||'-')}</span><span class="chip">크기 ${esc(x.size_bytes||0)}B</span><span class="chip">건수 ${esc(x.count??'-')}</span><span class="chip">정책 ${esc(x.policy||'-')}</span><span class="chip">${esc(x.admin_action||'')}</span></div></div>`).join('')||'<div class="empty">조건에 맞는 파일 없음</div>';}
function renderPolicies(){const rows=safeArray(DATA.policies);$('policyList').innerHTML=rows.map(x=>`<div class="file-row"><div><span class="badge policy">${esc(x.category||'')}</span></div><div class="small mono" style="margin-top:6px">${esc(x.policy||'')}</div><div class="chips"><span class="chip mono">${esc(x.path||'')}</span><span class="chip">${esc(x.updated_at||'-')}</span></div></div>`).join('')||'<div class="empty">정책 버전 없음</div>';}
function bindTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+btn.dataset.panel));}));}
function initFilters(){const cats=[...new Set(safeArray(DATA.files).map(x=>x.category).filter(Boolean))].sort();$('categoryFilter').innerHTML='<option value="ALL">전체 카테고리</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');['categoryFilter','existsFilter'].forEach(id=>$(id).addEventListener('change',renderFiles));}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(DATA.updated_at||'N/A')+' · '+(DATA.policy||'');renderKpis(DATA.summary||{});renderTimeline();initFilters();renderFiles();renderPolicies();bindTabs();}catch(e){console.error(e);$('timeline').innerHTML='<div class="empty">변경 로그를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
