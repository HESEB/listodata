<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Source Health | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2{margin:0;font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.healthy{color:var(--good);background:rgba(22,138,91,.08)}.badge.watch{color:var(--warn);background:rgba(193,138,24,.09)}.badge.risk{color:var(--bad);background:rgba(217,60,97,.08)}.badge.blue{color:var(--blue);background:rgba(36,116,216,.08)}.bar{height:9px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#F185AE,#F8B871,#A573ED,#6BB2FF)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.memo{font-size:13px;color:rgba(24,34,49,.82);line-height:1.55;margin-top:8px}.action{font-size:12px;color:rgba(24,34,49,.74);line-height:1.5;margin-top:8px;border:1px dashed var(--line);border-radius:14px;padding:9px;background:rgba(255,255,255,.62)}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.filters select,.filters input{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:9px 10px;font-family:inherit}.filters input{min-width:220px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}.filters input{width:100%;min-width:100%}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Source Health</h1><div class="sub">수집 소스별 성공률·기여도 관리</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./source.html">Source Center</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 6-6</div><div class="headline">수집 소스별 성공률 관리</div><div class="sub" id="updatedAt">Source Health를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="filters"><select id="gradeFilter"><option value="ALL">전체 상태</option><option value="healthy">양호</option><option value="watch">관찰</option><option value="risk">위험</option></select><select id="registeredFilter"><option value="ALL">전체 등록상태</option><option value="Y">Source Center 등록</option><option value="N">미등록</option></select><input id="searchBox" placeholder="소스명/이슈/권장조치 검색"></div>
  <section class="grid cols" id="cards"><div class="empty">불러오는 중...</div></section>
</main>
<script>
const PATH='./data/admin/source_health.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let DATA={sources:[]};
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['소스',s.source_count||0],['등록',s.registered_count||0],['미등록',s.unregistered_count||0],['양호',s.healthy_count||0],['관찰',s.watch_count||0],['위험',s.risk_count||0],['평균건강도',s.avg_health_score||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function pass(x){const g=$('gradeFilter').value,r=$('registeredFilter').value,q=($('searchBox').value||'').trim().toLowerCase();if(g!=='ALL'&&x.health_grade!==g)return false;if(r==='Y'&&!x.registered)return false;if(r==='N'&&x.registered)return false;if(q){const hay=[x.source,x.recommended_action,...safeArray(x.issues),...safeArray(x.groups),...safeArray(x.titles)].join(' ').toLowerCase();if(!hay.includes(q))return false;}return true;}
function renderCard(x){const pct=Math.max(0,Math.min(100,Number(x.health_score)||0));return `<article class="card"><div><span class="badge ${esc(x.health_grade)}">${esc(x.health_label)}</span> <span class="badge blue">${x.registered?'등록':'미등록'}</span></div><h2 style="margin-top:8px">${esc(x.source)}</h2><div class="kpi" style="font-size:24px;margin-top:8px">${esc(x.health_score)}점</div><div class="bar"><i style="width:${pct}%"></i></div><div class="chips"><span class="chip">Clean ${esc(x.clean_count)}</span><span class="chip">Rejected ${esc(x.rejected_count)}</span><span class="chip">News ${esc(x.news_count)}</span><span class="chip">Official ${esc(x.official_count)}</span><span class="chip">통과율 ${esc(x.pass_rate)}%</span><span class="chip">품질 ${esc(x.avg_quality)}</span></div>${safeArray(x.issues).length?`<div class="memo">이슈: ${esc(x.issues.join(' / '))}</div>`:'<div class="memo">이슈 없음</div>'}<div class="action"><b>권장조치</b><br>${esc(x.recommended_action)}</div>${safeArray(x.groups).length?`<div class="chips">${safeArray(x.groups).map(g=>`<span class="chip">${esc(g)}</span>`).join('')}</div>`:''}</article>`;}
function render(){const rows=safeArray(DATA.sources).filter(pass);$('cards').innerHTML=rows.map(renderCard).join('')||'<div class="empty">조건에 맞는 소스가 없습니다.</div>';}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(DATA.updated_at||'N/A')+' · '+(DATA.policy||'');renderKpis(DATA.summary||{});['gradeFilter','registeredFilter','searchBox'].forEach(id=>$(id).addEventListener(id==='searchBox'?'input':'change',render));render();}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">Source Health 리포트를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
