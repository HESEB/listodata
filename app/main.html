<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HESEB Livestock Terminal</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5fafc;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block;background:#f5fafc}
    .loading{position:fixed;inset:0;display:grid;place-items:center;color:#182231;background:#f5fafc;z-index:10;font-size:14px}
  </style>
</head>
<body>
  <div class="loading" id="loading">HESEB Livestock Terminal 로딩 중...</div>
  <iframe id="v330" src="./index.html?v=rule-test-v334" title="HESEB Phase 3-4 rule test dashboard"></iframe>
  <script>
    const frame=document.getElementById('v330');
    const loading=document.getElementById('loading');
    function appendScript(doc,id,src){
      if(doc.getElementById(id))return;
      const s=doc.createElement('script');
      s.id=id;
      s.src=src;
      s.defer=true;
      doc.body.appendChild(s);
    }
    function injectV41(){
      try{
        const doc=frame.contentDocument;
        if(!doc)return;
        appendScript(doc,'v41-integration-script','./v41-integration.js?v=integrated-411');
        appendScript(doc,'claim-evidence-script','./claim-evidence.js?v=claim-100');
        appendScript(doc,'decision-dashboard-script','./decision-dashboard.js?v=phase-4-1');
        appendScript(doc,'news-evidence-script','./news-evidence.js?v=phase-4-2');
        appendScript(doc,'source-hub-script','./source-hub.js?v=phase-4-4');
        appendScript(doc,'weekly-report-script','./weekly-report.js?v=phase-4-5');
        appendScript(doc,'event-calendar-link-script','./event-calendar-link.js?v=phase-5-1');
        appendScript(doc,'market-memory-link-script','./market-memory-link.js?v=phase-5-2');
        appendScript(doc,'case-comparison-link-script','./case-comparison-link.js?v=phase-5-3');
        appendScript(doc,'classification-review-link-script','./classification-review-link.js?v=phase-3-3');
        appendScript(doc,'rule-test-link-script','./rule-test-link.js?v=phase-3-4');
        loading.style.display='none';
      }catch(e){
        console.warn('dashboard integration inject failed',e);
        loading.textContent='기존 Dashboard를 여는 중입니다.';
        setTimeout(()=>loading.style.display='none',1200);
      }
    }
    frame.addEventListener('load',()=>{
      injectV41();
      setTimeout(injectV41,500);
      setTimeout(injectV41,1500);
    });
  </script>
</body>
</html>
