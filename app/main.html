<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HESEB DSS 2.0</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5fafc;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block;background:#f5fafc}
    .loading{position:fixed;inset:0;display:grid;place-items:center;color:#182231;background:#f5fafc;z-index:10;font-size:14px}
  </style>
</head>
<body>
  <div class="loading" id="loading">Data First Dashboard 로딩 중...</div>
  <iframe id="heseb-app-frame" src="./data-first-dashboard.html" title="HESEB Data First Dashboard"></iframe>
  <script>
    const frame=document.getElementById('heseb-app-frame');
    const loading=document.getElementById('loading');
    async function applyCacheBust(){
      let bust=Date.now();
      try{
        const res=await fetch('./data/system/version.json?t='+Date.now(),{cache:'no-store'});
        if(res.ok){const v=await res.json();bust=v.cache_bust||v.version||bust;}
      }catch(e){console.warn('version info load failed',e);}
      frame.src='./data-first-dashboard.html?v='+encodeURIComponent(bust);
    }
    frame.addEventListener('load',()=>{loading.style.display='none';});
    applyCacheBust();
  </script>
</body>
</html>
