<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HESEB Livestock Terminal</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5fafc;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}
    iframe{border:0;width:100%;height:100%;display:block;background:#f5fafc}
    .loading{position:fixed;inset:0;display:grid;place-items:center;color:#182231;background:#f5fafc;z-index:10;font-size:14px}
  </style>
</head>
<body>
  <div class="loading" id="loading">HESEB Livestock Terminal 로딩 중...</div>
  <iframe id="heseb-app-frame" src="./index.html" title="HESEB Livestock Terminal"></iframe>
  <script>
    const frame=document.getElementById('heseb-app-frame');
    const loading=document.getElementById('loading');
    let VERSION_INFO={version:'pending',cache_bust:String(Date.now()),display:{short_label:'pending'}};

    async function loadVersionInfo(){
      try{
        const res=await fetch('./data/system/version.json?t='+Date.now(),{cache:'no-store'});
        if(!res.ok)throw new Error('version '+res.status);
        VERSION_INFO=await res.json();
      }catch(e){
        console.warn('version info load failed',e);
        VERSION_INFO={version:'pending',cache_bust:String(Date.now()),display:{short_label:'pending'}};
      }
      const bust=encodeURIComponent(VERSION_INFO.cache_bust||VERSION_INFO.version||Date.now());
      const desired='./index.html?v='+bust;
      if(!frame.getAttribute('src')||frame.getAttribute('src')==='./index.html'){
        frame.setAttribute('src',desired);
      }
    }

    function withBust(src){
      const bust=encodeURIComponent(VERSION_INFO.cache_bust||VERSION_INFO.version||Date.now());
      return src+(src.includes('?')?'&':'?')+'v='+bust;
    }
    function appendScript(doc,id,src){
      if(doc.getElementById(id))return;
      const s=doc.createElement('script');
      s.id=id;
      s.src=withBust(src);
      s.defer=true;
      doc.body.appendChild(s);
    }
    function injectDashboardEnhancements(){
      try{
        const doc=frame.contentDocument;
        if(!doc)return;
        appendScript(doc,'v41-integration-script','./v41-integration.js');
        appendScript(doc,'claim-evidence-script','./claim-evidence.js');
        appendScript(doc,'decision-dashboard-script','./decision-dashboard.js');
        appendScript(doc,'news-evidence-script','./news-evidence.js');
        appendScript(doc,'source-hub-script','./source-hub.js');
        appendScript(doc,'weekly-report-script','./weekly-report.js');
        appendScript(doc,'event-calendar-link-script','./event-calendar-link.js');
        appendScript(doc,'market-memory-link-script','./market-memory-link.js');
        appendScript(doc,'case-comparison-link-script','./case-comparison-link.js');
        appendScript(doc,'classification-review-link-script','./classification-review-link.js');
        appendScript(doc,'rule-test-link-script','./rule-test-link.js');
        appendScript(doc,'change-log-link-script','./change-log-link.js');
        appendScript(doc,'dashboard-menu-script','./dashboard-menu.js');
        appendScript(doc,'dashboard-ux-final-script','./dashboard-ux-final.js');
        appendScript(doc,'version-badge-script','./version-badge.js');
        appendScript(doc,'operations-badges-script','./operations-badges.js');
        loading.style.display='none';
      }catch(e){
        console.warn('dashboard integration inject failed',e);
        loading.textContent='기존 Dashboard를 여는 중입니다.';
        setTimeout(()=>loading.style.display='none',1200);
      }
    }
    frame.addEventListener('load',()=>{
      injectDashboardEnhancements();
      setTimeout(injectDashboardEnhancements,500);
      setTimeout(injectDashboardEnhancements,1500);
    });
    loadVersionInfo();
  </script>
</body>
</html>
