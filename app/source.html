<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Source Center | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--good:#168a5b;--warn:#c18a18;--blue:#2474d8;--bad:#d93c61}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick a{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:999px;padding:6px 9px;text-decoration:none;color:var(--text)}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.card h3{font-size:15px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.group{margin-top:14px}.group-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}.badge.warn{color:var(--warn);background:rgba(193,138,24,.09)}.badge.blue{color:var(--blue);background:rgba(36,116,216,.08)}.badge.bad{color:var(--bad);background:rgba(217,60,97,.08)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.source-title{font-size:15px;font-weight:820;line-height:1.4;margin-top:6px}.memo{font-size:13px;line-height:1.55;color:rgba(24,34,49,.82);margin-top:8px}.source-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.source-actions a{font-size:12px;border:1px solid var(--line);background:linear-gradient(90deg,rgba(241,133,174,.12),rgba(107,178,255,.10));border-radius:999px;padding:7px 10px;text-decoration:none;color:var(--text)}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.filters select,.filters input{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:9px 10px;font-family:inherit}.filters input{min-width:220px}.note{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}.filters input{min-width:100%;width:100%}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Source Center</h1><div class="sub">HESEB DSS 공식 근거 저장소</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./admin.html">Admin</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 4-9</div><div class="headline">자료출처 · 공식 근거 저장소</div><div class="sub" id="updatedAt">자료출처를 불러오는 중...</div><div class="quick"><a href="./reasoning.html">종합판단근거</a><a href="./score-engine.html">점수근거</a><a href="./evidence-chain.html">근거체인</a><a href="./report.html">주간보고서</a></div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="filters"><select id="groupFilter"><option value="ALL">전체 카테고리</option></select><select id="speciesFilter"><option value="ALL">전체 축종</option><option value="BEEF">한우</option><option value="PORK">돈육</option><option value="POULTRY">계육</option><option value="DUCK">오리</option><option value="EGG">계란</option><option value="OTHER">기타</option></select><input id="searchBox" placeholder="자료명, 기관, 메모 검색"></div>
  <section id="groups"><div class="empty">불러오는 중...</div></section>
  <div class="note" style="margin-top:14px">Source Center는 현재 Dashboard·Evidence Score·Report에서 사용하는 공개 근거 링크를 정리한 페이지입니다. 일부 HESEB 기준자료는 공개자료가 제한적인 축종의 보조 판단 링크입니다.</div>
</main>
<script>
const PATH='./data/source_links.json';
const GROUP_META={INTELLIGENCE:{icon:'🧠',purpose:'시장판단 종합근거',level:5,cycle:'실시간/자동갱신',used:'Reasoning, Report'},PRICE:{icon:'💰',purpose:'가격 기준 데이터',level:5,cycle:'일/주 단위 확인',used:'Evidence Score 가격축'},SLAUGHTER:{icon:'📦',purpose:'도축·도계량 기준 데이터',level:5,cycle:'일/월 단위 확인',used:'Evidence Score 수급축'},DISEASE:{icon:'🛡️',purpose:'질병·방역 공식자료',level:5,cycle:'발생 즉시 확인',used:'Evidence Score 질병축'},POLICY:{icon:'📜',purpose:'정책·고시 공식자료',level:5,cycle:'발표 시 확인',used:'Evidence Score 정책축'}};
const SPECIES={BEEF:'한우',PORK:'돈육',POULTRY:'계육',DUCK:'오리',EGG:'계란',OTHER:'기타'};
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let DATA={groups:[]};
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function allItems(){return safeArray(DATA.groups).flatMap(g=>safeArray(g.items).map(i=>({...i,group_id:g.id,group_title:g.title,group_description:g.description})));}
function providerLevel(item,group){if((item.provider||'').includes('HESEB'))return 3;return (GROUP_META[group.id]||{}).level||4;}
function sourceType(item){return (item.provider||'').includes('HESEB')?'보조자료':'공식/공개자료';}
function renderKpis(){const groups=safeArray(DATA.groups);const items=allItems();const official=items.filter(x=>!(x.provider||'').includes('HESEB')).length;const support=items.length-official;const species=new Set(items.flatMap(x=>safeArray(x.species))).size;$('kpis').innerHTML=[['카테고리',groups.length],['자료 링크',items.length],['공식/공개',official],['보조자료',support],['축종',species]].map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function initFilters(){const groups=safeArray(DATA.groups);$('groupFilter').innerHTML='<option value="ALL">전체 카테고리</option>'+groups.map(g=>`<option value="${esc(g.id)}">${esc(g.title)}</option>`).join('');['groupFilter','speciesFilter','searchBox'].forEach(id=>$(id).addEventListener(id==='searchBox'?'input':'change',render));}
function passItem(item,group){const gf=$('groupFilter').value,sf=$('speciesFilter').value,q=($('searchBox').value||'').trim().toLowerCase();if(gf!=='ALL'&&group.id!==gf)return false;if(sf!=='ALL'&&!safeArray(item.species).includes(sf))return false;if(q){const hay=[item.title,item.subtitle,item.provider,item.memo,group.title].join(' ').toLowerCase();if(!hay.includes(q))return false;}return true;}
function renderItem(item,group){const meta=GROUP_META[group.id]||{};const level=providerLevel(item,group);return `<article class="card"><div><span class="badge ${level>=5?'good':'warn'}">Level ${esc(level)}</span> <span class="badge blue">${esc(sourceType(item))}</span> <span class="badge">${esc(meta.used||'DSS 참고')}</span></div><div class="source-title">${esc(item.title)}</div><div class="small">${esc(item.subtitle||'')} · ${esc(item.provider||'')}</div><div class="chips">${safeArray(item.species).map(s=>`<span class="chip">${esc(SPECIES[s]||s)}</span>`).join('')}<span class="chip">${esc(meta.cycle||'주기 확인 필요')}</span></div><div class="memo">${esc(item.memo||'')}</div><div class="source-actions"><a href="${esc(item.url||'#')}">자료 열기</a></div></article>`;}
function renderGroup(group){const items=safeArray(group.items).filter(i=>passItem(i,group));if(!items.length)return '';const meta=GROUP_META[group.id]||{};return `<section class="group"><div class="group-head"><div><h2>${esc(meta.icon||'🔗')} ${esc(group.title)}</h2><div class="small">${esc(group.description||'')} · ${esc(meta.purpose||'자료 확인')}</div></div><span class="badge good">${items.length}건</span></div><div class="grid cols">${items.map(i=>renderItem(i,group)).join('')}</div></section>`;}
function render(){const html=safeArray(DATA.groups).map(renderGroup).filter(Boolean).join('');$('groups').innerHTML=html||'<div class="empty">조건에 맞는 자료가 없습니다.</div>';}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(DATA.updated_at||'N/A')+' · source_center_v1';renderKpis();initFilters();render();}catch(e){console.error(e);$('groups').innerHTML='<div class="empty">자료출처 데이터를 불러오지 못했습니다.</div>';}}
init();
</script>
</body>
</html>
