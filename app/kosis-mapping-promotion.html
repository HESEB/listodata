<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS 운영 매핑 승격 | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{border-bottom:1px solid var(--line);background:rgba(245,250,252,.96);position:sticky;top:0}.top,main{max-width:1120px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.55}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--text);background:#fff;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(4,1fr)}@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:27px;font-weight:820}.row{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.empty{padding:20px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:16px}</style></head><body><header><div class="top"><div class="brand"><div><h1>KOSIS 승인 매핑 검증·운영 승격</h1><div class="sub">승인본을 검증하고 명시적 관리자 승인 후 운영 매핑으로 승격합니다.</div></div><div><a class="btn" href="./kosis-detail-approval.html">상세 후보 승인</a> <a class="btn" href="./admin2-dashboard.html">Admin 2.0</a></div></div></div></header><main><div class="hero"><div><div class="sub">Phase 9-5</div><div class="headline" id="headline">운영 승격 상태를 확인하는 중...</div><div class="sub" id="updated"></div></div></div><section class="grid kpis" id="kpis"></section><section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">승격 절차</h2><div class="sub" style="margin-top:8px">상세 후보 승인 → 승인 매핑 생성 → 구조·중복·필수 코드·단위 검증 → <code>kosis_mapping_promotion_approvals.json</code>에서 approve·검수자 입력 → Actions 실행 → 운영 매핑 생성. 실패 시 기존 운영 매핑을 보존합니다.</div><div style="margin-top:10px"><a class="btn" target="_blank" rel="noopener" href="https://github.com/HESEB/listodata/edit/main/app/data/admin/kosis_mapping_promotion_approvals.json">승격 승인 파일 편집</a></div></section><section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">오류·경고</h2><div id="issues" style="margin-top:10px"><div class="empty">불러오는 중...</div></div></section></main><script>const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));(async()=>{try{const r=await fetch('./data/admin/kosis_mapping_promotion_status.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{},status=s.status||'approval_required';$('headline').textContent=({promoted:'운영 매핑 승격 완료',validation_failed:'승인했지만 검증 실패',approval_required:'운영 승격 승인 대기'})[status]||status;$('headline').className='headline '+(status==='promoted'?'good':status==='validation_failed'?'bad':'warn');$('updated').textContent=`갱신 ${d.updated_at||'-'} · 결정 ${s.promotion_decision||'pending'}`;$('kpis').innerHTML=[['승인 테이블',s.approved_table_count||0],['검증 지표',s.validated_metric_count||0],['운영 테이블',s.operational_table_count||0],['검증 오류',s.error_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');const rows=[...(d.errors||[]).map(x=>['오류',x,'bad']),...(d.warnings||[]).map(x=>['경고',x,'warn'])];$('issues').innerHTML=rows.length?rows.map(([a,b,c])=>`<div class="row"><b class="${c}">${a}</b><div class="sub">${esc(b)}</div></div>`).join(''):'<div class="empty">오류·경고 없음</div>';}catch(e){$('headline').textContent='다음 Actions 실행 후 확인하세요.';$('issues').innerHTML='<div class="empty">상태 파일을 불러오지 못했습니다.</div>';}})();</script></body></html>
