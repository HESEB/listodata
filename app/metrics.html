<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>핵심지표 | HESEB Livestock Terminal</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:#f5fafc;color:#182231}
    header{position:sticky;top:0;background:rgba(245,250,252,.94);border-bottom:1px solid rgba(20,30,40,.09);backdrop-filter:blur(8px)}
    .wrap{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:18px}.sub{font-size:12px;color:rgba(24,34,49,.68);line-height:1.45}.btn{border:1px solid rgba(20,30,40,.09);background:white;padding:8px 12px;border-radius:999px;color:#182231;text-decoration:none;font-size:13px}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin:14px 0}.hero-in{background:rgba(255,255,255,.8);border:1px solid rgba(20,30,40,.09);border-radius:22px;padding:16px}.eyebrow{font-size:12px;color:rgba(24,34,49,.68)}.headline{font-size:24px;font-weight:800;letter-spacing:-.7px;margin-top:5px}
    .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}.card{background:rgba(255,255,255,.92);border:1px solid rgba(20,30,40,.09);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2{margin:0;font-size:17px}.summary{font-size:13px;line-height:1.55;color:rgba(24,34,49,.78);margin-top:10px}.score{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pill{border:1px solid rgba(20,30,40,.09);border-radius:999px;background:rgba(255,255,255,.75);padding:7px 10px;font-size:12px}.pill b{font-size:15px}.metric{border-top:1px solid rgba(20,30,40,.09);padding:10px 0}.metric:first-child{border-top:0}.metric-top{display:flex;justify-content:space-between;gap:8px}.metric-name{font-weight:760;font-size:13px}.metric-value{font-size:20px;font-weight:830;margin-top:5px}.metric-sub{font-size:12px;color:rgba(24,34,49,.68);line-height:1.5}.up{color:#d93c61}.down{color:#2474d8}.mixed{color:#7457d8}.flat{color:#c18a18}.meaning{font-size:12px;margin-top:6px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.10),rgba(107,178,255,.10));border:1px solid rgba(20,30,40,.09);border-radius:12px;padding:7px}.notice{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed rgba(20,30,40,.09);border-radius:18px;background:rgba(255,255,255,.62);padding:12px;margin-top:14px}.empty{padding:22px;text-align:center;color:rgba(24,34,49,.68);border:1px dashed rgba(20,30,40,.09);border-radius:18px;background:rgba(255,255,255,.6)}
  </style>
</head>
<body>
<header><div class="wrap brand"><div><h1>HESEB Livestock Terminal</h1><div class="sub">Korean Market Intelligence Platform by Selfmaker company</div></div><a class="btn" href="./index.html">Dashboard로 돌아가기</a></div></header>
<main class="wrap">
  <div class="hero"><div class="hero-in"><div class="eyebrow">Market Metrics</div><div class="headline">숫자 기반 핵심지표</div><div class="sub">단위, 증감률, 해석을 함께 표시합니다.</div></div></div>
  <div id="cards" class="grid"><div class="empty">핵심지표를 불러오는 중...</div></div>
  <div class="notice" id="notice"></div>
</main>
<script>
const $=id=>document.getElementById(id);
const safe=x=>Array.isArray(x)?x:[];
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p,{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function cls(d){return d==='up'?'up':d==='down'?'down':d==='mixed'?'mixed':'flat'}
function unitOf(m){if(m.unit)return m.unit;if(/도계/.test(m.label))return '수';if(/도축/.test(m.label))return '두';if(/지육|가격/.test(m.label))return '원/kg';if(/수요|질병|신뢰|점수|영향/.test(m.label))return '점';return ''}
function changeUnit(m){return m.change_unit || (m.change_label==='점수'?'점':'%')}
function fmtChange(m){const v=Number(m.change), u=changeUnit(m);if(!Number.isFinite(v))return '-';return u==='점'?Math.round(v)+'점':(v>0?'+':'')+v.toFixed(1)+u}
function meaning(m){if(m.interpretation)return m.interpretation;const v=Number(m.change), u=changeUnit(m);if(!Number.isFinite(v))return '비교 기준값 추가 확보 필요';if(u==='점'){if(v>=70)return '영향도 높음';if(v>=40)return '영향도 보통';return '영향도 낮음'}if(/도축|도계|공급/.test(m.label)){if(v<=-3)return '공급 감소 신호';if(v>=3)return '공급 증가 신호';return '공급 보합권'}if(v>=3)return '가격 상승 압력 우세';if(v<=-3)return '가격 하락 압력';return '가격 보합권'}
function metricHTML(m){const c=cls(m.direction);return `<div class="metric"><div class="metric-top"><div class="metric-name">${esc(m.label)}</div><div class="${c}">${esc(m.change_label||'변화')}</div></div><div class="metric-value">${esc(m.value)}${esc(unitOf(m))}</div><div class="metric-sub"><span class="${c}">${fmtChange(m)}</span> · 출처키: ${esc(m.source_ref)}</div><div class="meaning">→ ${esc(meaning(m))}</div></div>`}
function cardHTML(sp){return `<section class="card"><h2>${esc(sp.name)} · ${esc(sp.basis_month||'기준월 없음')}</h2><div class="summary">${esc(sp.metric_summary||'')}</div><div class="score"><span class="pill">시장신호 <b>${esc(sp.signal_score)}점</b></span><span class="pill">데이터 신뢰도 <b>${esc(sp.data_confidence)}점</b></span></div><div style="margin-top:10px">${safe(sp.metrics).map(metricHTML).join('')}</div></section>`}
async function init(){try{const data=await fetchJSON('./data/market_metrics.json');$('notice').textContent=(data.unit_note||'')+' '+(data.notice||'');$('cards').innerHTML=safe(data.species).map(cardHTML).join('')||'<div class="empty">등록된 지표가 없습니다.</div>'}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">핵심지표를 불러오지 못했습니다.</div>'}}
init();
</script>
</body>
</html>
