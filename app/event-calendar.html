<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Calendar | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--up:#d93c61;--down:#2474d8;--flat:#c18a18;--mix:#7457d8;--hold:#777}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick a{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:999px;padding:6px 9px;text-decoration:none;color:var(--text)}
    .grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.up{color:var(--up);background:rgba(217,60,97,.08)}.badge.down{color:var(--down);background:rgba(36,116,216,.08)}.badge.mixed{color:var(--mix);background:rgba(116,87,216,.08)}.badge.neutral{color:var(--flat);background:rgba(193,138,24,.09)}.badge.old{color:var(--hold);background:rgba(0,0,0,.05)}.badge.now{color:#168a5b;background:rgba(22,138,91,.08)}.small{font-size:12px;color:var(--sub);line-height:1.45}.date{font-size:13px;font-weight:760;margin-top:6px}.memo{font-size:13px;line-height:1.55;color:rgba(24,34,49,.82);margin-top:9px}.check{font-size:12px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11));border:1px solid var(--line);border-radius:14px;padding:10px;margin-top:10px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.impact{letter-spacing:1px;font-size:12px}.bar{height:8px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.select{border:1px solid var(--line);border-radius:14px;padding:9px 10px;background:rgba(255,255,255,.88);font-family:inherit}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Event Calendar</h1><div class="sub">축산 구매 시즌·정책·질병 리스크 캘린더</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./history-prediction.html">History</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 5-1</div><div class="headline">축산 이벤트 캘린더</div><div class="sub" id="updatedAt">불러오는 중...</div><div class="quick"><a href="./reasoning.html">종합판단근거</a><a href="./score-engine.html">점수근거</a><a href="./cross-market.html">축종간영향</a><a href="./history-prediction.html">추세검수</a></div></div></div>
  <div class="filters"><select class="select" id="speciesFilter"><option value="ALL">전체 축종</option><option value="BEEF">한우</option><option value="PORK">돈육</option><option value="POULTRY">계육</option><option value="DUCK">오리</option><option value="EGG">계란</option><option value="OTHER">기타</option></select><select class="select" id="periodFilter"><option value="ALL">전체 기간</option><option value="ACTIVE">진행/예정</option><option value="30">30일 이내</option><option value="90">90일 이내</option></select></div>
  <section class="grid cols" id="cards"><div class="empty">이벤트를 불러오는 중...</div></section>
</main>
<script>
const PATH='./data/events/event_calendar.json';
const SPECIES={BEEF:'한우',PORK:'돈육',POULTRY:'계육',DUCK:'오리',EGG:'계란',OTHER:'기타'};
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let DATA={items:[]};
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function today(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function dateObj(s){const d=new Date(s+'T00:00:00');return Number.isNaN(d.getTime())?null:d;}
function diffDays(s){const d=dateObj(s);if(!d)return 9999;return Math.ceil((d-today())/86400000);}
function status(ev){const start=diffDays(ev.date_start),end=diffDays(ev.date_end||ev.date_start);if(start<=0&&end>=0)return ['진행중','now'];if(start>0)return [`D-${start}`,'neutral'];return ['종료','old'];}
function dirClass(d){return d==='up'?'up':d==='down'?'down':d==='mixed'?'mixed':'neutral';}
function speciesText(arr){return safeArray(arr).map(x=>SPECIES[x]||x).join(' · ')||'공통';}
function stars(n){n=Math.max(1,Math.min(5,Number(n)||1));return '★'.repeat(n)+'☆'.repeat(5-n);}
function includeByFilter(ev){const sp=$('speciesFilter').value,period=$('periodFilter').value;if(sp!=='ALL'&&!safeArray(ev.species).includes(sp))return false;if(period==='ACTIVE'){const [,c]=status(ev);return c!=='old';}if(period==='30'||period==='90'){const d=diffDays(ev.date_start);return d>=0&&d<=Number(period);}return true;}
function renderCard(ev){const [st,stc]=status(ev);const pct=Math.max(8,Math.min(100,(Number(ev.impact_level)||1)*20));return `<article class="card"><div class="topline"><div><h2>${esc(ev.title)}</h2><div class="date">${esc(ev.date_start)} ~ ${esc(ev.date_end||ev.date_start)}</div></div><span class="badge ${stc}">${esc(st)}</span></div><div class="chips"><span class="chip">${esc(speciesText(ev.species))}</span><span class="chip">${esc(ev.event_type)}</span><span class="badge ${dirClass(ev.impact_direction)}">${esc(ev.impact_direction)}</span></div><div class="memo">${esc(ev.memo||'')}</div><div class="check"><b>구매 체크포인트</b><br>${esc(ev.purchase_check||'')}</div><div class="small" style="margin-top:9px">영향도 <span class="impact">${stars(ev.impact_level)}</span></div><div class="bar"><i style="width:${pct}%"></i></div></article>`;}
function render(){const items=safeArray(DATA.items).filter(includeByFilter).sort((a,b)=>String(a.date_start).localeCompare(String(b.date_start)));$('cards').innerHTML=items.map(renderCard).join('')||'<div class="empty">조건에 맞는 이벤트가 없습니다.</div>';}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(DATA.updated_at||'N/A')+' · '+(DATA.policy||'');render();['speciesFilter','periodFilter'].forEach(id=>$(id).addEventListener('change',render));}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">이벤트 데이터를 불러오지 못했습니다.</div>';}}
init();
</script>
</body>
</html>
