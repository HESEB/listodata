<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS 실제 코드 조사 | HESEB</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;margin:0;background:#f5fafc;color:#182231}.wrap{max-width:1080px;margin:auto;padding:16px}.card{background:#fff;border:1px solid rgba(20,30,40,.1);border-radius:20px;padding:16px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}.kpi{font-size:28px;font-weight:800}.sub{font-size:12px;color:rgba(24,34,49,.65);line-height:1.55}.badge{display:inline-block;border:1px solid rgba(20,30,40,.1);border-radius:999px;padding:5px 8px;font-size:11px}.warn{color:#b47b0d}.row{border-top:1px solid rgba(20,30,40,.1);padding-top:10px;margin-top:10px}a{color:#2474d8}</style></head><body><div class="wrap"><h1>KOSIS 실제 통계표 코드 조사</h1><div class="sub">Phase 9-1 · 공식 KOSIS 응답에서 확인된 코드만 승인 후보로 관리합니다.</div><div class="grid" id="kpis"></div><div class="card"><b>조사 원칙</b><div class="sub">검색 결과나 추정값은 매핑 템플릿에 자동 반영하지 않습니다. org_id, tbl_id, 통계표명, 주기, 항목코드, 분류코드, 공식 확인시각이 모두 있어야 승인 후보가 됩니다.</div></div><div class="card"><b>조사 대상</b><div id="targets" class="sub">불러오는 중...</div></div><div class="card"><b>공식 확인 경로</b><div class="sub"><a href="https://kosis.kr/openapi/index/index.jsp" target="_blank" rel="noopener">KOSIS 공유서비스</a>에서 인증키 신청 후 통계목록·통계자료 API 응답을 확인합니다.</div></div></div><script>(async()=>{const r=await fetch('./data/admin/kosis_code_research.json?ts='+Date.now(),{cache:'no-store'}),d=await r.json(),s=d.summary||{};document.getElementById('kpis').innerHTML=[['상태',s.status||'-'],['조사 대상',s.target_count||0],['후보',s.candidate_count||0],['승인 후보',s.approved_candidate_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${a}</div><div class="kpi">${b}</div></div>`).join('');document.getElementById('targets').innerHTML=(d.targets||[]).map(x=>`<div class="row"><span class="badge warn">${x.status||'research_required'}</span><b> ${x.research_id||'-'}</b><div>${(x.keywords||[]).join(' · ')}</div></div>`).join('')||'공식 API 조사 결과가 아직 없습니다.';})().catch(()=>document.getElementById('targets').textContent='다음 Actions 실행 후 확인하세요.');</script></body></html>
