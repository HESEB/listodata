<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fallback Status | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.protected,.badge.snapshot,.badge.verify{color:var(--good);background:rgba(22,138,91,.08)}.badge.partial,.badge.warn{color:var(--warn);background:rgba(193,138,24,.09)}.badge.risk,.badge.fail{color:var(--bad);background:rgba(217,60,97,.08)}.badge.restore{color:var(--blue);background:rgba(36,116,216,.08)}.bar{height:9px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#F185AE,#F8B871,#A573ED,#6BB2FF)}.row{border-top:1px solid var(--line);padding:10px 0}.row:first-child{border-top:0}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:#263b72}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Fallback Status</h1><div class="sub">실패 시 Fallback 데이터 보호 상태</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./update-stability.html">업데이트 안정성</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 6-2</div><div class="headline">Fallback 데이터 보호</div><div class="sub" id="updatedAt">Fallback 상태를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <section class="card" style="margin-top:12px"><h2>보호 커버리지</h2><div class="kpi" id="coverage">-</div><div class="bar"><i id="coverageBar" style="width:0%"></i></div><div class="chips" id="summaryChips"></div></section>
  <section class="grid cols" id="cards" style="margin-top:12px"><div class="empty">불러오는 중...</div></section>
</main>
<script>
const PATH='./data/admin/fallback_status.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['전체파일',s.total_files||0],['보호됨',s.protected_count||0],['이슈',s.issue_count||0],['복원됨',s.restored_count||0],['커버리지',`${s.coverage_rate||0}%`]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function actionBadge(x){const a=x.action||x.mode||'verify';if(a.includes('restore'))return 'restore';if(a.includes('failed'))return 'fail';if(a.includes('snapshot'))return 'snapshot';return 'verify';}
function renderCard(x){const ok=x.valid||x.fallback_valid||x.current_valid||x.action==='restore_from_fallback';return `<article class="card"><div><span class="badge ${ok?'protected':'risk'}">${ok?'보호':'확인필요'}</span> <span class="badge ${actionBadge(x)}">${esc(x.action||'-')}</span></div><h2 style="margin-top:8px">${esc((x.path||'').replace('app/data/',''))}</h2><div class="small mono">${esc(x.fallback_path||'')}</div><div class="chips"><span class="chip">현재 ${esc(x.current_reason||x.reason||'-')}</span><span class="chip">Fallback ${esc(x.fallback_reason||'-')}</span></div></article>`;}
async function init(){try{const data=await fetchJSON(PATH);const s=data.summary||{};$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'')+' · mode '+(data.mode||'');renderKpis(s);$('coverage').innerHTML=`${esc(s.coverage_rate||0)}% <span class="badge ${esc(s.grade||'partial')}">${esc(s.label||'부분보호')}</span>`;$('coverageBar').style.width=Math.max(0,Math.min(100,Number(s.coverage_rate)||0))+'%';$('summaryChips').innerHTML=`<span class="chip">mode ${esc(data.mode||'-')}</span><span class="chip">restored ${esc(s.restored_count||0)}</span><span class="chip">issues ${esc(s.issue_count||0)}</span>`;$('cards').innerHTML=safeArray(data.items).map(renderCard).join('')||'<div class="empty">Fallback 점검 결과 없음</div>';}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">Fallback 상태를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
