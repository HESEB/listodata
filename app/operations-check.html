<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Operations Readiness | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}.wrap{max-width:1150px;margin:auto;padding:16px}.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.kpi{font-size:28px;font-weight:800}.sub{font-size:12px;color:var(--sub);line-height:1.5}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.ok,.ready{color:var(--good);background:rgba(22,138,91,.08)}.watch{color:var(--warn);background:rgba(193,138,24,.09)}.fail,.risk{color:var(--bad);background:rgba(217,60,97,.08)}.row{border-top:1px solid var(--line);padding:9px 0;font-size:12px}.row:first-child{border-top:0}a{color:inherit;text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 10px}</style></head><body><div class="wrap"><div class="hero"><div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap"><div><div class="sub">Phase 6-10</div><h1 style="margin:4px 0">운영 안정화 최종 점검</h1><div class="sub" id="updated">리포트를 불러오는 중...</div></div><div><a href="./admin.html">Admin</a> <a href="./actions-guide.html">Actions 실행</a></div></div></div><div class="kpis" id="kpis"></div><div class="grid"><div class="card"><h2>필수 파일</h2><div id="files"></div></div><div class="card"><h2>Workflow 순서</h2><div id="steps"></div></div><div class="card"><h2>자동 커밋 산출물</h2><div id="outputs"></div></div><div class="card"><h2>권장 조치</h2><div id="recs"></div></div></div></div><script>const $=id=>document.getElementById(id);const e=s=>String(s??'-').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const row=(name,status,extra='')=>`<div class="row"><span class="badge ${status}">${status}</span> <b>${e(name)}</b>${extra?`<div class="sub">${e(extra)}</div>`:''}</div>`;fetch('./data/admin/operational_readiness.json?ts='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw 0;return r.json()}).then(d=>{const s=d.summary||{};$('updated').textContent='갱신 '+(d.updated_at||'-')+' · '+(d.notice||'');$('kpis').innerHTML=[['준비도',`${s.readiness_score||0}점`],['상태',s.label],['통과',s.pass_count],['실패',s.fail_count]].map(x=>`<div class="card"><div class="sub">${e(x[0])}</div><div class="kpi">${e(x[1])}</div></div>`).join('');$('files').innerHTML=(d.files||[]).map(x=>row(x.path,x.status,`${x.size_bytes||0} bytes`)).join('');$('steps').innerHTML=(d.workflow_steps||[]).map(x=>row(x.token,x.status,x.found?'연결됨':'누락')).join('');$('outputs').innerHTML=(d.commit_outputs||[]).map(x=>row(x.name,x.status,x.in_commit_pattern?'commit pattern 포함':'누락')).join('');$('recs').innerHTML=(d.recommendations||[]).map(x=>`<div class="row">${e(x)}</div>`).join('')}).catch(()=>{$('recs').innerHTML='<div class="sub">다음 자동 업데이트 후 최종 점검 리포트가 생성됩니다.</div>'});</script></body></html>
