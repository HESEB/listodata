<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Update History | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}.wrap{max-width:1100px;margin:auto;padding:16px}.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.kpi{font-size:28px;font-weight:800}.sub{font-size:12px;color:var(--sub)}.row{display:grid;grid-template-columns:180px 100px repeat(5,1fr);gap:8px;padding:10px 0;border-top:1px solid var(--line);font-size:12px}.ok{color:var(--good)}.warn{color:var(--warn)}a{color:inherit;text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 10px}@media(max-width:800px){.row{grid-template-columns:1fr 1fr}.row span:nth-child(n+3){font-size:11px}}</style></head><body><div class="wrap"><div class="hero"><div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap"><div><div class="sub">Phase 6-5 Repair</div><h1 style="margin:4px 0">자동 업데이트 운영 이력</h1><div class="sub" id="updated">불러오는 중...</div></div><div><a href="./admin.html">Admin</a></div></div></div><div class="grid" id="kpis"></div><div class="card"><h2>최근 기록</h2><div id="rows"></div></div></div><script>const $=id=>document.getElementById(id);const e=s=>String(s??'-').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));fetch('./data/admin/update_history.json?ts='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw 0;return r.json()}).then(d=>{const s=d.summary||{};$('updated').textContent='갱신 '+(d.updated_at||'-')+' · '+(d.notice||'');$('kpis').innerHTML=[['기록',s.record_count],['성공률',`${s.success_rate||0}%`],['주의',s.warning_count],['Fallback 복원',s.fallback_restore_total],['긴급경고 누계',s.critical_alert_total]].map(x=>`<div class="card"><div class="sub">${e(x[0])}</div><div class="kpi">${e(x[1])}</div></div>`).join('');$('rows').innerHTML=(d.records||[]).map(x=>`<div class="row"><span>${e(x.recorded_at)}</span><b class="${x.status==='success'?'ok':'warn'}">${e(x.status)}</b><span>안정성 ${e(x.stability_score)}</span><span>품질경고 ${e(x.quality_alerts)}</span><span>최신성 ${e(x.freshness_alerts)}</span><span>Fallback ${e(x.fallback_restored)}</span><span>패치 ${e(x.patch_applied)}</span></div>`).join('')||'<div class="sub">다음 자동 업데이트 후 기록이 생성됩니다.</div>'}).catch(()=>$('rows').innerHTML='<div class="sub">이력 파일을 불러오지 못했습니다.</div>');</script></body></html>
