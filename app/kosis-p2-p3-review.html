<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS P2·P3 검수 | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}.top,main{max-width:1240px;margin:auto;padding:14px}header{position:sticky;top:0;background:rgba(245,250,252,.95);border-bottom:1px solid var(--line);z-index:5}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(5,1fr)}@media(max-width:800px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:27px;font-weight:820}.row{border-top:1px solid var(--line);padding:11px 0}.row:first-child{border-top:0}.head{display:flex;justify-content:space-between;gap:10px}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.mono{font-family:ui-monospace,monospace;font-size:11px}.empty{padding:20px;text-align:center;border:1px dashed var(--line);border-radius:16px;color:var(--sub)}.cols{grid-template-columns:1fr 1fr}@media(max-width:900px){.cols{grid-template-columns:1fr}}</style></head><body><header><div class="top"><div class="brand"><div><h1>KOSIS P2·P3 단계별 검수</h1><div class="sub">미해결 10개 지표를 승인·후보·충돌·재조사 상태로 추적합니다.</div></div><div><a class="btn" href="./kosis-p1-batch-review.html">P1 검수</a> <a class="btn" href="./kosis-approval-precheck.html">승인 사전점검</a></div></div></div></header><main><div class="hero"><div><div class="sub">Phase 10-6</div><div class="headline">P2 다음 P3, 후보 없는 지표는 재조사</div><div class="sub" id="updated">상태를 불러오는 중...</div></div></div><section class="grid kpis" id="kpis"></section><section class="grid cols" style="margin-top:12px"><div class="card"><h2>P2 검수 큐</h2><div id="p2"></div></div><div class="card"><h2>P3 검수 큐</h2><div id="p3"></div></div></section><section class="card" style="margin-top:12px"><h2>10개 지표 추적</h2><div id="tracker"></div></section></main><script>const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function get(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(p);return r.json()}function q(rows){if(!rows?.length)return '<div class="empty">현재 후보 없음</div>';return rows.map(x=>`<div class="row"><div class="head"><b>${esc(x.metric_id)}</b><span class="badge ${x.priority==='P2'?'warn':''}">${esc(x.priority)} · ${esc(x.quality_score)}점</span></div><div class="sub">${esc(x.table_name||'-')} · ${esc(x.org_id)}/${esc(x.tbl_id)}</div><div class="mono">ITM ${esc(x.ITM_ID)} · C1 ${esc(x.C1_ID)} · ${esc(x.UNIT_NM||'단위 미확인')}</div></div>`).join('')}get('./data/admin/kosis_p2_p3_review.json').then(d=>{const s=d.summary||{};$('updated').textContent=`${d.updated_at||'-'} · ${s.status||'-'}`;$('kpis').innerHTML=[['승인',s.approved_metric_count||0],['미해결',s.unresolved_metric_count||0],['P2 후보',s.p2_candidate_count||0],['P3 후보',s.p3_candidate_count||0],['충돌',s.conflict_metric_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${a}</div><div class="kpi">${b}</div></div>`).join('');$('p2').innerHTML=q(d.p2_queue);$('p3').innerHTML=q(d.p3_queue);$('tracker').innerHTML=(d.metric_tracker||[]).map(x=>`<div class="row"><div class="head"><b>${esc(x.metric_id)}</b><span class="badge ${x.state==='approved'?'good':x.state==='conflict'?'bad':'warn'}">${esc(x.state)}</span></div><div class="sub">후보 ${x.candidate_count||0}건 · 최고 ${x.best_score||0}점 · ${esc(x.next_action)}</div></div>`).join('')||'<div class="empty">후보 생성 후 지표 추적이 표시됩니다.</div>'}).catch(()=>{$('updated').textContent='상태를 불러오지 못했습니다.'});</script></body></html>
