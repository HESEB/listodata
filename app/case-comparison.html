<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Case Comparison | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--up:#d93c61;--down:#2474d8;--flat:#c18a18;--mix:#7457d8;--good:#168a5b}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick a{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:999px;padding:6px 9px;text-decoration:none;color:var(--text)}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.high{color:var(--up);background:rgba(217,60,97,.08)}.badge.medium{color:var(--mix);background:rgba(116,87,216,.08)}.badge.low{color:var(--down);background:rgba(36,116,216,.08)}.badge.watch{color:var(--flat);background:rgba(193,138,24,.09)}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}.score{font-size:30px;font-weight:850;letter-spacing:-.8px}.bar{height:8px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}.memo{font-size:13px;line-height:1.55;color:rgba(24,34,49,.82);margin-top:9px}.implication{font-size:12px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11));border:1px solid var(--line);border-radius:14px;padding:10px;margin-top:8px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.section{border-top:1px solid var(--line);padding-top:9px;margin-top:9px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.82);cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.20),rgba(107,178,255,.18));font-weight:760}.panel{display:none}.panel.active{display:block}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Case Comparison</h1><div class="sub">현재 신호와 과거 사례 유사도 비교</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./market-memory.html">Memory</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 5-3</div><div class="headline">과거 사례 비교</div><div class="sub" id="updatedAt">불러오는 중...</div><div class="quick"><a href="./market-memory.html">시장 메모리</a><a href="./event-calendar.html">이벤트 캘린더</a><a href="./history-prediction.html">추세</a><a href="./reasoning.html">종합근거</a></div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="tabs"><button class="tab active" data-panel="comparison">현재 유사사례</button><button class="tab" data-panel="pattern">패턴 요약</button><button class="tab" data-panel="species">축종 요약</button></div>
  <section id="panel-comparison" class="panel active"><div class="grid cols" id="comparisonCards"><div class="empty">불러오는 중...</div></div></section>
  <section id="panel-pattern" class="panel"><div class="grid cols" id="patternCards"><div class="empty">불러오는 중...</div></div></section>
  <section id="panel-species" class="panel"><div class="grid cols" id="speciesCards"><div class="empty">불러오는 중...</div></div></section>
</main>
<script>
const PATH='./data/analysis/case_comparison.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function grade(g){return ['high','medium','low','watch'].includes(g)?g:'watch';}
function bar(v){v=Math.max(0,Math.min(100,Number(v)||0));return `<div class="bar"><i style="width:${v}%"></i></div>`;}
function renderKpis(s){const items=[['비교 사례',s.comparison_count||0],['높은 유사도',s.high_similarity_count||0],['패턴 수',s.pattern_count||0],['축종 수',s.species_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function renderComparison(c){return `<article class="card"><div class="topline"><div><h2>${esc(c.name)}</h2><div class="small">현재 ${esc(c.current_status||'-')} · ${esc(c.current_signal_score||0)}점</div></div><span class="badge ${grade(c.similarity_grade)}">유사도 ${esc(c.similarity_label)}</span></div><div class="score">${esc(c.similarity_score||0)}점</div>${bar(c.similarity_score)}<div class="memo">${esc(c.case_date||'-')} · ${esc(c.case_memo||'')}</div><div class="chips"><span class="chip">사례 ${esc(c.case_from_score||0)} → ${esc(c.case_to_score||0)}</span><span class="chip">변동 ${esc(c.case_change||0)}</span>${safeArray(c.reasons).map(r=>`<span class="chip">${esc(r)}</span>`).join('')}</div>${safeArray(c.nearby_calendar_events).length?`<div class="section"><b class="small">인접 이벤트</b>${safeArray(c.nearby_calendar_events).slice(0,2).map(e=>`<div class="small">${esc(e.title)} · ${esc(e.distance_days)}일 차이</div>`).join('')}</div>`:''}<div class="implication">${esc(c.purchase_implication||'')}</div></article>`;}
function renderPattern(p){return `<article class="card"><div class="topline"><div><h2>${esc(p.name)} · ${esc(p.event_type_label||p.event_type)}</h2><div class="small">사례 ${esc(p.case_count||0)}건 · 캘린더 연결 ${esc(p.calendar_linked_count||0)}건</div></div><span class="badge good">패턴</span></div><div class="chips"><span class="chip">평균변동 ${esc(p.avg_change||0)}</span><span class="chip">최대변동 ${esc(p.max_abs_change||0)}</span></div><div class="implication">${esc(p.typical_implication||'')}</div><div class="section">${safeArray(p.representative_cases).slice(0,3).map(c=>`<div class="small"><b>${esc(c.date||'-')}</b> · ${esc(c.memo||'')}</div>`).join('')||'<div class="small">대표 사례 없음</div>'}</div></article>`;}
function renderSpecies(s){const top=s.top_similarity;const pat=s.top_pattern;return `<article class="card"><div class="topline"><div><h2>${esc(s.name)}</h2><div class="small">유사사례 ${esc(s.similar_case_count||0)}건 · 패턴 ${esc(s.pattern_count||0)}건</div></div><span class="badge ${s.high_similarity_count?'high':'watch'}">높은 유사도 ${esc(s.high_similarity_count||0)}</span></div><div class="memo">${esc(s.summary_note||'')}</div>${top?`<div class="section"><b class="small">최상위 유사사례</b><div class="small">${esc(top.case_date)} · ${esc(top.case_memo)} · 유사도 ${esc(top.similarity_score)}</div></div>`:''}${pat?`<div class="section"><b class="small">대표 패턴</b><div class="small">${esc(pat.event_type_label||pat.event_type)} · 사례 ${esc(pat.case_count)}건 · 평균 ${esc(pat.avg_change)}</div></div>`:''}</article>`;}
function bindTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+btn.dataset.panel));}));}
async function init(){try{const data=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'');renderKpis(data.summary||{});$('comparisonCards').innerHTML=safeArray(data.comparisons).map(renderComparison).join('')||'<div class="empty">현재 신호와 유사한 과거 사례 없음</div>';$('patternCards').innerHTML=safeArray(data.patterns).map(renderPattern).join('')||'<div class="empty">패턴 없음</div>';$('speciesCards').innerHTML=safeArray(data.species).map(renderSpecies).join('')||'<div class="empty">축종 요약 없음</div>';bindTabs();}catch(e){console.error(e);$('comparisonCards').innerHTML='<div class="empty">사례 비교 데이터를 불러오지 못했습니다. 다음 자동 업데이트 후 다시 확인하세요.</div>';}}
init();
</script>
</body>
</html>
