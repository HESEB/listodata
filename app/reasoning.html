<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>종합판단근거 | HESEB Livestock Terminal</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--up:#d93c61;--flat:#c18a18;--down:#2474d8;--mix:#7457d8;--good:#168a5b;--hold:#777}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.92);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}
    .top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub{color:var(--sub);font-size:12px;line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.8);padding:8px 12px;border-radius:999px;color:var(--text);text-decoration:none;font-size:13px;margin-left:6px}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick a{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:999px;padding:6px 9px;text-decoration:none;color:var(--text)}
    .grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.summary{font-size:13px;line-height:1.55;color:rgba(24,34,49,.82);margin-top:10px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.7);white-space:nowrap}.badge.up{color:var(--up);background:rgba(217,60,97,.08)}.badge.neutral,.badge.flat{color:var(--flat);background:rgba(193,138,24,.09)}.badge.down{color:var(--down);background:rgba(36,116,216,.08)}.badge.mixed{color:var(--mix);background:rgba(116,87,216,.08)}.badge.hold{color:var(--hold);background:rgba(0,0,0,.05)}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}
    .score{font-size:30px;font-weight:850;letter-spacing:-1px}.bar{height:8px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}.chain,.metrics,.axis-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}.step,.metric,.axis{border:1px solid var(--line);background:rgba(255,255,255,.68);border-radius:16px;padding:10px}.step-top,.metric-top,.axis-top,.card-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.step b,.metric b,.axis b{font-size:13px}.impact,.metric-sub,.axis-sub{font-size:12px;color:var(--sub);line-height:1.45;margin-top:5px}.metric-value{font-size:18px;font-weight:780}.logic{font-size:12px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11));border:1px solid var(--line);border-radius:14px;padding:10px;margin-top:12px}.notice{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px;margin-top:14px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.6)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.examples{margin-top:8px;display:flex;flex-direction:column;gap:6px}.ex{border:1px dashed var(--line);border-radius:12px;padding:8px;background:rgba(255,255,255,.58)}.ex a{color:#2474d8;text-decoration:none}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:720px){.two{grid-template-columns:1fr}.brand{display:block}.btn{margin-top:8px;margin-left:0}.headline{font-size:19px}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>HESEB Livestock Terminal</h1><div class="sub">Korean Market Intelligence Platform by Selfmaker company</div></div><div><a class="btn" href="./main.html">Dashboard</a><a class="btn" href="./admin.html">Admin</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Integrated Evidence Reasoning</div><div class="headline">종합판단근거</div><div class="sub" id="ruleText">가격·수급·질병·정책·뉴스를 시장신호와 구매판단으로 연결합니다.</div><div class="quick"><a href="./score-engine.html">Evidence Score</a><a href="./evidence-chain.html">Evidence Chain</a><a href="./conflict-report.html">Conflict</a><a href="./cross-market.html">Cross Market</a><a href="./history-prediction.html">History</a></div></div></div>
  <div class="grid cols" id="reasoningCards"><div class="empty">판단근거를 불러오는 중...</div></div>
  <div class="notice" id="noticeBox"></div>
</main>
<script>
const PATH_SCORE='./data/analysis/evidence_scores.json';
const PATH_CHAIN='./data/analysis/evidence_chains.json';
const PATH_CONFLICT='./data/analysis/conflict_report.json';
const PATH_HISTORY='./data/analysis/history_prediction.json';
const PATH_REASONING='./data/market_reasoning.json';
const PATH_METRICS='./data/market_metrics.json';
const $=id=>document.getElementById(id);
const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const emoji=(id)=>({BEEF:'🐂',PORK:'🐖',POULTRY:'🐔',DUCK:'🦆',EGG:'🥚',OTHER:'📌'}[id]||'📌');
async function fetchJSON(path){const r=await fetch(path+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path);return r.json();}
function cls(d){return d==='up'?'up':(d==='down'?'down':(d==='hold'?'hold':(d==='mixed'?'mixed':'neutral')));}
function bar(v,max=100){const n=Math.max(0,Math.min(max,Number(v)||0));const pct=max===100?n:Math.round(n/max*100);return `<div class="bar"><i style="width:${pct}%"></i></div>`;}
function axisLabel(k,score){return score?.score_breakdown_labels?.[k]||({price:'가격',supply:'수급/도축',disease:'질병/방역',policy:'정책/고시',news:'뉴스/수요'}[k]||k);}
function renderAxis(k,score){const d=score.axis_detail?.[k]||{};const b=score.score_breakdown?.[k]||0;const max=d.max_score||({price:30,supply:25,disease:20,policy:10,news:15}[k]||100);return `<div class="axis"><div class="axis-top"><div><b>${esc(axisLabel(k,score))}</b><div class="axis-sub">자료 ${esc(d.items||0)}건 · ▲${esc(d.up||0)} ▼${esc(d.down||0)} =${esc(d.neutral||0)}</div></div><span class="badge good">${esc(b)} / ${esc(max)}</span></div>${bar(b,max)}<div class="examples">${safeArray(d.examples).slice(0,1).map(x=>`<div class="ex">${esc(x.title||'')}<div class="axis-sub">품질 ${esc(x.quality_score||0)} · 출처레벨 ${esc(x.source_level||0)}</div></div>`).join('')}</div></div>`;}
function renderChain(chain){const summary=safeArray(chain?.summary_chain);return `<div class="chain">${summary.map(x=>`<div class="step"><div class="step-top"><b>${esc(x.step)}</b><span class="badge">${esc(x.value||'')}</span></div><div class="impact">${esc(x.meaning||'')}</div></div>`).join('')||'<div class="empty">근거 체인 없음</div>'}</div>`;}
function renderConflict(score,chain,conflict){const hold=score.hold_decision||{};const c=score.conflict||chain?.conflict||{};const missing=chain?.missing_evidence||conflict?.missing_evidence||[];let html='';if(hold.should_hold||score.direction==='hold')html+=`<div class="notice"><b>판단 유보</b><br>${esc((hold.reasons||[]).join(', ')||chain?.hold_reason||'근거 보강 필요')}<br>조정 신뢰도: ${esc(hold.adjusted_confidence||score.confidence_score||0)}점</div>`;if(c.has_conflict)html+=`<div class="notice"><b>충돌 감지</b><br>${esc(c.memo||'상·하방 근거 혼재')}<br>충돌축: ${esc(safeArray(c.axes).join(', ')||safeArray(conflict?.conflict_axes).join(', '))}</div>`;if(safeArray(missing).length)html+=`<div class="notice"><b>누락 근거</b><br>${esc(safeArray(missing).join(', '))}</div>`;return html;}
function renderHistory(pred){if(!pred)return '';const p=pred.prediction||{};const w=pred.windows||{};return `<div class="logic"><b>추세 참고</b><br>${esc(p.label||'-')} · ${esc(p.memo||'')} · 신뢰도 ${esc(p.confidence||0)}점<div class="chips"><span class="chip">7일 ${esc(w['7d']?.memo||'-')}</span><span class="chip">14일 ${esc(w['14d']?.memo||'-')}</span><span class="chip">30일 ${esc(w['30d']?.memo||'-')}</span></div></div>`;}
function renderEngineCard(score,chain,conflict,pred){const id=score.id;const direction=score.direction||'hold';return `<section class="card"><div class="card-top"><div><h2>${emoji(id)} ${esc(score.name||id)}</h2><div class="sub">근거 ${esc(score.evidence_count||0)}건 · 공식 ${esc(score.official_count||0)}건 · 커버리지 ${esc(score.coverage_rate||0)}%</div></div><span class="badge ${cls(direction)}">${esc(score.status||'판단 유보')}</span></div><div class="two"><div><div class="sub" style="margin-top:12px">시장신호</div><div class="score">${esc(score.signal_score||0)}점</div>${bar(score.signal_score)}<div class="chips"><span class="chip">신뢰도 ${esc(score.confidence_score||0)}점</span><span class="chip">품질 ${esc(score.quality_score||0)}점</span></div></div><div><div class="logic"><b>왜?</b><br>${esc(score.reason||chain?.reason||'유효 근거 부족')}</div><div class="logic"><b>구매전략</b><br>${esc(chain?.purchase_action||'추가 확인 필요')}</div></div></div>${renderConflict(score,chain,conflict)}${renderHistory(pred)}<div class="logic"><b>점수 구성</b></div><div class="axis-list">${['price','supply','disease','policy','news'].map(k=>renderAxis(k,score)).join('')}</div><div class="logic"><b>근거 체인</b></div>${renderChain(chain)}</section>`;}
function legacyTone(id){return id==='BEEF'||id==='POULTRY'?'up':(id==='PORK'?'mixed':(id==='EGG'?'down':'flat'));}
function fmtChange(n){const v=Number(n); if(!Number.isFinite(v)) return '-'; if(Math.abs(v)>=50) return Math.round(v)+'점'; return (v>0?'+':'')+v.toFixed(1)+'%';}
function renderMetric(m){const c=cls(m.direction); const w=Math.max(0,Math.min(100,Math.abs(Number(m.change)||0)));return `<div class="metric"><div class="metric-top"><b>${esc(m.label)}</b><span class="badge ${c}">${esc(m.change_label||'변화')}</span></div><div class="metric-value">${esc(m.value)}</div><div class="metric-sub"><span>${fmtChange(m.change)}</span> · 출처키: ${esc(m.source_ref)}</div>${bar(Math.max(8,w))}</div>`;}
function renderLegacyCard(sp, metric){const score=Math.max(0,Math.min(100,Number(metric?.signal_score ?? sp.confidence_score)||0));const dataScore=Math.max(0,Math.min(100,Number(metric?.data_confidence)||0));return `<section class="card"><div class="card-top"><h2>${emoji(sp.id)} ${esc(sp.name)}</h2><span class="badge ${legacyTone(sp.id)}">${esc(sp.signal)}</span></div><div class="summary">${esc(metric?.metric_summary || sp.reasoning_summary)}</div><div class="logic"><b>보고 로직</b><br>${esc(sp.report_logic)}</div><div style="margin-top:12px"><div class="sub">시장신호 점수</div><div class="score">${score}%</div>${bar(score)}</div><div style="margin-top:12px"><div class="sub">데이터 신뢰도</div><div class="score">${dataScore}%</div>${bar(dataScore)}</div><div class="metrics">${safeArray(metric?.metrics).map(renderMetric).join('')||'<div class="empty">등록된 핵심지표가 없습니다.</div>'}</div></section>`;}
async function init(){try{const [scores,chains,conflicts,history]=await Promise.all([fetchJSON(PATH_SCORE),fetchJSON(PATH_CHAIN),fetchJSON(PATH_CONFLICT).catch(()=>({species:[]})),fetchJSON(PATH_HISTORY).catch(()=>({items:[]}))]);const chainMap=new Map(safeArray(chains.items).map(x=>[x.id,x]));const conflictMap=new Map(safeArray(conflicts.species).map(x=>[x.id,x]));const predMap=new Map(safeArray(history.items).map(x=>[x.id,x]));$('ruleText').textContent='Evidence Score·Chain·Conflict·History를 연결한 종합판단근거입니다.';$('noticeBox').textContent=(scores.policy||'')+' / '+(chains.policy||'')+' / '+(conflicts.policy||'');$('reasoningCards').innerHTML=safeArray(scores.species).map(s=>renderEngineCard(s,chainMap.get(s.id),conflictMap.get(s.id),predMap.get(s.id))).join('')||'<div class="empty">등록된 판단근거가 없습니다.</div>';return;}catch(e){console.warn('analysis engine reasoning failed, fallback legacy',e);}try{const [reasoning,metrics]=await Promise.all([fetchJSON(PATH_REASONING),fetchJSON(PATH_METRICS)]);const metricMap=new Map(safeArray(metrics.species).map(m=>[m.id,m]));$('ruleText').textContent=reasoning.logic_rule||'가격·수급·질병·정책·뉴스를 종합합니다.';$('noticeBox').textContent=(metrics.notice||'')+' '+(reasoning.notice||'');$('reasoningCards').innerHTML=safeArray(reasoning.species).map(sp=>renderLegacyCard(sp,metricMap.get(sp.id))).join('')||'<div class="empty">등록된 판단근거가 없습니다.</div>';}catch(e){console.error(e);$('reasoningCards').innerHTML='<div class="empty">판단근거 데이터를 불러오지 못했습니다.</div>';}}
init();
</script>
</body>
</html>
