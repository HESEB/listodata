<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 판단근거 | HESEB Livestock Terminal</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.92);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--up:#d93c61;--flat:#c18a18;--down:#2474d8;--mix:#7457d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.92);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}
    .top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub{color:var(--sub);font-size:12px;line-height:1.45}.btn{border:1px solid var(--line);background:rgba(255,255,255,.8);padding:8px 12px;border-radius:999px;color:var(--text);text-decoration:none;font-size:13px}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}
    .grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2{margin:0;font-size:17px}.summary{font-size:13px;line-height:1.55;color:rgba(24,34,49,.82);margin-top:10px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.7);white-space:nowrap}.badge.up{color:var(--up);background:rgba(217,60,97,.08)}.badge.flat{color:var(--flat);background:rgba(193,138,24,.09)}.badge.down{color:var(--down);background:rgba(36,116,216,.08)}.badge.mixed{color:var(--mix);background:rgba(116,87,216,.08)}
    .score{font-size:28px;font-weight:800;letter-spacing:-1px}.bar{height:8px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}.chain,.metrics{display:flex;flex-direction:column;gap:8px;margin-top:12px}.step,.metric{border:1px solid var(--line);background:rgba(255,255,255,.68);border-radius:16px;padding:10px}.step-top,.metric-top{display:flex;justify-content:space-between;gap:8px;align-items:center}.step b,.metric b{font-size:13px}.impact,.metric-sub{font-size:12px;color:var(--sub);line-height:1.45;margin-top:5px}.metric-value{font-size:18px;font-weight:780}.change.up{color:var(--up)}.change.down{color:var(--down)}.change.mixed{color:var(--mix)}.change.flat{color:var(--flat)}.logic{font-size:12px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11));border:1px solid var(--line);border-radius:14px;padding:10px;margin-top:12px}.notice{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px;margin-top:14px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.6)}
    @media(max-width:620px){.brand{display:block}.btn{display:inline-block;margin-top:8px}.headline{font-size:19px}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>HESEB Livestock Terminal</h1><div class="sub">Korean Market Intelligence Platform by Selfmaker company</div></div><a class="btn" href="./index.html">Dashboard로 돌아가기</a></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Evidence Chain + Market Metrics</div><div class="headline">AI 판단근거</div><div class="sub" id="ruleText">가격·수급·질병·정책·뉴스를 시장신호로 연결합니다.</div></div></div>
  <div class="grid cols" id="reasoningCards"><div class="empty">판단근거를 불러오는 중...</div></div>
  <div class="notice" id="noticeBox"></div>
</main>
<script>
const PATH_REASONING='./data/market_reasoning.json';
const PATH_METRICS='./data/market_metrics.json';
const $=id=>document.getElementById(id);
const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const tone=(id)=>id==='BEEF'||id==='POULTRY'?'up':(id==='PORK'?'mixed':(id==='EGG'?'down':'flat'));
const emoji=(id)=>({BEEF:'🐂',PORK:'🐖',POULTRY:'🐔',DUCK:'🦆',EGG:'🥚',OTHER:'📌'}[id]||'📌');
async function fetchJSON(path){const r=await fetch(path,{cache:'no-store'});if(!r.ok)throw new Error(path);return r.json();}
function cls(d){return d==='up'?'up':(d==='down'?'down':(d==='mixed'?'mixed':'flat'));}
function fmtChange(n){const v=Number(n); if(!Number.isFinite(v)) return '-'; if(Math.abs(v)>=50) return Math.round(v)+'점'; return (v>0?'+':'')+v.toFixed(1)+'%';}
function renderMetric(m){const c=cls(m.direction); const w=Math.max(0,Math.min(100,Math.abs(Number(m.change)||0)));return `<div class="metric"><div class="metric-top"><b>${esc(m.label)}</b><span class="badge ${c}">${esc(m.change_label||'변화')}</span></div><div class="metric-value">${esc(m.value)}</div><div class="metric-sub"><span class="change ${c}">${fmtChange(m.change)}</span> · 출처키: ${esc(m.source_ref)}</div><div class="bar"><i style="width:${Math.max(8,w)}%"></i></div></div>`;}
function renderStep(s){const w=Math.max(0,Math.min(100,Number(s.weight)||0));return `<div class="step"><div class="step-top"><b>${esc(s.step)} · ${esc(s.signal)}</b><span class="badge">${w}%</span></div><div class="impact">${esc(s.impact)}<br/>출처키: ${esc(s.source_ref)}</div><div class="bar"><i style="width:${w}%"></i></div></div>`;}
function renderCard(sp, metric){const score=Math.max(0,Math.min(100,Number(metric?.signal_score ?? sp.confidence_score)||0));const dataScore=Math.max(0,Math.min(100,Number(metric?.data_confidence)||0));return `<section class="card"><div class="step-top"><h2>${emoji(sp.id)} ${esc(sp.name)}</h2><span class="badge ${tone(sp.id)}">${esc(sp.signal)}</span></div><div class="summary">${esc(metric?.metric_summary || sp.reasoning_summary)}</div><div class="logic"><b>보고 로직</b><br/>${esc(sp.report_logic)}</div><div style="margin-top:12px"><div class="sub">시장신호 점수</div><div class="score">${score}%</div><div class="bar"><i style="width:${score}%"></i></div></div><div style="margin-top:12px"><div class="sub">데이터 신뢰도</div><div class="score">${dataScore}%</div><div class="bar"><i style="width:${dataScore}%"></i></div></div><div class="logic"><b>숫자 기반 핵심지표</b><br/>자동수집 전 단계에서는 샘플 증감률이며, 향후 공식 출처 데이터와 연결됩니다.</div><div class="metrics">${safeArray(metric?.metrics).map(renderMetric).join('')||'<div class="empty">등록된 핵심지표가 없습니다.</div>'}</div><div class="logic"><b>근거 연결 흐름</b></div><div class="chain">${safeArray(sp.evidence_chain).map(renderStep).join('')}</div></section>`;}
async function init(){try{const [reasoning,metrics]=await Promise.all([fetchJSON(PATH_REASONING),fetchJSON(PATH_METRICS)]);const metricMap=new Map(safeArray(metrics.species).map(m=>[m.id,m]));$('ruleText').textContent=reasoning.logic_rule||'가격·수급·질병·정책·뉴스를 종합합니다.';$('noticeBox').textContent=(metrics.notice||'')+' '+(reasoning.notice||'');$('reasoningCards').innerHTML=safeArray(reasoning.species).map(sp=>renderCard(sp,metricMap.get(sp.id))).join('')||'<div class="empty">등록된 판단근거가 없습니다.</div>';}catch(e){console.error(e);$('reasoningCards').innerHTML='<div class="empty">판단근거 데이터를 불러오지 못했습니다.</div>';}}
init();
</script>
</body>
</html>
