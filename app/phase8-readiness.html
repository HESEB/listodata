<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 8 최종검증 | HESEB</title><style>
:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;background:rgba(245,250,252,.95);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:10px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.55}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:820}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(6,1fr)}.cols{grid-template-columns:repeat(2,1fr)}@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.cols{grid-template-columns:1fr}}@media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:26px;font-weight:830}.badge{display:inline-flex;padding:5px 8px;border:1px solid var(--line);border-radius:999px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.row{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.row:first-child{border-top:0;margin-top:0;padding-top:0}.empty{padding:20px;text-align:center;border:1px dashed var(--line);border-radius:16px;color:var(--sub)}
</style></head><body><header><div class="top"><div class="brand"><div><h1>Phase 8 최종검증·실운영 준비도</h1><div class="sub">실제 공식데이터 연결과 대표뉴스 운영 안전장치 점검</div></div><div><a class="btn" href="./admin2-dashboard.html">Admin 2.0</a> <a class="btn" href="./actions-guide.html">Actions 실행</a></div></div></div></header><main>
<div class="hero"><div><div class="sub">Phase 8 Final</div><div class="headline">구조 완료와 실데이터 운영 가능 여부를 분리합니다.</div><div class="sub" id="updated">검증 결과를 불러오는 중...</div></div></div>
<section class="grid kpis" id="kpis"></section>
<section class="grid cols" style="margin-top:12px"><article class="card"><h2 style="margin:0;font-size:17px">단계별 구현</h2><div id="checks" style="margin-top:10px"></div></article><article class="card"><h2 style="margin:0;font-size:17px">실운영 차단 항목</h2><div id="blockers" style="margin-top:10px"></div></article></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">다음 실행 순서</h2><div id="actions" style="margin-top:10px"></div></section>
</main><script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const cls=s=>s==='ready'||s==='pass'?'good':s==='limited'?'warn':'bad';
(async()=>{try{const r=await fetch('./data/admin/phase8_readiness.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{};$('updated').textContent=`갱신 ${d.updated_at||'Actions 실행 전'} · 최종 판정 ${s.overall_status||'-'}`;const rows=[['최종',s.overall_status||'-'],['구조',s.structure_status||'-'],['Workflow',s.workflow_status||'-'],['API',`${s.api_ready_count||0}/${s.api_total_count||3}`],['KOSIS 매핑',`${s.mapping_ready_count||0}/${s.mapping_total_count||10}`],['원문 확인',s.original_page_processed_count||0]];$('kpis').innerHTML=rows.map(([a,b],i)=>`<div class="card"><div class="sub">${esc(a)}</div><div class="${i<3?'':'kpi'}">${i<3?`<span class="badge ${cls(b)}">${esc(b)}</span>`:esc(b)}</div></div>`).join('');const checks=Array.isArray(d.checks)?d.checks:[];$('checks').innerHTML=checks.length?checks.map(x=>`<div class="row"><span class="badge ${cls(x.status)}">${esc(x.status)}</span> <b>Phase ${esc(x.phase)} ${esc(x.name)}</b><div class="sub">${esc(x.path)} · ${esc(x.message)}</div></div>`).join(''):'<div class="empty">다음 Actions 실행 후 상세 점검이 표시됩니다.</div>';const blockers=Array.isArray(d.blockers)?d.blockers:[];$('blockers').innerHTML=blockers.length?blockers.map(x=>`<div class="row"><span class="badge warn">LIMITED</span> ${esc(x)}</div>`).join(''):'<div class="empty">실운영 차단 항목 없음</div>';const acts=Array.isArray(d.next_actions)?d.next_actions:[];$('actions').innerHTML=acts.map((x,i)=>`<div class="row"><b>${i+1}. ${esc(x)}</b></div>`).join('');}catch(e){$('updated').textContent='검증 상태를 불러오지 못했습니다.';$('checks').innerHTML='<div class="empty">다음 Actions 실행 후 확인하세요.</div>';}})();
</script></body></html>
