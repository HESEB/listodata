<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recommendation Engine | HESEB DSS 2.0</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.95);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.94);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{font-size:18px;margin:0}.sub,.small{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;border:1px solid var(--line);background:white;padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px}.hero{padding:14px;border-radius:26px;background:linear-gradient(150deg,rgba(241,133,174,.23),rgba(248,184,113,.18),rgba(107,178,255,.18));margin-bottom:14px}.hero>div{background:rgba(255,255,255,.80);border:1px solid var(--line);border-radius:21px;padding:16px}.hero h2{margin:3px 0;font-size:25px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cards{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));margin-top:12px}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.kpi{font-size:28px;font-weight:850}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.badge.ready{color:var(--good);background:rgba(22,138,91,.08)}.badge.hold{color:var(--bad);background:rgba(217,60,97,.08)}.badge.medium,.badge.low{color:var(--warn);background:rgba(193,138,24,.09)}.action{font-size:25px;font-weight:850;margin:9px 0}.direction{font-size:14px;font-weight:750}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.reason{font-size:13px;line-height:1.55;margin-top:8px}.notice{border:1px dashed var(--line);border-radius:14px;padding:9px;margin-top:9px;font-size:12px;color:var(--sub)}.empty{text-align:center;padding:25px;color:var(--sub);border:1px dashed var(--line);border-radius:18px}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Recommendation Engine</h1><div class="sub">Phase 7-5 구매 행동 추천</div></div><div><a class="btn" href="./direction-engine-v2.html">Direction</a> <a class="btn" href="./main.html">Dashboard</a></div></div></div></header>
<main>
  <section class="hero"><div><div class="small">DSS 2.0 · Phase 7-5</div><h2>시장 방향을 구매 행동으로 변환</h2><div class="sub" id="updated">Recommendation 결과를 불러오는 중...</div></div></section>
  <section class="grid kpis" id="kpis"></section>
  <section class="grid cards" id="cards"><div class="empty">불러오는 중...</div></section>
</main>
<script>
const PATH='./data/admin/recommendation_engine.json';const $=id=>document.getElementById(id);const arr=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function load(){const r=await fetch(PATH+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(r.status);return r.json();}
function renderKpi(s){const items=[['전체 축종',s.species_count||0],['추천 가능',s.ready_count||0],['판단 유보',s.hold_count||0],['상태',s.status||'-']];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function card(x){const status=x.recommendation_status||'hold';const second=arr(x.secondary_actions).map(a=>`<span class="chip">${esc(a.label)}</span>`).join('');const reasons=arr(x.reasons).map(r=>`<div class="reason">• ${esc(r)}</div>`).join('');return `<article class="card"><div><span class="badge ${esc(status)}">${status==='ready'?'추천 가능':'판단 유보'}</span></div><h3>${esc(x.label||x.species)}</h3><div class="direction">${esc(x.direction_symbol||'?')} ${esc(x.direction_label||'판단 유보')} · 방향점수 ${esc(x.direction_score??0)}</div><div class="action">${esc(x.primary_action?.label||'판단 유보')}</div><div class="chips"><span class="chip">긴급도 ${esc(x.urgency||'-')}</span><span class="chip">신뢰도 ${esc(x.confidence_score??0)}</span><span class="chip">Coverage ${esc(x.coverage_score??0)}</span>${second}</div>${reasons}<div class="notice">${arr(x.limitations).map(esc).join(' · ')}</div></article>`;}
(async()=>{try{const d=await load();$('updated').textContent=`갱신 ${d.updated_at||'N/A'} · ${d.notice||''}`;renderKpi(d.summary||{});$('cards').innerHTML=arr(d.species).map(card).join('')||'<div class="empty">추천 결과 없음</div>';}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">추천 결과가 아직 생성되지 않았습니다. Actions 실행 후 확인하세요.</div>';}})();
</script>
</body>
</html>
