<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HESEB Livestock Terminal</title>
  <style>
    :root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--up:#d93c61;--down:#2474d8;--flat:#c18a18;--mix:#7457d8}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.wrap{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.45}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tab{border:1px solid var(--line);background:white;padding:8px 12px;border-radius:999px;cursor:pointer}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.18),rgba(107,178,255,.16));font-weight:760}.hero{background:linear-gradient(160deg,rgba(241,133,174,.24),rgba(248,184,113,.18),rgba(165,115,237,.15),rgba(107,178,255,.16));padding:14px;border-radius:26px;margin:14px 0}.hero-in{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px}.headline{font-size:22px;font-weight:800;letter-spacing:-.6px}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2{margin:0;font-size:17px}.card h3{margin:0;font-size:15px}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.8)}.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--flat)}.mixed{color:var(--mix)}.metric,.rule-row{border-top:1px solid var(--line);padding:10px 0}.metric:first-child,.rule-row:first-child{border-top:0}.metric-top{display:flex;justify-content:space-between;gap:8px}.metric-name{font-size:13px;font-weight:760}.metric-value{font-size:21px;font-weight:850;margin-top:4px}.metric-sub{font-size:12px;color:var(--sub);line-height:1.45}.meaning,.scorebox{font-size:12px;margin-top:6px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.10),rgba(107,178,255,.10));border:1px solid var(--line);border-radius:12px;padding:7px}.score{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.78)}.pill b{font-size:15px}.summary{font-size:13px;color:rgba(24,34,49,.82);line-height:1.55;margin-top:10px}.panel{display:none}.panel.active{display:block}.link-card{display:block;color:inherit;text-decoration:none}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.6)}.notice{font-size:12px;color:var(--sub);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px;margin-top:14px}@media(max-width:620px){.brand{display:block}.headline{font-size:18px}}
  </style>
</head>
<body>
<header><div class="wrap"><div class="brand"><div><h1>HESEB Livestock Terminal</h1><div class="sub">Korean Market Intelligence Platform by Selfmaker company</div></div><div class="sub">v4.1 Score Explained</div></div><div class="tabs" id="tabs"></div></div></header>
<main class="wrap">
  <section id="dashboard" class="panel active"><div class="hero"><div class="hero-in"><div class="sub">Market Signal Summary</div><div class="headline" id="headline">시장신호를 불러오는 중입니다.</div><div class="sub" id="updated"></div></div></div><div class="grid cols" id="speciesGrid"></div><div class="notice" id="notice"></div></section>
  <section id="detail" class="panel"><div id="detailBody"></div></section>
  <section id="sources" class="panel"><div class="hero"><div class="hero-in"><div class="sub">Reference Hub</div><div class="headline">자료출처</div></div></div><div class="grid cols" id="sourceGrid"></div></section>
</main>
<script>
const tabs=[['dashboard','Dashboard'],['BEEF','한우'],['PORK','돈육'],['POULTRY','계육'],['DUCK','오리'],['EGG','계란'],['sources','자료출처']];
const $=id=>document.getElementById(id);const safe=x=>Array.isArray(x)?x:[];const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let DASH=null,METRICS=null,SOURCES=null,SCORE=null;
async function fetchJSON(p){const r=await fetch(p,{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function cls(d){return d==='up'?'up':d==='down'?'down':d==='mixed'?'mixed':'flat'}
function unitOf(m){if(m.unit)return m.unit;if(/도계/.test(m.label))return '수';if(/도축/.test(m.label))return '두';if(/지육|가격/.test(m.label))return '원/kg';if(/수요|질병|신뢰|점수|영향/.test(m.label))return '점';return ''}
function changeUnit(m){return m.change_unit || (m.change_label==='점수'?'점':'%')}
function fmtChange(m){const v=Number(m.change),u=changeUnit(m);if(!Number.isFinite(v))return '-';return u==='점'?Math.round(v)+'점':(v>0?'+':'')+v.toFixed(1)+u}
function meaning(m){if(m.interpretation)return m.interpretation;const v=Number(m.change),u=changeUnit(m);if(!Number.isFinite(v))return '비교 기준값 추가 확보 필요';if(u==='점'){if(v>=70)return '영향도 높음';if(v>=40)return '영향도 보통';return '영향도 낮음'}if(/도축|도계|공급/.test(m.label)){if(v<=-3)return '공급 감소 신호';if(v>=3)return '공급 증가 신호';return '공급 보합권'}if(v>=3)return '가격 상승 압력 우세';if(v<=-3)return '가격 하락 압력';return '가격 보합권'}
function emoji(id){return {BEEF:'🐂',PORK:'🐖',POULTRY:'🐔',DUCK:'🦆',EGG:'🥚',OTHER:'📌'}[id]||'📌'}
function metricHTML(m){const c=cls(m.direction);return `<div class="metric"><div class="metric-top"><div class="metric-name">${esc(m.label)}</div><span class="badge ${c}">${esc(m.change_label)}</span></div><div class="metric-value">${esc(m.value)}${esc(unitOf(m))}</div><div class="metric-sub"><span class="${c}">${fmtChange(m)}</span> · ${esc(m.source_ref)}</div><div class="meaning">→ ${esc(meaning(m))}</div></div>`}
function metricBy(id){return safe(METRICS?.species).find(x=>x.id===id)}function spBy(id){return safe(DASH?.species).find(x=>x.id===id)}
function bandFor(score){const v=Number(score);return safe(SCORE?.bands).find(b=>v>=Number(b.min)&&v<=Number(b.max))}
function scoreRulesHTML(mt){const b=bandFor(mt?.signal_score);const ruleList=safe(SCORE?.rules).slice(0,5).map(r=>`<div class="rule-row"><b>${esc(r.title)}</b><div class="summary">${esc(r.description)}</div><div class="scorebox">반영: ${esc(r.weight)}</div></div>`).join('');return `<div class="card"><h2>점수 산출 근거</h2><div class="summary">시장신호는 기준점수 ${esc(SCORE?.base_score??50)}점에서 가격·공급·질병·계절 요인을 가감한 참고 점수입니다.</div><div class="score"><span class="pill">현재 점수 <b>${esc(mt?.signal_score??'-')}점</b></span><span class="pill">판정 <b>${esc(b?.label||'구간 확인')}</b></span></div><div class="meaning">${esc(b?.meaning||'점수 구간 정보가 없습니다.')}</div><div style="margin-top:10px">${ruleList}</div><a class="pill" style="display:inline-flex;margin-top:10px;color:inherit;text-decoration:none" href="./score.html" target="_blank">전체 산식 보기 ↗</a></div>`}
function renderCard(sp){const mt=metricBy(sp.id);const main=safe(mt?.metrics).slice(0,2).map(metricHTML).join('');const b=bandFor(mt?.signal_score);return `<div class="card" onclick="go('${sp.id}')"><div class="metric-top"><h2>${esc(sp.emoji||emoji(sp.id))} ${esc(sp.name)}</h2><span class="badge ${cls(sp.tone)}">${esc(sp.signal)}</span></div><div class="summary">${esc(mt?.metric_summary||sp.summary)}</div><div class="score"><span class="pill">시장신호 <b>${esc(mt?.signal_score??'-')}점</b></span><span class="pill">${esc(b?.label||'점수구간')}</span><span class="pill">데이터 신뢰도 <b>${esc(mt?.data_confidence??'-')}점</b></span></div>${main||'<div class="empty">핵심지표 없음</div>'}</div>`}
function renderDashboard(){ $('headline').textContent=DASH?.market_overview?.headline||'공개지표 기반 시장신호';$('updated').textContent='갱신 '+(METRICS?.updated_at||DASH?.updated_at||'');$('notice').textContent=(METRICS?.unit_note||'')+' '+(METRICS?.notice||DASH?.notice||'');$('speciesGrid').innerHTML=safe(DASH?.species).map(renderCard).join('')||'<div class="empty">데이터 없음</div>'}
function renderDetail(id){const sp=spBy(id)||{id,name:id,signal:'확인'};const mt=metricBy(id);$('detailBody').innerHTML=`<div class="hero"><div class="hero-in"><div class="sub">Species Detail</div><div class="headline">${esc(sp.emoji||emoji(id))} ${esc(sp.name)} · ${esc(sp.signal)}</div><div class="sub">${esc(mt?.basis_month||'')} 기준 · 숫자·단위·해석·점수산식 통합 표시</div></div></div><div class="grid cols"><div class="card"><h2>시장 해석</h2><div class="summary">${esc(mt?.metric_summary||sp.summary||'')}</div><div class="score"><span class="pill">시장신호 <b>${esc(mt?.signal_score??'-')}점</b></span><span class="pill">데이터 신뢰도 <b>${esc(mt?.data_confidence??'-')}점</b></span></div></div><div class="card"><h2>핵심 지표</h2>${safe(mt?.metrics).map(metricHTML).join('')||'<div class="empty">핵심지표 없음</div>'}</div>${scoreRulesHTML(mt)}</div>`;show('detail')}
function renderSources(){const items=safe(SOURCES?.groups).flatMap(g=>safe(g.items).map(i=>({...i,group:g.title})));$('sourceGrid').innerHTML=items.map(i=>`<a class="card link-card" href="${esc(i.url)}" target="_blank"><div class="badge">${esc(i.group)}</div><h3 style="margin-top:8px">${esc(i.title)}</h3><div class="summary">${esc(i.subtitle||'')}<br>${esc(i.memo||'')}</div></a>`).join('')}
function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===id));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.id===id));window.scrollTo({top:0,behavior:'smooth'})}
function go(id){if(id==='dashboard'){show('dashboard');return}if(id==='sources'){renderSources();show('sources');return}renderDetail(id)}
async function init(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${t[0]==='dashboard'?'active':''}" data-id="${t[0]}" onclick="go('${t[0]}')">${t[1]}</button>`).join('');[DASH,METRICS,SOURCES,SCORE]=await Promise.all([fetchJSON('./data/market_dashboard.json'),fetchJSON('./data/market_metrics.json'),fetchJSON('./data/source_links.json'),fetchJSON('./data/score_rules.json')]);renderDashboard();}
init().catch(e=>{console.error(e);$('speciesGrid').innerHTML='<div class="empty">데이터를 불러오지 못했습니다.</div>'});
</script>
</body>
</html>
