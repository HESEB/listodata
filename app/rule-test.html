<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rule Test | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--up:#d93c61;--down:#2474d8;--flat:#c18a18;--mix:#7457d8;--good:#168a5b}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}textarea,input,select{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:10px;font-family:inherit;font-size:13px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.pass{color:var(--good);background:rgba(22,138,91,.08)}.badge.drop{color:var(--up);background:rgba(217,60,97,.08)}.badge.hold{color:#777;background:rgba(0,0,0,.05)}.badge.warn{color:var(--flat);background:rgba(193,138,24,.09)}.badge.axis{color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11))}.result-title{font-size:18px;font-weight:820;margin-top:8px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.memo{font-size:13px;color:rgba(24,34,49,.82);line-height:1.55;margin-top:10px}.patch{white-space:pre-wrap;font-size:12px;line-height:1.5;background:#15202b;color:#e9f2ff;border-radius:16px;padding:12px;max-height:300px;overflow:auto}.examples{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.example{border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:999px;padding:7px 10px;font-size:12px;cursor:pointer}.kv{display:grid;grid-template-columns:120px 1fr;gap:8px;border-top:1px solid var(--line);padding-top:8px;margin-top:8px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.kv{grid-template-columns:1fr}.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Rule Test</h1><div class="sub">필터 사전 · 축종 분류 · 방향성 · 영향도 테스트</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./classification-review.html">분류검수</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 3-4</div><div class="headline">규칙 테스트 페이지</div><div class="sub" id="updatedAt">필터 사전을 불러오는 중...</div></div></div>
  <section class="grid cols">
    <div class="card"><h2>기사 제목/본문 테스트</h2><div class="sub" style="margin-top:6px">기사 제목 또는 문장을 붙여넣으면 필터 결과를 즉시 확인합니다.</div><textarea id="inputText" rows="6" placeholder="예: HBM 이어 낸드…미운 오리 키옥시아 AI 붐"></textarea><div class="toolbar"><button class="btn" id="runBtn">테스트 실행</button><button class="btn" id="clearBtn">초기화</button><button class="btn" id="copyPatch">패치안 복사</button><button class="btn" id="downloadPatch">패치안 다운로드</button></div><div class="examples" id="examples"></div></div>
    <div class="card"><h2>판정 결과</h2><div id="resultBox"><div class="empty">테스트 문장을 입력하세요.</div></div></div>
  </section>
  <section class="grid cols" style="margin-top:12px">
    <div class="card"><h2>사전 매칭 상세</h2><div id="detailBox"><div class="empty">아직 테스트 결과가 없습니다.</div></div></div>
    <div class="card"><h2>검수 패치안</h2><div class="sub">사전에 추가할 제외어/포함어 또는 강제 분류 제안을 생성합니다.</div><pre class="patch" id="patchBox">{}</pre></div>
  </section>
</main>
<script>
const PATH='./data/admin/filter_dictionary.json';
const SPECIES={BEEF:'한우',PORK:'돈육',POULTRY:'계육',DUCK:'오리',EGG:'계란',OTHER:'기타'};
const AXIS={price:'가격',supply:'수급/도축',disease:'질병/방역',policy:'정책/고시',news:'뉴스/수요'};
const EXAMPLES=['HBM 이어 낸드…미운 오리 키옥시아 AI 붐','경북 돼지농장 구제역 발생 방역 강화','고병원성 조류인플루엔자 발생 계육 수급 우려','한우 도축두수 감소 정육류 가격 강세','계란 가격안정 대책 발표 산란계 수급 점검','돈육 후지 가격 하락 냉동재고 부담'];
const $=id=>document.getElementById(id);let DICT=null;let LAST=null;
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function hits(text,arr){return (arr||[]).filter(k=>k&&text.includes(k));}
function regexHits(text,patterns){return patterns.filter(([name,re])=>re.test(text)).map(([name])=>name);}
function speciesCandidates(text){const out=[];Object.entries(DICT.species_keywords||{}).forEach(([sp,keys])=>{const h=hits(text,keys);if(h.length)out.push({species:sp,label:SPECIES[sp]||sp,keywords:h,score:h.length});});return out.sort((a,b)=>b.score-a.score);}
function evidenceAxis(text){const rules=[['disease',/ASF|아프리카돼지열병|구제역|조류인플루엔자|고병원성|AI|방역|살처분|이동제한|농장/],['supply',/도축|도계|출하|수급|공급|사육|산란계|재고|물량|증체/],['price',/가격|시세|지육|도체가|급등|하락|상승|강세|약세|인상|인하/],['policy',/정책|대책|지원|고시|관세|가격안정|정부|농식품부|자조금/],['news',/수요|행사|명절|추석|설|복날|소비|외식|급식/]];const found=rules.filter(([,re])=>re.test(text)).map(([k])=>k);return found.length?found:['news'];}
function direction(text){const up=/급등|상승|강세|부족|감소|발생|확산|방역|살처분|수급난|인상|이동제한|리스크|우려/.test(text);const down=/하락|약세|안정|할인|공급 확대|수입 증가|인하|완화|재고 부담/.test(text);if(up&&down)return 'mixed';if(up)return 'up';if(down)return 'down';return 'neutral';}
function impact(text,axis,dir){if(axis.includes('disease'))return 5;if(axis.includes('supply')||axis.includes('price'))return dir==='neutral'?3:4;if(axis.includes('policy'))return 3;if(axis.includes('news'))return 2;return 1;}
function classify(text){const exclude=hits(text,DICT.exclude_keywords||[]);const include=hits(text,DICT.include_keywords||[]);const tech=regexHits(text,[['AI 기술/반도체',/AI|인공지능|반도체|HBM|낸드|키옥시아|KIOXIA|엔비디아|오픈AI/],['플랫폼/스타트업',/플랫폼|스타트업|로봇|웰니스/],['오리 관용표현',/미운 오리|오리 새끼|오리발|오리무중/]]);const species=speciesCandidates(text);const axes=evidenceAxis(text);const dir=direction(text);const imp=impact(text,axes,dir);let status='pass';let statusLabel='통과 후보';let reason=[];if(exclude.length&&include.length===0){status='drop';statusLabel='제외';reason.push('제외어 매칭');}else if(tech.length&&include.length===0){status='drop';statusLabel='제외';reason.push('비축산 오탐 패턴');}else if(!species.length&&include.length===0){status='hold';statusLabel='보류';reason.push('축산 맥락 부족');}else if(include.length&&tech.length){status='hold';statusLabel='보류';reason.push('포함어와 제외 패턴 동시 감지');}else{reason.push('축산 맥락 확인');}
  const result={input:text,status,statusLabel,reason,exclude_hits:exclude,include_hits:include,tech_hits:tech,species_candidates:species,evidence_axes:axes,evidence_axis_labels:axes.map(a=>AXIS[a]||a),market_direction:dir,impact_score:imp,patch:suggestPatch(text,status,exclude,include,species,axes,dir,imp)};return result;}
function suggestPatch(text,status,exclude,include,species,axes,dir,imp){const patch={policy:'rule_test_patch_v1',input:text,created_at:new Date().toISOString(),suggestions:[]};if(status==='drop'&&!exclude.length)patch.suggestions.push({type:'add_exclude_keyword',keyword:text.slice(0,30),reason:'비축산 오탐 후보'});if(status==='hold'&&species.length)patch.suggestions.push({type:'force_include_rule',species:species[0].species,market_direction:dir,impact_score:imp,axis:axes[0],reason:'포함어와 제외어 동시 감지 또는 보류'});if(status==='pass'&&species.length)patch.suggestions.push({type:'confirm_classification',species:species.map(x=>x.species),market_direction:dir,impact_score:imp,axis:axes});if(!species.length&&include.length)patch.suggestions.push({type:'add_species_keyword',keyword:include[0],species:'REVIEW_REQUIRED'});return patch;}
function statusClass(s){return s==='pass'?'pass':s==='drop'?'drop':'hold';}
function render(result){LAST=result;$('resultBox').innerHTML=`<span class="badge ${statusClass(result.status)}">${esc(result.statusLabel)}</span><div class="result-title">${esc(result.input)}</div><div class="chips"><span class="chip">방향 ${esc(result.market_direction)}</span><span class="chip">영향도 ${esc(result.impact_score)}</span>${result.evidence_axis_labels.map(x=>`<span class="chip">${esc(x)}</span>`).join('')}${result.species_candidates.map(x=>`<span class="chip">${esc(x.label)} ${x.score}</span>`).join('')}</div><div class="memo">사유: ${esc(result.reason.join(', '))}</div>`;
$('detailBox').innerHTML=`<div class="kv"><b>포함어</b><div>${esc(result.include_hits.join(', ')||'-')}</div></div><div class="kv"><b>제외어</b><div>${esc(result.exclude_hits.join(', ')||'-')}</div></div><div class="kv"><b>오탐패턴</b><div>${esc(result.tech_hits.join(', ')||'-')}</div></div><div class="kv"><b>축종후보</b><div>${result.species_candidates.map(x=>`${esc(x.label)}(${esc(x.keywords.join('/'))})`).join('<br>')||'-'}</div></div><div class="kv"><b>근거축</b><div>${esc(result.evidence_axis_labels.join(', '))}</div></div>`;
$('patchBox').textContent=JSON.stringify(result.patch,null,2);}
function run(){const text=($('inputText').value||'').trim();if(!text){$('resultBox').innerHTML='<div class="empty">테스트 문장을 입력하세요.</div>';return;}render(classify(text));}
function downloadPatch(){const text=$('patchBox').textContent;const blob=new Blob([text+'\n'],{type:'application/json;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='rule_test_patch.json';a.click();URL.revokeObjectURL(url);}
async function init(){try{DICT=await fetchJSON(PATH);$('updatedAt').textContent='사전 갱신 '+(DICT.updated_at||'N/A');$('examples').innerHTML=EXAMPLES.map(x=>`<button class="example" type="button">${esc(x)}</button>`).join('');document.querySelectorAll('.example').forEach(btn=>btn.addEventListener('click',()=>{$('inputText').value=btn.textContent;run();}));$('runBtn').onclick=run;$('clearBtn').onclick=()=>{$('inputText').value='';LAST=null;$('resultBox').innerHTML='<div class="empty">테스트 문장을 입력하세요.</div>';$('detailBox').innerHTML='<div class="empty">아직 테스트 결과가 없습니다.</div>';$('patchBox').textContent='{}';};$('copyPatch').onclick=async()=>{await navigator.clipboard.writeText($('patchBox').textContent);$('copyPatch').textContent='복사 완료';setTimeout(()=>$('copyPatch').textContent='패치안 복사',1200);};$('downloadPatch').onclick=downloadPatch;}catch(e){console.error(e);$('updatedAt').textContent='필터 사전을 불러오지 못했습니다.';}}
init();
</script>
</body>
</html>
