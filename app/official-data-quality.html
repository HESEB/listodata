<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Official Data Quality | HESEB DSS 2.0</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.94);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.84);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px}.hero{background:linear-gradient(160deg,rgba(241,133,174,.24),rgba(248,184,113,.18),rgba(165,115,237,.16),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner,.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.kpi{font-size:28px;font-weight:850}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px}.ready,.excellent,.good{color:var(--good);background:rgba(22,138,91,.08)}.partial,.limited{color:var(--warn);background:rgba(193,138,24,.09)}.hold,.risk,.missing{color:var(--bad);background:rgba(217,60,97,.08)}.bar{height:9px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#F185AE,#F8B871,#A573ED,#6BB2FF)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}details{margin-top:10px}summary{cursor:pointer;font-size:12px;font-weight:700}.metric{border-top:1px solid var(--line);padding-top:9px;margin-top:9px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Official Data Quality</h1><div class="sub">Data Quality · Coverage · Reliability Engine</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./admin.html">Admin</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="small">Phase 7-3</div><div class="headline">공식 데이터 판단 가능성 점검</div><div class="sub" id="updatedAt">리포트를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <section class="grid cols" id="species"><div class="empty">불러오는 중...</div></section>
</main>
<script>
const PATH='./data/admin/official_data_quality.json';const $=id=>document.getElementById(id);const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const arr=x=>Array.isArray(x)?x:[];
async function get(){const r=await fetch(PATH+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(PATH);return r.json();}
function kpis(s){const rows=[['상태',s.status||'-'],['판단 가능',s.ready_count||0],['판단 유보',s.hold_count||0],['Coverage',`${s.overall_coverage||0}%`],['Quality',s.overall_quality||0],['Reliability',s.overall_reliability||0],['Confidence',s.overall_confidence||0]];$('kpis').innerHTML=rows.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function metric(x){return `<div class="metric"><b>${esc(x.name||x.metric_id)}</b> <span class="badge ${esc(x.status)}">${esc(x.status)}</span><div class="chips"><span class="chip">품질 ${esc(x.quality_score)}</span><span class="chip">최신성 ${esc(x.freshness_score)}</span><span class="chip">신뢰도 ${esc(x.reliability_score)}</span><span class="chip">비교 ${esc(x.comparison_score)}</span></div><div class="small" style="margin-top:6px">${arr(x.issues).map(esc).join(' · ')||'이슈 없음'}</div></div>`;}
function card(x){const width=Math.max(0,Math.min(100,Number(x.coverage_score)||0));return `<article class="card"><span class="badge ${esc(x.decision_status)}">${esc(x.decision_label)}</span><h2>${esc(x.label)}</h2><div class="kpi" style="font-size:24px">Coverage ${esc(x.coverage_score)}%</div><div class="bar"><i style="width:${width}%"></i></div><div class="chips"><span class="chip">Quality ${esc(x.quality_score)}</span><span class="chip">Reliability ${esc(x.reliability_score)}</span><span class="chip">Freshness ${esc(x.freshness_score)}</span><span class="chip">Confidence ${esc(x.confidence_score)}</span><span class="chip">P1 ${esc(x.priority1_present_count)}/${esc(x.priority1_count)}</span></div><div class="small" style="margin-top:8px">${arr(x.hold_reasons).map(esc).join(' · ')||'Direction Engine 입력 가능'}</div><details><summary>지표별 상세</summary>${arr(x.metrics).map(metric).join('')}</details></article>`;}
(async()=>{try{const d=await get();$('updatedAt').textContent='갱신 '+(d.updated_at||'N/A')+' · '+(d.policy||'');kpis(d.summary||{});$('species').innerHTML=arr(d.species).map(card).join('')||'<div class="empty">축종 데이터 없음</div>';}catch(e){console.error(e);$('species').innerHTML='<div class="empty">품질 리포트가 아직 생성되지 않았습니다. Actions 실행 후 확인하세요.</div>';}})();
</script>
</body>
</html>
