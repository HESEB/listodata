<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conflict & Hold Report | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--bad:#d93c61;--warn:#c18a18;--good:#168a5b;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}
    .grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850}.small{font-size:12px;color:var(--sub);line-height:1.45}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.high{color:var(--bad);background:rgba(217,60,97,.08)}.badge.medium{color:var(--warn);background:rgba(193,138,24,.09)}.badge.low{color:var(--blue);background:rgba(36,116,216,.08)}.badge.none{color:var(--good);background:rgba(22,138,91,.08)}.topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.axis{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.axis-head{display:flex;justify-content:space-between;gap:10px}.weights{font-size:12px;color:var(--sub)}.examples{margin-top:7px;display:flex;flex-direction:column;gap:6px}.ex{border:1px dashed var(--line);border-radius:12px;padding:8px;background:rgba(255,255,255,.58)}.ex a{color:#2474d8;text-decoration:none}.notice{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px;margin-top:10px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Conflict & Hold Report</h1><div class="sub">상방·하방 근거 충돌과 판단 유보 사유 검수</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./evidence-chain.html">Chain</a> <a class="btn" href="./score-engine.html">Score</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 2-3</div><div class="headline">충돌 감지·판단 유보 리포트</div><div class="sub" id="updatedAt">불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <section class="grid cols" id="cards"><div class="empty">충돌 데이터를 불러오는 중...</div></section>
</main>
<script>
const $=id=>document.getElementById(id);
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const safeArray=x=>Array.isArray(x)?x:[];
function severityClass(s){return s==='high'?'high':s==='medium'?'medium':s==='low'?'low':'none';}
function renderKpis(s){const items=[['축종',s.species_count||0],['충돌 축종',s.conflict_species_count||0],['판단유보 권장',s.hold_recommended_count||0],['강충돌',s.high_conflict_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function renderExample(x){const title=esc(x.title||'');const url=x.url||'';return `<div class="ex">${url?`<a href="${esc(url)}">${title}</a>`:title}<div class="small">${esc(x.source||'')} · ${esc(x.direction||'')} · 품질 ${esc(x.quality_score||0)} · 출처레벨 ${esc(x.source_level||0)}</div></div>`;}
function renderAxis(a){return `<div class="axis"><div class="axis-head"><div><b>${esc(a.label)}</b><div class="small">${esc(a.memo||'')}</div></div><span class="badge ${severityClass(a.severity)}">${a.has_conflict?'충돌':'정상'} · ${esc(a.severity)}</span></div><div class="weights">가중치 ▲ ${esc(a.weighted_direction?.up||0)} / ▼ ${esc(a.weighted_direction?.down||0)} / = ${esc(a.weighted_direction?.neutral||0)} · 충돌비율 ${esc(a.conflict_ratio||0)}</div><div class="examples"><b class="small">상방 예시</b>${safeArray(a.examples?.up).map(renderExample).join('')||'<div class="small">없음</div>'}<b class="small">하방 예시</b>${safeArray(a.examples?.down).map(renderExample).join('')||'<div class="small">없음</div>'}</div></div>`;}
function renderCard(c, axes){return `<section class="card"><div class="topline"><div><h2>${esc(c.name||c.id)}</h2><div class="small">조정신뢰도 ${esc(c.adjusted_confidence||0)}점 · 기존 ${esc(c.original_confidence||0)}점</div></div><span class="badge ${severityClass(c.conflict_severity)}">${esc(c.conflict_severity||'none')}</span></div><div class="notice"><b>판단</b><br>${esc(c.recommended_status||'')} · ${esc(c.memo||'')}</div>${c.hold_reasons&&c.hold_reasons.length?`<div class="notice"><b>유보 사유</b><br>${esc(c.hold_reasons.join(', '))}</div>`:''}${c.missing_evidence&&c.missing_evidence.length?`<div class="notice"><b>누락 근거</b><br>${esc(c.missing_evidence.join(', '))}</div>`:''}${safeArray(axes).map(renderAxis).join('')}</section>`;}
async function init(){try{const r=await fetch('./data/analysis/conflict_report.json?ts='+Date.now(),{cache:'no-store'});const data=await r.json();$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'');renderKpis(data.summary||{});const axis=data.axis_reports||{};$('cards').innerHTML=safeArray(data.species).map(c=>renderCard(c,axis[c.id]||[])).join('')||'<div class="empty">충돌 데이터 없음</div>';}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">충돌 데이터를 불러오지 못했습니다. 다음 자동 업데이트 후 다시 확인하세요.</div>';}}
init();
</script>
</body>
</html>
