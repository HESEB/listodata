<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS 상세 코드 조사 | HESEB</title><style>
:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;background:rgba(245,250,252,.95);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(6,1fr)}.cols{grid-template-columns:repeat(2,minmax(0,1fr))}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.brand{display:block}}.kpi{font-size:27px;font-weight:820}.badge,.chip{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.table{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.metric{border:1px solid var(--line);border-radius:15px;padding:10px;margin-top:9px}.candidate{font-size:12px;border-top:1px dashed var(--line);padding-top:7px;margin-top:7px}.empty{padding:22px;text-align:center;border:1px dashed var(--line);border-radius:16px;color:var(--sub)}
</style></head><body><header><div class="top"><div class="brand"><div><h1>KOSIS 상세 항목·분류코드 조사</h1><div class="sub">통계표 후보의 ITM_ID·C1_ID·단위 공식 응답 조사 상태</div></div><div><a class="btn" href="./kosis-catalog-research.html">통계목록 후보</a> <a class="btn" href="./kosis-code-research.html">코드 조사</a> <a class="btn" href="./admin2-dashboard.html">Admin 2.0</a></div></div></div></header><main>
<div class="hero"><div><div class="sub">Phase 9-3</div><div class="headline">공식 상세 응답에서 확인된 코드만 승인 후보로 표시합니다.</div><div class="sub" id="updated">상태를 불러오는 중...</div></div></div>
<section class="grid kpis" id="kpis"></section>
<section class="card" style="margin-top:12px"><div class="sub">KOSIS_API_KEY와 Phase 9-2 통계표 후보가 있어야 자동조사가 실행됩니다. 결과는 조사 근거이며 기존 매핑 템플릿에 자동 반영되지 않습니다.</div></section>
<section class="grid cols" id="targets" style="margin-top:12px"></section>
</main><script>
const $=id=>document.getElementById(id),arr=x=>Array.isArray(x)?x:[],esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function metricCard(m){const cs=arr(m.candidates);return `<div class="metric"><b>${esc(m.metric_id||'-')}</b> <span class="badge ${m.status==='candidate_ready'?'good':'warn'}">${esc(m.status||'-')}</span><div class="sub">후보 ${cs.length}건 · 키워드 ${esc(arr(m.keywords).join(', '))}</div>${cs.slice(0,5).map(c=>`<div class="candidate"><b>ITM ${esc(c.ITM_ID||'-')}</b> ${esc(c.ITM_NM||'-')} · <b>C1 ${esc(c.C1_ID||'-')}</b> ${esc(c.C1_NM||'-')} · 단위 ${esc(c.UNIT_NM||'-')}<div class="sub">근거 ${esc(arr(c.keyword_hits).join(', '))} · ${esc(c.evidence_status||'-')}</div></div>`).join('')||'<div class="sub">일치 후보 없음</div>'}</div>`}
function targetCard(t){const tables=arr(t.tables);return `<article class="card"><span class="badge ${t.status==='candidate_found'?'good':'warn'}">${esc(t.status||'-')}</span><h2 style="font-size:17px">${esc(t.research_id||'-')}</h2>${tables.map(tb=>`<div class="table"><b>${esc(tb.table_name||'-')}</b><div class="sub">ORG ${esc(tb.org_id||'-')} · TBL ${esc(tb.tbl_id||'-')} · 주기 ${esc(tb.period||'-')} · 상세행 ${esc(tb.detail_row_count||0)}</div>${arr(tb.metrics).map(metricCard).join('')}</div>`).join('')||'<div class="empty">통계표 상세 후보 없음</div>'}</article>`}
(async()=>{try{const r=await fetch('./data/admin/kosis_detail_research.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{};$('updated').textContent=`갱신 ${d.updated_at||'Actions 실행 전'} · 상태 ${s.status||'-'}`;$('kpis').innerHTML=[['통계표 후보',s.table_candidate_count||0],['API 요청',s.request_count||0],['상세 응답행',s.detail_row_count||0],['지표 후보',s.metric_candidate_count||0],['완전 코드 후보',s.approved_candidate_count||0],['오류',s.error_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');$('targets').innerHTML=arr(d.targets).map(targetCard).join('')||'<div class="empty">KOSIS_API_KEY 등록 및 통계목록 자동조사 실행이 필요합니다.</div>';}catch(e){$('updated').textContent='다음 Actions 실행 후 확인하세요.';$('targets').innerHTML='<div class="empty">상태 파일을 불러오지 못했습니다.</div>';}})();
</script></body></html>
