<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data First Dashboard | HESEB</title>
<style>
:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.67);--up:#d93c61;--down:#2474d8;--flat:#b98016;--hold:#777}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.wrap{max-width:1240px;margin:auto;padding:14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top h1{font-size:19px;margin:0}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero{margin:14px 0;padding:18px;border-radius:24px;background:linear-gradient(135deg,rgba(241,133,174,.22),rgba(107,178,255,.2));border:1px solid var(--line)}.hero h2{margin:0;font-size:26px}.summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.pill{padding:6px 9px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.76);font-size:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:13px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.species{font-size:18px;font-weight:800}.direction{font-size:15px;font-weight:800}.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--flat)}.hold{color:var(--hold)}.action{margin-top:12px;padding:12px;border-radius:16px;background:linear-gradient(90deg,rgba(241,133,174,.13),rgba(107,178,255,.13))}.action small{display:block;color:var(--sub);margin-bottom:4px}.action b{font-size:20px}.metrics,.news{margin-top:13px}.section-title{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:7px}.metric{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:12px}.metric:first-child{border-top:0}.news a{display:block;color:var(--text);text-decoration:none;padding:8px 0;border-top:1px solid var(--line);font-size:13px;line-height:1.4}.news a:first-child{border-top:0}.meta{font-size:11px;color:var(--sub);margin-top:3px}.bars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.stat{border:1px solid var(--line);border-radius:14px;padding:9px;background:#fafcfd}.stat b{display:block;font-size:16px}.details{margin-top:12px}.details summary{cursor:pointer;font-size:12px;font-weight:750}.details pre{white-space:pre-wrap;font-family:inherit;font-size:12px;line-height:1.55;background:#f8fafb;border:1px solid var(--line);border-radius:14px;padding:10px}.empty{padding:30px;text-align:center;color:var(--sub)}@media(max-width:640px){.hero h2{font-size:21px}.top{align-items:flex-start}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="wrap top"><div><h1>HESEB DSS 2.0</h1><div class="sub">공식 데이터 중심 구매 의사결정 Dashboard</div></div><div><a class="btn" href="./index.html">기존 Dashboard</a> <a class="btn" href="./admin.html">Admin</a></div></div></header>
<main class="wrap"><section class="hero"><div class="sub">Phase 7-8 · Data First</div><h2>5초 안에 시장판단과 추천행동 확인</h2><div class="sub" id="updated">데이터를 불러오는 중입니다.</div><div class="summary" id="summary"></div></section><section class="grid" id="cards"><div class="empty">불러오는 중...</div></section><div class="sub" style="margin:16px 2px 30px">공식 데이터가 부족하면 방향과 구매행동을 임의로 생성하지 않고 판단 유보로 표시합니다.</div></main>
<script>
const LABEL={BEEF:'한우/우육',PORK:'돈육',POULTRY:'계육',DUCK:'오리',EGG:'계란'};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const cls=c=>c==='up'||c==='strong_up'?'up':c==='down'||c==='strong_down'?'down':c==='flat'?'flat':'hold';
function metricText(row){const comps=Array.isArray(row.comparisons)?row.comparisons:[];const c=comps[0];return c?`${c.comparison||'-'} ${Number(c.change_rate||0)>=0?'+':''}${Number(c.change_rate||0).toFixed(1)}%`:`신호 ${Number(row.signal||0).toFixed(1)}`}
function renderCard(c){const news=Array.isArray(c.representative_news)?c.representative_news:[];const changes=Array.isArray(c.top_changes)?c.top_changes:[];const reasons=(c.recommendation?.reasons||[]).join(' · ')||'근거 축적 중';const report=c.report?.manager||c.report?.summary||'';return `<article class="card"><div class="head"><div><div class="species">${esc(c.label||LABEL[c.species]||c.species)}</div><div class="sub">${esc(reasons)}</div></div><div class="direction ${cls(c.direction?.code)}">${esc(c.direction?.symbol||'?')} ${esc(c.direction?.label||'판단 유보')}</div></div><div class="action"><small>추천 행동</small><b>${esc(c.recommendation?.primary?.label||'판단 유보')}</b></div><div class="bars"><div class="stat"><span class="sub">신뢰도</span><b>${Number(c.confidence||0).toFixed(0)}%</b></div><div class="stat"><span class="sub">Coverage</span><b>${Number(c.coverage||0).toFixed(0)}%</b></div></div><div class="metrics"><div class="section-title">핵심 변화지표</div>${changes.length?changes.map(x=>`<div class="metric"><span>${esc(x.name)}</span><b>${esc(metricText(x))}</b></div>`).join(''):`<div class="sub">사용 가능한 공식 변화지표가 부족합니다.</div>`}</div><div class="news"><div class="section-title">대표 뉴스</div>${news.length?news.map(n=>`<a href="${esc(n.url||'#')}" target="_top"><b>${esc(n.title)}</b><div class="meta">${esc(n.publisher||'-')} · 대표점수 ${Number(n.representative_score||0).toFixed(0)}</div></a>`).join(''):`<div class="sub">선정된 대표 기사가 없습니다.</div>`}</div><details class="details"><summary>상세 근거 보기</summary><pre>${esc(report||((c.hold_reasons||[]).join('\n')||'상세 문장 생성 대기'))}</pre></details></article>`}
async function load(){try{const r=await fetch('./data/display/data_first_dashboard.json?t='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('display json');const d=await r.json();document.getElementById('updated').textContent=`갱신 ${d.updated_at||'N/A'} · ${d.notice||''}`;document.getElementById('summary').innerHTML=`<span class="pill">판단 가능 ${d.summary?.ready_count||0}</span><span class="pill">판단 유보 ${d.summary?.hold_count||0}</span><span class="pill">축종 ${d.summary?.species_count||0}</span>`;document.getElementById('cards').innerHTML=(d.cards||[]).map(renderCard).join('')||'<div class="empty">Dashboard 데이터가 없습니다.</div>'}catch(e){document.getElementById('updated').textContent='첫 Workflow 실행 후 Data First Dashboard가 생성됩니다.';document.getElementById('cards').innerHTML='<div class="empty">표시 JSON 생성 대기 중입니다. Actions를 실행한 뒤 새로고침하세요.</div>'}}
load();
</script>
</body></html>
