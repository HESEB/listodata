<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DSS 2.0 최종 검증 | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner,.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:25px;line-height:1.35;font-weight:820;letter-spacing:-.7px}.grid{display:grid;gap:12px}.cols-4{grid-template-columns:repeat(4,1fr)}.cols-2{grid-template-columns:repeat(2,1fr)}@media(max-width:900px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-2{grid-template-columns:1fr}}@media(max-width:560px){.cols-4{grid-template-columns:1fr}.brand{display:block}}
    .kpi{font-size:30px;font-weight:850;margin-top:5px}.badge{display:inline-flex;padding:5px 9px;border-radius:999px;border:1px solid var(--line);font-size:11px;font-weight:750}.pass{color:var(--good);background:rgba(22,138,91,.08)}.limited{color:var(--warn);background:rgba(193,138,24,.09)}.fail{color:var(--bad);background:rgba(217,60,97,.08)}.row{display:flex;justify-content:space-between;gap:12px;border-top:1px solid var(--line);padding:11px 0}.row:first-child{border-top:0}.row b{font-size:13px}.message{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.45}.notice{border:1px dashed var(--line);border-radius:18px;padding:13px;background:rgba(255,255,255,.65);font-size:12px;line-height:1.55}.phase{display:grid;grid-template-columns:110px 1fr;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:12px}.phase:first-child{border-top:0}.empty{padding:24px;text-align:center;color:var(--sub)}ul{margin:8px 0 0;padding-left:20px;font-size:13px;line-height:1.65}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>DSS 2.0 최종 검증</h1><div class="sub">Phase 7-0~7-10 구조·Workflow·실데이터 준비도 분리 검증</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./admin2-dashboard.html">Admin 2.0</a></div></div></div></header>
<main>
  <section class="hero"><div class="hero-inner"><div class="eyebrow">Phase 7-10</div><div class="headline" id="headline">최종 검증 결과를 불러오는 중...</div><div class="sub" id="updated">갱신 정보 확인 중</div></div></section>
  <section class="grid cols-4" id="kpis"></section>
  <section class="grid cols-2" style="margin-top:12px">
    <div class="card"><h2 style="margin:0;font-size:17px">검증 항목</h2><div id="checks" style="margin-top:8px"><div class="empty">불러오는 중...</div></div></div>
    <div class="card"><h2 style="margin:0;font-size:17px">Phase 7 완료 구조</h2><div id="phases" style="margin-top:8px"></div></div>
  </section>
  <section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">다음 운영 요건</h2><ul id="next"></ul></section>
  <div class="notice" style="margin-top:12px">PASS는 구현·연결 정상, LIMITED는 구조는 정상이나 공식 실데이터 부족, FAIL은 필수 파일이나 Workflow 연결 누락을 의미합니다. 공식 데이터가 없다는 이유만으로 임의 시장판단을 생성하지 않습니다.</div>
</main>
<script>
const $=id=>document.getElementById(id);const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function load(){
  try{
    const r=await fetch('./data/admin/dss2_final_validation.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();
    const s=d.summary||{};const status=s.status||'limited';$('headline').innerHTML=`<span class="badge ${esc(status)}">${esc(status.toUpperCase())}</span> ${esc(s.label||'검증 대기')}`;$('updated').textContent='갱신 '+(d.updated_at||'Actions 실행 전');
    const items=[['전체 검사',s.check_count||0],['PASS',s.pass_count||0],['LIMITED',s.limited_count||0],['FAIL',s.fail_count||0]];$('kpis').innerHTML=items.map(([a,b],i)=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');
    $('checks').innerHTML=(d.checks||[]).map(x=>`<div class="row"><div><b>${esc(x.label||x.id)}</b><div class="message">${esc(x.message||'')}</div></div><span class="badge ${esc(x.status||'limited')}">${esc((x.status||'limited').toUpperCase())}</span></div>`).join('')||'<div class="empty">검증 결과 없음</div>';
    $('phases').innerHTML=Object.entries(d.phase7_completion||{}).map(([k,v])=>`<div class="phase"><b>${esc(k.replaceAll('_','-').toUpperCase())}</b><span>${esc(v)}</span></div>`).join('')||'<div class="empty">Actions 실행 후 생성</div>';
    $('next').innerHTML=(d.next_requirements||[]).map(x=>`<li>${esc(x)}</li>`).join('')||'<li>추가 요건 없음</li>';
  }catch(e){$('headline').textContent='최종 검증 파일을 불러오지 못했습니다.';$('updated').textContent=String(e);$('checks').innerHTML='<div class="empty">Actions 실행 여부와 GitHub Pages 반영 상태를 확인하세요.</div>';}
}load();
</script>
</body>
</html>
