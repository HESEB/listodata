<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Report Sentence Engine | HESEB DSS 2.0</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--up:#d93c61;--down:#2474d8;--flat:#c18a18;--good:#168a5b}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.btn.primary{background:linear-gradient(90deg,rgba(241,133,174,.22),rgba(107,178,255,.20));font-weight:760}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.layout{grid-template-columns:330px 1fr}@media(max-width:920px){.layout{grid-template-columns:1fr}}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72)}.badge.ready{color:var(--good);background:rgba(22,138,91,.08)}.badge.hold{color:#777;background:rgba(0,0,0,.05)}.badge.up{color:var(--up);background:rgba(217,60,97,.08)}.badge.down{color:var(--down);background:rgba(36,116,216,.08)}.badge.flat{color:var(--flat);background:rgba(193,138,24,.09)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.82);cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.20),rgba(107,178,255,.18));font-weight:760}.pre{white-space:pre-wrap;font-size:13px;line-height:1.7;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:18px;padding:16px;min-height:560px}.species-list{display:grid;gap:8px}.species-btn{width:100%;text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.8);padding:10px;border-radius:14px;cursor:pointer}.species-btn.active{background:linear-gradient(90deg,rgba(241,133,174,.16),rgba(107,178,255,.14));font-weight:760}.memo{font-size:13px;color:rgba(24,34,49,.82);line-height:1.55;margin-top:8px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Report Sentence Engine</h1><div class="sub">공식 데이터 기반 보고 문장 자동 생성</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./report.html">Report</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 7-7</div><div class="headline">공식 데이터 + 대표 기사 + 시장판단 + 추천행동</div><div class="sub" id="updatedAt">결과를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="tabs" id="formatTabs"></div>
  <section class="grid layout">
    <aside class="card"><h2>축종별 문장</h2><div class="species-list" id="speciesList" style="margin-top:10px"></div><div class="toolbar"><button class="btn primary" id="copyBtn">현재 문장 복사</button><button class="btn" id="copyAllBtn">전체 보고서 복사</button></div><div class="memo" id="meta"></div></aside>
    <section class="card"><h2 id="reportTitle">보고 문장</h2><div class="pre" id="reportText">불러오는 중...</div></section>
  </section>
</main>
<script>
const PATH='./data/admin/report_sentence_engine.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let DATA={species:[],reports:{},formats:{}};let FORMAT='manager';let SPECIES='ALL';
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['상태',s.status||'-'],['축종',s.species_count||0],['판단가능',s.ready_count||0],['판단유보',s.hold_count||0],['문장형식',s.format_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function renderFormats(){const formats=DATA.formats||{};$('formatTabs').innerHTML=Object.entries(formats).map(([k,v])=>`<button class="tab ${k===FORMAT?'active':''}" data-format="${esc(k)}">${esc(v.label||k)}</button>`).join('');document.querySelectorAll('[data-format]').forEach(b=>b.onclick=()=>{FORMAT=b.dataset.format;renderFormats();renderText();});}
function rowClass(x){if(x.status==='hold')return 'hold';const d=x.direction_code||'';if(d.includes('up'))return 'up';if(d.includes('down'))return 'down';return 'flat';}
function renderSpecies(){const rows=safeArray(DATA.species);$('speciesList').innerHTML=`<button class="species-btn ${SPECIES==='ALL'?'active':''}" data-species="ALL">전체 보고서</button>`+rows.map(x=>`<button class="species-btn ${SPECIES===x.species?'active':''}" data-species="${esc(x.species)}"><span class="badge ${rowClass(x)}">${esc(x.direction_symbol)} ${esc(x.direction_label)}</span><div style="margin-top:6px">${esc(x.label)}</div><div class="small">${esc(x.primary_action)} · 신뢰도 ${esc(x.confidence_score)}%</div></button>`).join('');document.querySelectorAll('[data-species]').forEach(b=>b.onclick=()=>{SPECIES=b.dataset.species;renderSpecies();renderText();});}
function currentText(){if(SPECIES==='ALL')return DATA.reports?.[FORMAT]||'';const row=safeArray(DATA.species).find(x=>x.species===SPECIES);return row?.sentences?.[FORMAT]||'';}
function renderText(){const txt=currentText();$('reportText').textContent=txt||'생성된 문장이 없습니다.';const row=safeArray(DATA.species).find(x=>x.species===SPECIES);$('reportTitle').textContent=SPECIES==='ALL'?'전체 보고서':`${row?.label||SPECIES} 보고 문장`;$('meta').textContent=row?`공식지표 ${safeArray(row.metrics).length}건 · 대표기사 ${safeArray(row.representative_news).length}건 · 커버리지 ${row.coverage_score}%`:'축종별 문장을 선택해 근거 구성을 확인합니다.';}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent=`갱신 ${DATA.updated_at||'N/A'} · ${DATA.policy||''}`;renderKpis(DATA.summary||{});renderFormats();renderSpecies();renderText();$('copyBtn').onclick=()=>navigator.clipboard.writeText(currentText());$('copyAllBtn').onclick=()=>navigator.clipboard.writeText(DATA.reports?.[FORMAT]||'');}catch(e){console.error(e);$('reportText').textContent='Report Sentence 결과를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.';}}
init();
</script>
</body>
</html>
