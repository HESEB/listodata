<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cross Market Matrix | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--bad:#d93c61;--warn:#c18a18;--good:#168a5b;--blue:#2474d8;--hold:#777}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}
    .grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.small{font-size:12px;color:var(--sub);line-height:1.45}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.high{color:var(--bad);background:rgba(217,60,97,.08)}.badge.medium{color:var(--warn);background:rgba(193,138,24,.09)}.badge.low{color:var(--blue);background:rgba(36,116,216,.08)}.badge.inverse{color:#7457d8;background:rgba(116,87,216,.08)}.badge.hold{color:var(--hold);background:rgba(0,0,0,.05)}.badge.watch,.badge.none{color:var(--good);background:rgba(22,138,91,.08)}.topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.strength{font-size:26px;font-weight:850;letter-spacing:-.8px}.bar{height:8px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}.row{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:rgba(255,255,255,.72);font-size:11px}.notice{font-size:12px;color:rgba(24,34,49,.72);line-height:1.55;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62);padding:12px;margin-top:10px}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Cross Market Matrix</h1><div class="sub">축종 간 대체수요·가금 질병·공통 변수 전이 가능성 검수</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./conflict-report.html">Conflict</a> <a class="btn" href="./score-engine.html">Score</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 2-4</div><div class="headline">축종 간 영향 매트릭스</div><div class="sub" id="updatedAt">불러오는 중...</div></div></div>
  <section class="grid cols" id="summary"></section>
  <section class="grid cols" id="cards"><div class="empty">매트릭스 데이터를 불러오는 중...</div></section>
</main>
<script>
const $=id=>document.getElementById(id);
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const safeArray=x=>Array.isArray(x)?x:[];
function sev(s){return ['high','medium','low','inverse','hold','watch'].includes(s)?s:'none';}
function pct(v){return Math.min(100,Math.round(Math.abs(Number(v)||0)*100));}
function renderSummary(s){return `<div class="card"><div class="topline"><div><h2>${esc(s.name||s.id)}</h2><div class="small">들어오는 영향 ${esc(s.incoming_count||0)}건 · 나가는 영향 ${esc(s.outgoing_count||0)}건</div></div></div><div class="strength">IN ${esc(s.incoming_strength||0)}</div><div class="small">OUT ${esc(s.outgoing_strength||0)}</div><div class="notice"><b>주요 유입</b><br>${safeArray(s.top_incoming).map(x=>`${x.from_name}→${x.to_name} ${x.effect}(${x.strength})`).join('<br>')||'없음'}</div></div>`;}
function renderCard(x){return `<section class="card"><div class="topline"><div><h2>${esc(x.from_name)} → ${esc(x.to_name)}</h2><div class="small">${esc(x.kind)} · 원천 ${esc(x.source_status)} · 신뢰도 ${esc(x.source_confidence||0)}점</div></div><span class="badge ${sev(x.severity)}">${esc(x.effect)}</span></div><div class="strength">${esc(x.strength)}</div><div class="bar"><i style="width:${pct(x.strength)}%"></i></div><div class="notice">${esc(x.memo||'')}</div>${x.shared_axes&&x.shared_axes.length?`<div class="chips">${x.shared_axes.map(a=>`<span class="chip">${esc(a)}</span>`).join('')}</div>`:''}${x.conflict_note?`<div class="row"><b class="small">충돌 메모</b><div class="small">${esc(x.conflict_note)}</div></div>`:''}</section>`;}
async function init(){try{const r=await fetch('./data/analysis/cross_market_matrix.json?ts='+Date.now(),{cache:'no-store'});const data=await r.json();$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'');const summary=Object.values(data.species_summary||{});$('summary').innerHTML=summary.map(renderSummary).join('')||'<div class="empty">요약 없음</div>';$('cards').innerHTML=safeArray(data.items).sort((a,b)=>Math.abs(b.strength)-Math.abs(a.strength)).map(renderCard).join('')||'<div class="empty">매트릭스 데이터 없음</div>';}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">매트릭스 데이터를 불러오지 못했습니다. 다음 자동 업데이트 후 다시 확인하세요.</div>';}}
init();
</script>
</body>
</html>
