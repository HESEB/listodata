<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Market Memory | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--g1:#F185AE;--g2:#F8B871;--g3:#A573ED;--g4:#6BB2FF;--up:#d93c61;--down:#2474d8;--flat:#c18a18;--mix:#7457d8;--good:#168a5b}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}
    .hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.quick a{font-size:11px;border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:999px;padding:6px 9px;text-decoration:none;color:var(--text)}
    .grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.up{color:var(--up);background:rgba(217,60,97,.08)}.badge.down{color:var(--down);background:rgba(36,116,216,.08)}.badge.neutral{color:var(--flat);background:rgba(193,138,24,.09)}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}.small{font-size:12px;color:var(--sub);line-height:1.45}.memo{font-size:13px;line-height:1.55;color:rgba(24,34,49,.82);margin-top:9px}.case{border-top:1px solid var(--line);padding-top:9px;margin-top:9px}.case:first-child{border-top:none;margin-top:0;padding-top:0}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.implication{font-size:12px;color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11));border:1px solid var(--line);border-radius:14px;padding:10px;margin-top:8px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.82);cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.20),rgba(107,178,255,.18));font-weight:760}.panel{display:none}.panel.active{display:block}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Market Memory</h1><div class="sub">과거 신호 변동·이벤트 연결·유사 사례 비교</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./event-calendar.html">Event</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 5-2</div><div class="headline">시장 메모리</div><div class="sub" id="updatedAt">불러오는 중...</div><div class="quick"><a href="./history-prediction.html">History</a><a href="./event-calendar.html">Event Calendar</a><a href="./reasoning.html">종합근거</a><a href="./weekly-report.html">Report</a></div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="tabs"><button class="tab active" data-panel="species">축종별 사례</button><button class="tab" data-panel="cases">신호 변동 사례</button><button class="tab" data-panel="similar">현재 신호 유사사례</button></div>
  <section id="panel-species" class="panel active"><div class="grid cols" id="speciesCards"><div class="empty">불러오는 중...</div></div></section>
  <section id="panel-cases" class="panel"><div class="grid cols" id="caseCards"><div class="empty">불러오는 중...</div></div></section>
  <section id="panel-similar" class="panel"><div class="grid cols" id="similarCards"><div class="empty">불러오는 중...</div></div></section>
</main>
<script>
const PATH='./data/analysis/market_memory.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function dirClass(t){return t==='signal_jump'?'up':t==='signal_drop'?'down':'neutral';}
function renderKpis(s){const items=[['메모리 이벤트',s.memory_event_count||0],['사례 보유 축종',s.species_with_cases||0],['캘린더 연결',s.calendar_linked_count||0],['유사사례',s.similar_case_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function renderSpecies(x){return `<article class="card"><div class="topline"><div><h2>${esc(x.name)}</h2><div class="small">최신 ${esc(x.latest_status||'-')} · 신뢰도 ${esc(x.current_confidence||0)}점</div></div><span class="badge good">사례 ${esc(x.event_count||0)}건</span></div><div class="chips"><span class="chip">급등 ${esc(x.jump_count||0)}건</span><span class="chip">하락 ${esc(x.drop_count||0)}건</span><span class="chip">평균급등 ${esc(x.avg_jump_change||0)}</span><span class="chip">평균하락 ${esc(x.avg_drop_change||0)}</span></div><div class="memo">${esc(x.memory_note||'')}</div><div>${safeArray(x.top_cases).slice(0,3).map(renderCaseMini).join('')||'<div class="empty">누적 사례 없음</div>'}</div></article>`;}
function renderCaseMini(c){return `<div class="case"><b>${esc(c.date||'-')} · ${esc(c.event_type_label||c.event_type||'')}</b><div class="small">${esc(c.memo||'')} · ${esc(c.from_score||0)} → ${esc(c.to_score||0)}</div><div class="implication">${esc(c.purchase_implication||'')}</div></div>`;}
function renderCase(c){return `<article class="card"><div class="topline"><div><h2>${esc(c.name||c.species)}</h2><div class="small">${esc(c.date||'-')} · ${esc(c.event_type_label||c.event_type||'')}</div></div><span class="badge ${dirClass(c.event_type)}">${esc(c.change||0)}</span></div><div class="memo">${esc(c.memo||'')}</div><div class="chips"><span class="chip">${esc(c.from_score||0)} → ${esc(c.to_score||0)}</span><span class="chip">신뢰도 ${esc(c.confidence_score||0)}</span><span class="chip">충돌 ${esc(c.conflict_severity||'none')}</span></div>${safeArray(c.nearby_calendar_events).length?`<div class="case"><b>인접 이벤트</b>${safeArray(c.nearby_calendar_events).map(e=>`<div class="small">${esc(e.title)} · ${esc(e.distance_days)}일 차이 · 영향도 ${esc(e.impact_level||0)}</div>`).join('')}</div>`:''}<div class="implication">${esc(c.purchase_implication||'')}</div></article>`;}
function renderSimilar(c){return `<article class="card"><div class="topline"><div><h2>${esc(c.name)}</h2><div class="small">현재 ${esc(c.current_status||'-')} · ${esc(c.current_signal_score||0)}점</div></div><span class="badge neutral">유사사례</span></div><div class="memo">${esc(c.case_date||'-')} · ${esc(c.case_memo||'')}</div><div class="chips"><span class="chip">사례변동 ${esc(c.case_change||0)}</span></div><div class="implication">${esc(c.purchase_implication||'')}</div></article>`;}
function bindTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+btn.dataset.panel));}));}
async function init(){try{const data=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'');renderKpis(data.summary||{});$('speciesCards').innerHTML=safeArray(data.species).map(renderSpecies).join('')||'<div class="empty">축종별 사례 없음</div>';$('caseCards').innerHTML=safeArray(data.items).slice().reverse().map(renderCase).join('')||'<div class="empty">신호 변동 사례 없음</div>';$('similarCards').innerHTML=safeArray(data.similar_cases).map(renderSimilar).join('')||'<div class="empty">현재 신호와 유사한 과거 사례 없음</div>';bindTabs();}catch(e){console.error(e);$('speciesCards').innerHTML='<div class="empty">시장 메모리를 불러오지 못했습니다. 다음 자동 업데이트 후 다시 확인하세요.</div>';}}
init();
</script>
</body>
</html>
