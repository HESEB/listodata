<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Classification Review | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--up:#d93c61;--down:#2474d8;--flat:#c18a18;--mix:#7457d8;--good:#168a5b}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(340px,1fr))}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.topline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.rejected{color:var(--up);background:rgba(217,60,97,.08)}.badge.clean{color:var(--good);background:rgba(22,138,91,.08)}.badge.action{color:#263b72;background:linear-gradient(90deg,rgba(241,133,174,.11),rgba(107,178,255,.11))}.badge.warn{color:var(--flat);background:rgba(193,138,24,.09)}.title{font-size:14px;font-weight:760;line-height:1.4;margin-top:8px}.memo{font-size:12px;color:rgba(24,34,49,.78);line-height:1.5;margin-top:6px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}@media(max-width:620px){.controls{grid-template-columns:1fr}}select,input,textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:12px;padding:8px;font-family:inherit;font-size:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.patch{white-space:pre-wrap;font-size:12px;line-height:1.5;background:#15202b;color:#e9f2ff;border-radius:16px;padding:12px;max-height:300px;overflow:auto}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Classification Review</h1><div class="sub">자동분류 검수 · 패치안 생성</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./main.html">Dashboard</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 3-3</div><div class="headline">자동분류 검수</div><div class="sub" id="updatedAt">불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="filters"><select id="statusFilter"><option value="ALL">전체 상태</option><option value="clean">Clean</option><option value="rejected">Rejected</option></select><select id="actionFilter"><option value="ALL">전체 액션</option><option value="force_include">강제 포함</option><option value="confirm_exclude">제외 확인</option><option value="change_species">축종 변경</option><option value="edit_impact">영향도 수정</option><option value="merge_duplicate">중복 병합</option><option value="approve">승인</option></select><select id="speciesFilter"><option value="ALL">전체 축종</option><option value="BEEF">한우</option><option value="PORK">돈육</option><option value="POULTRY">계육</option><option value="DUCK">오리</option><option value="EGG">계란</option><option value="OTHER">기타</option></select></div>
  <div class="toolbar"><button class="btn" id="copyPatch">패치안 복사</button><button class="btn" id="downloadPatch">패치안 다운로드</button><a class="btn" href="./data/admin/classification_review.json">원본 JSON</a></div>
  <section class="grid cols" id="cards"><div class="empty">검수 큐를 불러오는 중...</div></section>
  <section class="card" style="margin-top:12px"><h2>검수 패치안</h2><div class="sub">화면에서 수정한 값은 브라우저에만 남습니다. 복사/다운로드 후 JSON 반영 커밋이 필요합니다.</div><pre class="patch" id="patchBox">[]</pre></section>
</main>
<script>
const PATH='./data/admin/classification_review.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let DATA={items:[]};let PATCH={};
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['검수대상',s.total_review_items||0],['Clean',s.clean_count||0],['Rejected',s.rejected_count||0],['강제포함 후보',s.force_include_candidates||0],['축종변경 후보',s.change_species_candidates||0],['중복 후보',s.duplicate_candidates||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function passFilter(x){const st=$('statusFilter').value,ac=$('actionFilter').value,sp=$('speciesFilter').value;if(st!=='ALL'&&x.status!==st)return false;if(ac!=='ALL'&&x.suggested_action!==ac)return false;if(sp!=='ALL'&&!safeArray(x.species).includes(sp))return false;return true;}
function patchFor(id, base){return PATCH[id]||base.admin_patch_template||{};}
function updatePatch(id, key, value){PATCH[id]={...(PATCH[id]||{}),review_id:id};PATCH[id][key]=value;renderPatch();}
function renderPatch(){const arr=Object.values(PATCH).filter(x=>Object.keys(x).length>1);$('patchBox').textContent=JSON.stringify({updated_at:new Date().toISOString(),policy:'admin_classification_patch_v1',items:arr},null,2);}
function renderCard(x){const p=patchFor(x.review_id,x);return `<article class="card"><div class="topline"><div><span class="badge ${x.status}">${esc(x.status)}</span> <span class="badge action">${esc(x.suggested_action)}</span> <span class="badge warn">우선순위 ${esc(x.priority_score)}</span></div></div><div class="title">${esc(x.title)}</div><div class="memo">${esc(x.publisher)} · ${esc(x.published_at)} · ${esc(x.filter_reason||'')}</div><div class="chips"><span class="chip">${esc((x.species_label||[]).join('·')||'축종 없음')}</span><span class="chip">${esc(x.evidence_axis_label)}</span><span class="chip">방향 ${esc(x.market_direction)}</span><span class="chip">영향 ${esc(x.impact_score)}</span><span class="chip">품질 ${esc(x.quality_score)}</span><span class="chip">출처 ${esc(x.source_level)}</span>${safeArray(x.priority_reasons).map(r=>`<span class="chip">${esc(r)}</span>`).join('')}</div><div class="controls"><select onchange="updatePatch('${esc(x.review_id)}','action',this.value)"><option value="approve">승인</option><option value="force_include">강제 포함</option><option value="confirm_exclude">제외 확인</option><option value="change_species">축종 변경</option><option value="edit_impact">영향도 수정</option><option value="merge_duplicate">중복 병합</option></select><select onchange="updatePatch('${esc(x.review_id)}','species',this.value)"><option value="">축종 유지</option><option value="BEEF">한우</option><option value="PORK">돈육</option><option value="POULTRY">계육</option><option value="DUCK">오리</option><option value="EGG">계란</option><option value="OTHER">기타</option></select><select onchange="updatePatch('${esc(x.review_id)}','market_direction',this.value)"><option value="">방향 유지</option><option value="up">상방</option><option value="down">하방</option><option value="neutral">중립</option><option value="mixed">혼조</option><option value="hold">유보</option></select><input type="number" min="1" max="5" placeholder="영향도 1~5" onchange="updatePatch('${esc(x.review_id)}','impact_score',Number(this.value)||0)"></div><textarea rows="2" placeholder="검수 메모" oninput="updatePatch('${esc(x.review_id)}','memo',this.value)"></textarea><div class="toolbar"><a class="btn" href="${esc(x.source_url)}">원문</a><button class="btn" onclick="PATCH['${esc(x.review_id)}']=${JSON.stringify(x.admin_patch_template).replace(/"/g,'&quot;')};renderPatch();">추천안 추가</button></div></article>`;}
function render(){const items=safeArray(DATA.items).filter(passFilter).slice(0,80);$('cards').innerHTML=items.map(renderCard).join('')||'<div class="empty">조건에 맞는 검수 대상이 없습니다.</div>';}
function downloadPatch(){const text=$('patchBox').textContent;const blob=new Blob([text+'\n'],{type:'application/json;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='classification_review_patch.json';a.click();URL.revokeObjectURL(url);}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(DATA.updated_at||'N/A')+' · '+(DATA.policy||'');renderKpis(DATA.summary||{});render();renderPatch();['statusFilter','actionFilter','speciesFilter'].forEach(id=>$(id).addEventListener('change',render));$('copyPatch').onclick=async()=>{await navigator.clipboard.writeText($('patchBox').textContent);$('copyPatch').textContent='복사 완료';setTimeout(()=>$('copyPatch').textContent='패치안 복사',1200);};$('downloadPatch').onclick=downloadPatch;}catch(e){console.error(e);$('cards').innerHTML='<div class="empty">검수 큐를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
