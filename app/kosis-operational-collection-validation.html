<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS 운영 수집 검증 | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;background:rgba(245,250,252,.96);border-bottom:1px solid var(--line)}.top,main{max-width:1120px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.55}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--text);background:#fff;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:820}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(5,1fr)}.kpi{font-size:27px;font-weight:830}.row{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.badge{display:inline-flex;padding:5px 8px;border:1px solid var(--line);border-radius:999px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}</style></head><body><header><div class="top"><div class="brand"><div><h1>KOSIS 운영 수집 검증·기존 Secret 폐기</h1><div class="sub">운영 매핑 실제 수집 결과와 단계별 폐기 준비도</div></div><div><a class="btn" href="./kosis-runtime-mapping.html">런타임 매핑</a> <a class="btn" href="./admin2-dashboard.html">Admin 2.0</a></div></div></div></header><main><div class="hero"><div><div class="sub">Phase 9-7</div><div class="headline" id="headline">상태를 불러오는 중...</div><div class="sub" id="updated"></div></div></div><section class="grid kpis" id="kpis"></section><section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">현재 실행 검증</h2><div id="checks"></div></section><section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">단계적 폐기 절차</h2><div class="sub" style="margin-top:8px">legacy_active → shadow_validation → deprecation_candidate → legacy_disabled. 연속 성공 기준을 충족해도 관리자 승인 전에는 기존 전체 URL Secret을 제거하지 않습니다.</div><div class="row" id="next"></div></section><section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">최근 검증 이력</h2><div id="history"></div></section></main><script>const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));(async()=>{try{const r=await fetch('./data/admin/kosis_operational_collection_validation.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{},run=d.current_run||{};$('headline').textContent=`${s.effective_stage||'-'} · ${s.status||'-'}`;$('updated').textContent=`갱신 ${d.updated_at||'-'} · 기존 Secret 제거 허용 ${s.legacy_secret_removal_allowed?'예':'아니오'}`;$('kpis').innerHTML=[['현재 실행',s.run_passed?'PASS':'HOLD'],['연속 성공',`${s.consecutive_successful_runs||0}/${s.required_consecutive_successful_runs||0}`],['코드 일치율',`${run.operational_code_match_rate_percent||0}%`],['지표 커버리지',`${run.metric_coverage_percent||0}%`],['관리자 승인',s.admin_approval_valid?'완료':'대기']].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');const checks=run.checks||{};$('checks').innerHTML=Object.keys(checks).length?Object.entries(checks).map(([k,v])=>`<div class="row"><span class="badge ${v?'good':'bad'}">${v?'PASS':'HOLD'}</span> <b>${esc(k)}</b></div>`).join(''):'<div class="row sub">Actions 실행 후 검증 결과가 생성됩니다.</div>';$('next').innerHTML=`<b>${esc(d.next_action||'-')}</b><div class="sub">대상 Secret: ${esc((d.legacy_secret_names||[]).join(', '))}</div>`;const h=Array.isArray(d.history)?d.history:[];$('history').innerHTML=h.length?h.slice(0,15).map(x=>`<div class="row"><span class="badge ${x.passed?'good':'warn'}">${x.passed?'PASS':'HOLD'}</span> ${esc(x.checked_at||'-')} · 레코드 ${esc(x.record_count||0)} · 일치율 ${esc(x.operational_code_match_rate_percent||0)}% · 커버리지 ${esc(x.metric_coverage_percent||0)}%</div>`).join(''):'<div class="row sub">검증 이력 없음</div>';}catch(e){$('headline').textContent='상태 파일을 불러오지 못했습니다.';$('updated').textContent='다음 Actions 실행 후 다시 확인하세요.';}})();</script></body></html>
