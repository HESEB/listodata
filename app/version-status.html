<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Version Status | HESEB</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.cols{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:30px;font-weight:850;letter-spacing:-1px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.good{color:var(--good);background:rgba(22,138,91,.08)}.badge.warn{color:var(--warn);background:rgba(193,138,24,.09)}.badge.bad{color:var(--bad);background:rgba(217,60,97,.08)}.badge.blue{color:var(--blue);background:rgba(36,116,216,.08)}.row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid var(--line);padding-top:9px;margin-top:9px}.row:first-child{border-top:none;margin-top:0;padding-top:0}.row b{font-size:13px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:#263b72;background:rgba(255,255,255,.75);border:1px solid var(--line);padding:10px;border-radius:12px;white-space:pre-wrap;overflow:auto;max-height:420px}.section{margin-top:14px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Version Status</h1><div class="sub">버전·빌드시간·데이터 갱신시간·GitHub Actions 상태</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./ux-check.html">UX점검</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 6-4</div><div class="headline">Version Engine 상태 점검</div><div class="sub" id="summaryText">version.json을 불러오는 중...</div></div></div>
  <section class="grid cols" id="kpis"></section>
  <section class="grid cols section">
    <div class="card"><h2>Workflow</h2><div id="workflowBox" class="section"></div></div>
    <div class="card"><h2>Cache Bust 정리</h2><div id="cacheBox" class="section"></div></div>
    <div class="card"><h2>Data Counts</h2><div id="countsBox" class="section"></div></div>
  </section>
  <section class="card section"><h2>Raw version.json</h2><div class="mono section" id="rawBox">불러오는 중...</div></section>
</main>
<script>
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(path){const r=await fetch(path+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(path);return r.json();}
function row(k,v){return `<div class="row"><b>${esc(k)}</b><span>${esc(v??'-')}</span></div>`;}
function kpi(t,v,m,c='blue'){return `<article class="card"><span class="badge ${c}">${esc(t)}</span><div class="kpi">${esc(v??'-')}</div><div class="sub">${esc(m||'')}</div></article>`;}
async function init(){try{const v=await fetchJSON('./data/system/version.json');const wf=v.workflow||{};const dc=v.data_counts||{};document.getElementById('summaryText').textContent=`${v.version||'-'} · ${v.phase||'-'} · ${v.build_time_kst||'-'} · cache ${v.cache_bust||'-'}`;document.getElementById('kpis').innerHTML=[kpi('Version',v.version,'메인 노출 버전','good'),kpi('Build',v.build_time_kst,'빌드시간 KST','blue'),kpi('Data',v.data_updated_at,'데이터 갱신 기준','blue'),kpi('Actions',wf.status||'unknown',wf.name||'-',(wf.status==='success'?'good':'warn'))].join('');document.getElementById('workflowBox').innerHTML=[row('Workflow',wf.name),row('Status',wf.status),row('Run ID',wf.run_id),row('Attempt',wf.run_attempt),row('Actor',wf.actor),row('Branch',wf.branch),row('Commit',wf.commit)].join('');document.getElementById('cacheBox').innerHTML=[row('Cache Bust',v.cache_bust),row('Main iframe','version.json cache_bust 기준'),row('Injected JS','고정 phase 쿼리 제거'),row('Static Version','version-badge.js 자동 치환'),row('No-store fetch','version.json 매번 재확인')].join('');document.getElementById('countsBox').innerHTML=Object.keys(dc).length?Object.entries(dc).map(([k,val])=>row(k,val)).join(''):'<div class="sub">집계 정보 없음</div>';document.getElementById('rawBox').textContent=JSON.stringify(v,null,2);}catch(e){document.getElementById('summaryText').textContent='version.json을 불러오지 못했습니다.';document.getElementById('kpis').innerHTML=kpi('Error','로드 실패',String(e),'bad');document.getElementById('rawBox').textContent=String(e);}}
init();
</script>
</body>
</html>
