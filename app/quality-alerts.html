<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quality Alerts | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2,.card h3{margin:0}.card h2{font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.normal{color:var(--good);background:rgba(22,138,91,.08)}.badge.info{color:var(--blue);background:rgba(36,116,216,.08)}.badge.warning{color:var(--warn);background:rgba(193,138,24,.09)}.badge.critical{color:var(--bad);background:rgba(217,60,97,.08)}.row{border-top:1px solid var(--line);padding:10px 0}.row:first-child{border-top:0}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:#263b72}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.filters select{border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:14px;padding:9px 10px;font-family:inherit}.alert-title{font-size:15px;font-weight:830;margin-top:8px}.memo{font-size:13px;color:rgba(24,34,49,.82);line-height:1.55;margin-top:8px}.action{font-size:12px;color:rgba(24,34,49,.74);line-height:1.5;margin-top:8px;border:1px dashed var(--line);border-radius:14px;padding:9px;background:rgba(255,255,255,.62)}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Quality Alerts</h1><div class="sub">데이터 품질 경고 알림</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./update-stability.html">업데이트 안정성</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 6-3</div><div class="headline">데이터 품질 경고 알림</div><div class="sub" id="updatedAt">품질 경고를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="filters"><select id="severityFilter"><option value="ALL">전체 심각도</option><option value="critical">긴급</option><option value="warning">주의</option><option value="info">참고</option></select><select id="categoryFilter"><option value="ALL">전체 카테고리</option></select></div>
  <section class="grid cols" id="alerts"><div class="empty">불러오는 중...</div></section>
  <section class="card" style="margin-top:12px"><h2>연결 리포트</h2><div class="chips" id="sources"></div></section>
</main>
<script>
const PATH='./data/admin/quality_alerts.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let DATA={alerts:[]};
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['전체경고',s.total_alerts||0],['긴급',s.critical_count||0],['주의',s.warning_count||0],['참고',s.info_count||0],['상태',s.label||'정상']];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function initFilters(){const cats=[...new Set(safeArray(DATA.alerts).map(x=>x.category).filter(Boolean))].sort();$('categoryFilter').innerHTML='<option value="ALL">전체 카테고리</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');['severityFilter','categoryFilter'].forEach(id=>$(id).addEventListener('change',renderAlerts));}
function pass(x){const s=$('severityFilter').value,c=$('categoryFilter').value;if(s!=='ALL'&&x.severity!==s)return false;if(c!=='ALL'&&x.category!==c)return false;return true;}
function renderAlert(x){return `<article class="card"><div><span class="badge ${esc(x.severity)}">${esc(x.severity)}</span> <span class="badge info">${esc(x.category)}</span></div><div class="alert-title">${esc(x.title)}</div><div class="memo">${esc(x.message)}</div><div class="action"><b>권장조치</b><br>${esc(x.recommended_action)}</div><div class="chips"><span class="chip mono">${esc(x.id)}</span><span class="chip">source ${esc(x.source)}</span><span class="chip">metric ${esc(typeof x.metric==='object'?JSON.stringify(x.metric):x.metric??'-')}</span></div></article>`;}
function renderAlerts(){const rows=safeArray(DATA.alerts).filter(pass);$('alerts').innerHTML=rows.map(renderAlert).join('')||'<div class="empty">조건에 맞는 경고가 없습니다.</div>';}
function renderSources(sources){$('sources').innerHTML=Object.entries(sources||{}).map(([k,v])=>`<span class="chip">${esc(k)} · ${esc(v)}</span>`).join('')||'<span class="chip">연결 리포트 없음</span>';}
async function init(){try{DATA=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(DATA.updated_at||'N/A')+' · '+(DATA.policy||'');renderKpis(DATA.summary||{});initFilters();renderAlerts();renderSources(DATA.sources||{});}catch(e){console.error(e);$('alerts').innerHTML='<div class="empty">품질 경고 리포트를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
