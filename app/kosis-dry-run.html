<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS Dry Run</title><style>body{font-family:system-ui;margin:0;background:#f5fafc;color:#182231}main,header{max-width:1100px;margin:auto;padding:16px}.card{background:#fff;border:1px solid #dfe6eb;border-radius:18px;padding:14px;margin-top:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.kpi{font-size:26px;font-weight:800}.sub{font-size:12px;color:#66717d}.row{border-top:1px solid #e4e9ed;padding:10px 0}.row:first-child{border-top:0}.ok{color:#168a5b}.bad{color:#d93c61}a{color:#2474d8}</style></head><body><header><h1>KOSIS 운영 승격 전 Dry Run</h1><div class="sub">응답·코드·단위·기간·중복·값을 시험 검증하며 운영 파일은 변경하지 않습니다.</div><a href="./kosis-approved-mapping-comparison.html">승인 매핑 비교</a> · <a href="./kosis-mapping-promotion.html">운영 승격</a></header><main><div id="updated" class="card">불러오는 중...</div><div id="kpis" class="grid"></div><div class="card"><h2>통계표별 결과</h2><div id="rows"></div></div></main><script>const g=id=>document.getElementById(id);fetch('./data/admin/kosis_dry_run.json?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>{const s=d.summary||{};g('updated').textContent=(d.updated_at||'-')+' · '+(s.status||'-');g('kpis').innerHTML=[['대상 표',s.table_count||0],['검증 표',s.tested_table_count||0],['통과',s.passed_table_count||0],['실패',s.failed_table_count||0]].map(x=>'<div class="card"><div class="sub">'+x[0]+'</div><div class="kpi">'+x[1]+'</div></div>').join('');g('rows').innerHTML=(d.tables||[]).map(x=>'<div class="row"><b>'+String(x.connection_id||'')+'</b> <span class="'+(x.passed?'ok':'bad')+'">'+(x.passed?'통과':'실패')+'</span><div class="sub">응답 '+(x.row_count||0)+'행</div></div>').join('')||'<div class="sub">Dry Run 실행 전입니다.</div>'}).catch(()=>g('updated').textContent='상태를 불러오지 못했습니다.');</script></body></html>
