<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freshness Alerts | HESEB Admin</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.94);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--shadow:0 14px 34px rgba(18,28,40,.10);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.93);backdrop-filter:blur(9px);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.45}.btn{display:inline-flex;border:1px solid var(--line);background:rgba(255,255,255,.82);padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px;cursor:pointer}.hero{background:linear-gradient(160deg,rgba(241,133,174,.25),rgba(248,184,113,.20),rgba(165,115,237,.18),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow)}.eyebrow{font-size:12px;color:var(--sub);margin-bottom:5px}.headline{font-size:24px;line-height:1.35;font-weight:780;letter-spacing:-.7px}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.card h2{margin:0;font-size:17px}.kpi{font-size:28px;font-weight:850;letter-spacing:-.8px}.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;background:rgba(255,255,255,.72);white-space:nowrap}.badge.ok,.badge.fresh{color:var(--good);background:rgba(22,138,91,.08)}.badge.warning{color:var(--warn);background:rgba(193,138,24,.09)}.badge.critical{color:var(--bad);background:rgba(217,60,97,.08)}.badge.blue{color:var(--blue);background:rgba(36,116,216,.08)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035);color:var(--sub)}.memo{font-size:13px;color:rgba(24,34,49,.82);line-height:1.55;margin-top:8px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.82);cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(90deg,rgba(241,133,174,.20),rgba(107,178,255,.18));font-weight:760}.panel{display:none}.panel.active{display:block}.empty{padding:22px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.62)}@media(max-width:620px){.brand{display:block}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Freshness Alerts</h1><div class="sub">데이터 최신성 경고</div></div><div><a class="btn" href="./admin.html">Admin</a> <a class="btn" href="./quality-alerts.html">품질 경고</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="eyebrow">Phase 6-7</div><div class="headline">데이터 최신성 경고 기준 강화</div><div class="sub" id="updatedAt">최신성 리포트를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <div class="tabs"><button class="tab active" data-panel="alerts">경고</button><button class="tab" data-panel="files">파일</button><button class="tab" data-panel="species">축종</button><button class="tab" data-panel="sources">소스</button></div>
  <section id="panel-alerts" class="panel active"><div class="grid cols" id="alerts"><div class="empty">불러오는 중...</div></div></section>
  <section id="panel-files" class="panel"><div class="grid cols" id="files"></div></section>
  <section id="panel-species" class="panel"><div class="grid cols" id="species"></div></section>
  <section id="panel-sources" class="panel"><div class="grid cols" id="sources"></div></section>
</main>
<script>
const PATH='./data/admin/freshness_alerts.json';
const $=id=>document.getElementById(id);const safeArray=x=>Array.isArray(x)?x:[];const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function fetchJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function renderKpis(s){const items=[['상태',s.label||'-'],['전체경고',s.alert_count||0],['위험',s.critical_count||0],['주의',s.warning_count||0],['파일',s.file_count||0],['축종',s.species_count||0],['소스',s.source_count||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function card(title,status,memo,chips){return `<article class="card"><div><span class="badge ${esc(status||'ok')}">${esc(status||'ok')}</span></div><h2 style="margin-top:8px">${esc(title)}</h2><div class="memo">${esc(memo||'')}</div><div class="chips">${(chips||[]).map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div></article>`;}
function bindTabs(){document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+btn.dataset.panel));}));}
async function init(){try{const data=await fetchJSON(PATH);$('updatedAt').textContent='갱신 '+(data.updated_at||'N/A')+' · '+(data.policy||'');renderKpis(data.summary||{});$('alerts').innerHTML=safeArray(data.alerts).map(x=>card(x.title,x.severity,x.message,[x.category,x.target,x.recommended_action])).join('')||'<div class="empty">최신성 경고 없음</div>';$('files').innerHTML=safeArray(data.files).map(x=>card(x.label,x.status,(x.issues||[]).join(' / ')||'정상',[x.path,`age ${x.age_hours??'-'}h`,`기준 ${x.threshold_hours}h`])).join('');$('species').innerHTML=safeArray(data.species).map(x=>card(x.label,x.status,(x.issues||[]).join(' / ')||'정상',[`자료 ${x.item_count}`,`age ${x.age_hours??'-'}h`,`기준 ${x.threshold_hours}h`])).join('');$('sources').innerHTML=safeArray(data.sources).map(x=>card(x.source,x.status,(x.issues||[]).join(' / ')||'정상',[x.registered?'등록':'미등록',`clean ${x.clean_count}`,`official ${x.official_count}`,x.health_grade||'-'])).join('');bindTabs();}catch(e){console.error(e);$('alerts').innerHTML='<div class="empty">최신성 리포트를 불러오지 못했습니다. 다음 자동 업데이트 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
