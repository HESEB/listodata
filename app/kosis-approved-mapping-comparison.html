<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KOSIS 승인 매핑 비교 | HESEB</title><style>:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif}.top,main{max-width:1240px;margin:auto;padding:14px}header{position:sticky;top:0;background:rgba(245,250,252,.95);border-bottom:1px solid var(--line);z-index:5}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--text);text-decoration:none;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(5,1fr)}@media(max-width:800px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:27px;font-weight:820}.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}.tab{cursor:pointer}.row{border-top:1px solid var(--line);padding:11px 0}.row:first-child{border-top:0}.head{display:flex;justify-content:space-between;gap:10px}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.mono{font-family:ui-monospace,monospace;font-size:11px;white-space:pre-wrap;word-break:break-all}.empty{padding:20px;text-align:center;border:1px dashed var(--line);border-radius:16px;color:var(--sub)}</style></head><body><header><div class="top"><div class="brand"><div><h1>KOSIS 승인 매핑 생성·비교</h1><div class="sub">원본 템플릿·이전 승인본·운영 매핑과 지표별 차이를 확인합니다.</div></div><div><a class="btn" href="./kosis-approval-precheck.html">승인 사전점검</a> <a class="btn" href="./kosis-mapping-promotion.html">운영 승격</a></div></div></div></header><main><div class="hero"><div><div class="sub">Phase 10-7</div><div class="headline">승인 매핑 변경사항을 운영 승격 전에 확인</div><div class="sub" id="updated">상태를 불러오는 중...</div></div></div><section class="grid kpis" id="kpis"></section><section class="card" style="margin-top:12px"><div class="tabs"><button class="btn tab" data-base="template">원본 템플릿 대비</button><button class="btn tab" data-base="previous_approved">이전 승인본 대비</button><button class="btn tab" data-base="operational">운영 매핑 대비</button></div><div id="rows"></div></section></main><script>const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let D=null;async function get(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(p);return r.json()}function cls(t){return t==='unchanged'?'good':t==='removed'?'bad':'warn'}function render(base){const rows=D?.comparisons?.[base]||[];$('rows').innerHTML=rows.length?rows.map(x=>`<div class="row"><div class="head"><b>${esc(x.metric_id)}</b><span class="badge ${cls(x.change_type)}">${esc(x.change_type)}</span></div><div class="sub">변경 필드: ${esc((x.changed_fields||[]).join(', ')||'없음')}</div><details><summary class="sub">세부 비교</summary><div class="mono">이전 ${esc(JSON.stringify(x.before,null,2))}\n신규 ${esc(JSON.stringify(x.after,null,2))}</div></details></div>`).join(''):'<div class="empty">비교할 지표가 없습니다.</div>'}get('./data/admin/kosis_approved_mapping_comparison.json').then(d=>{D=d;const s=d.summary||{};$('updated').textContent=`${d.updated_at||'-'} · ${s.status||'-'}`;$('kpis').innerHTML=[['승인 지표',s.approved_metric_count||0],['미해결',s.unresolved_metric_count||0],['템플릿 변경',s.changed_from_template_count||0],['이전본 변경',s.changed_from_previous_count||0],['운영본 차이',s.operational_difference_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${a}</div><div class="kpi">${b}</div></div>`).join('');render('template');document.querySelectorAll('[data-base]').forEach(b=>b.onclick=()=>render(b.dataset.base))}).catch(()=>{$('updated').textContent='상태를 불러오지 못했습니다.';$('rows').innerHTML='<div class="empty">Workflow 실행 후 확인하세요.</div>'});</script></body></html>
