<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Direction Engine 2.0 | HESEB DSS</title>
  <style>
    :root{--bg:#f5fafc;--card:rgba(255,255,255,.95);--line:rgba(20,30,40,.09);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61;--blue:#2474d8}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{position:sticky;top:0;z-index:10;background:rgba(245,250,252,.94);border-bottom:1px solid var(--line)}.top,main{max-width:1180px;margin:0 auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:18px}.sub,.small{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;border:1px solid var(--line);background:white;padding:8px 12px;border-radius:999px;text-decoration:none;color:var(--text);font-size:12px}.hero{background:linear-gradient(160deg,rgba(241,133,174,.24),rgba(248,184,113,.20),rgba(165,115,237,.17),rgba(107,178,255,.18));padding:14px;border-radius:26px;margin-bottom:14px}.hero-inner{background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:22px;padding:16px}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.cols{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}.card{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.kpi{font-size:28px;font-weight:850}.direction{font-size:26px;font-weight:850;margin-top:7px}.badge{display:inline-flex;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px}.hold{color:var(--warn);background:rgba(193,138,24,.09)}.ready{color:var(--good);background:rgba(22,138,91,.08)}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(0,0,0,.035)}.bar{height:9px;background:rgba(20,30,40,.07);border-radius:99px;overflow:hidden;margin-top:7px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#F185AE,#F8B871,#A573ED,#6BB2FF)}.memo{font-size:13px;line-height:1.55;margin-top:8px}.table{width:100%;border-collapse:separate;border-spacing:0 7px}.table td,.table th{font-size:11px;text-align:left;padding:8px}.table td{background:rgba(255,255,255,.75);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.empty{padding:24px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:18px}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>Direction Engine 2.0</h1><div class="sub">공식 데이터 기반 시장 방향성 계산</div></div><div><a class="btn" href="./main.html">Dashboard</a> <a class="btn" href="./official-data-quality.html">Data Quality</a></div></div></div></header>
<main>
  <div class="hero"><div class="hero-inner"><div class="small">Phase 7-4</div><div class="headline">뉴스가 아니라 공식 수치로 방향을 계산합니다.</div><div class="sub" id="updatedAt">결과를 불러오는 중...</div></div></div>
  <section class="grid kpis" id="kpis"></section>
  <section class="grid cols" id="cards"><div class="empty">불러오는 중...</div></section>
</main>
<script>
const PATH='./data/admin/direction_engine_v2.json';const $=id=>document.getElementById(id);const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const arr=x=>Array.isArray(x)?x:[];
async function getJSON(p){const r=await fetch(p+'?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(p);return r.json();}
function kpis(s){const items=[['상태',s.status||'-'],['판단 가능',s.ready_count||0],['판단 유보',s.hold_count||0],['평균 신뢰도',s.average_confidence||0],['평균 커버리지',s.average_coverage||0]];$('kpis').innerHTML=items.map(([a,b])=>`<div class="card"><div class="small">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');}
function card(x){const hold=x.decision_status!=='ready';const stars='★'.repeat(Number(x.confidence_stars)||0)+'☆'.repeat(Math.max(0,5-(Number(x.confidence_stars)||0)));const cats=Object.entries(x.category_scores||{}).map(([k,v])=>`<span class="chip">${esc(k)} ${esc(v)}</span>`).join('');const tops=arr(x.top_signals).map(y=>`<tr><td>${esc(y.name)}</td><td>${esc(y.adjusted_signal)}</td><td>${esc(y.quality_score)}</td></tr>`).join('');return `<article class="card"><span class="badge ${hold?'hold':'ready'}">${hold?'판단 유보':'판단 가능'}</span><h2>${esc(x.label)}</h2><div class="direction">${esc(x.direction_symbol)} ${esc(x.direction_label)}</div><div class="small">원점수 ${esc(x.raw_score)} · 신뢰도 ${esc(x.confidence_score)} · ${stars}</div><div class="bar"><i style="width:${Math.max(0,Math.min(100,Number(x.confidence_score)||0))}%"></i></div><div class="chips"><span class="chip">Coverage ${esc(x.coverage_score)}%</span><span class="chip">사용지표 ${esc(x.usable_indicator_count)}/${esc(x.required_indicator_count)}</span><span class="chip">일관성 ${esc(x.indicator_consistency)}</span>${cats}</div>${arr(x.hold_reasons).length?`<div class="memo"><b>유보 사유</b><br>${esc(x.hold_reasons.join(' / '))}</div>`:''}${tops?`<table class="table"><thead><tr><th>핵심지표</th><th>방향기여</th><th>품질</th></tr></thead><tbody>${tops}</tbody></table>`:''}</article>`;}
async function init(){try{const d=await getJSON(PATH);$('updatedAt').textContent='갱신 '+(d.updated_at||'-')+' · '+(d.policy||'');kpis(d.summary||{});$('cards').innerHTML=arr(d.species).map(card).join('')||'<div class="empty">결과 없음</div>';}catch(e){$('cards').innerHTML='<div class="empty">Direction Engine 결과가 아직 없습니다. Actions 실행 후 확인하세요.</div>';}}
init();
</script>
</body>
</html>
