<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>원문 게시일 수집 강화 | HESEB</title>
<style>
:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{border-bottom:1px solid var(--line);background:rgba(245,250,252,.95);position:sticky;top:0}.top,main{max-width:1100px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--text);background:#fff;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(5,1fr)}@media(max-width:800px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:27px;font-weight:820}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.row{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.empty{padding:20px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:16px}
</style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>원문 JSON-LD·OpenGraph 게시일 수집</h1><div class="sub">원문 메타데이터 게시일 후보 수집 상태</div></div><div><a class="btn" href="./representative-news-date-review.html">날짜 검수</a> <a class="btn" href="./admin2-dashboard.html">Admin 2.0</a></div></div></div></header>
<main>
<div class="hero"><div><div class="sub">Phase 8-9</div><div class="headline">원문 게시일은 수집하되 자동 확정하지 않습니다.</div><div class="sub" id="updated">상태를 불러오는 중...</div></div></div>
<section class="grid kpis" id="kpis"></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">수집 우선순위</h2><div class="sub" style="margin-top:8px">JSON-LD datePublished/dateCreated → OpenGraph article:published_time → 일반 meta 게시일 → time 태그 datetime. 원문 접근 실패·차단·비HTML 응답은 전체 업데이트 실패로 처리하지 않습니다.</div></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">최근 실패</h2><div id="failures" style="margin-top:10px"><div class="empty">불러오는 중...</div></div></section>
</main>
<script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
(async()=>{try{const r=await fetch('./data/admin/original_news_date_enrichment.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{};$('updated').textContent=`갱신 ${d.updated_at||'Actions 실행 전'} · 자동 적용 ${s.auto_applied_count||0}건`;$('kpis').innerHTML=[['원문 확인',s.processed_count||0],['날짜 발견',s.enriched_count||0],['실패',s.failed_count||0],['건너뜀',s.skipped_count||0],['자동 적용',s.auto_applied_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');const f=Array.isArray(d.failures)?d.failures:[];$('failures').innerHTML=f.length?f.slice(0,30).map(x=>`<div class="row"><b>${esc(x.event_id||'-')}</b><div class="sub">${esc(x.error||'-')}</div></div>`).join(''):'<div class="empty">기록된 실패 없음</div>';}catch(e){$('updated').textContent='다음 Actions 실행 후 확인하세요.';$('failures').innerHTML='<div class="empty">상태 파일을 불러오지 못했습니다.</div>';}})();
</script>
</body>
</html>
