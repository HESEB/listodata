<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>원문 게시일 수집 상태 | HESEB</title>
<style>
:root{--bg:#f5fafc;--card:#fff;--line:rgba(20,30,40,.1);--text:#182231;--sub:rgba(24,34,49,.68);--good:#168a5b;--warn:#c18a18;--bad:#d93c61}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}header{border-bottom:1px solid var(--line);background:rgba(245,250,252,.95);position:sticky;top:0;z-index:5}.top,main{max-width:1180px;margin:auto;padding:14px}.brand{display:flex;justify-content:space-between;gap:12px}.brand h1{margin:0;font-size:19px}.sub{font-size:12px;color:var(--sub);line-height:1.5}.btn{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--text);background:#fff;font-size:12px}.hero{padding:14px;border-radius:25px;background:linear-gradient(150deg,rgba(241,133,174,.2),rgba(107,178,255,.18));margin-bottom:14px}.hero>div,.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 10px 24px rgba(18,28,40,.07)}.headline{font-size:24px;font-weight:800}.grid{display:grid;gap:12px}.kpis{grid-template-columns:repeat(6,1fr)}.cols{grid-template-columns:repeat(2,minmax(0,1fr))}@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.cols{grid-template-columns:1fr}}@media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.brand{display:block}}.kpi{font-size:26px;font-weight:820}.badge{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px}.healthy,.good{color:var(--good)}.warning,.warn,.insufficient_data{color:var(--warn)}.critical,.bad{color:var(--bad)}.row{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.row:first-child{border-top:0;margin-top:0;padding-top:0}.publisher-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}.metric{border:1px solid var(--line);border-radius:12px;padding:8px}.empty{padding:20px;text-align:center;color:var(--sub);border:1px dashed var(--line);border-radius:16px}code{font-size:11px;background:rgba(0,0,0,.05);padding:2px 5px;border-radius:6px}
</style>
</head>
<body>
<header><div class="top"><div class="brand"><div><h1>원문 게시일 수집 성공률</h1><div class="sub">언론사별 접근 성공률·날짜 발견률·예외 규칙 상태</div></div><div><a class="btn" href="./representative-news-date-review.html">날짜 검수</a> <a class="btn" href="https://github.com/HESEB/listodata/edit/main/app/data/config/original_news_publisher_exceptions.json" target="_blank" rel="noopener">예외 규칙 편집</a></div></div></div></header>
<main>
<div class="hero"><div><div class="sub">Phase 8-10</div><div class="headline">접근 실패와 날짜 미발견을 분리해 언론사별로 관리합니다.</div><div class="sub" id="updated">상태를 불러오는 중...</div></div></div>
<section class="grid kpis" id="kpis"></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">언론사별 상태</h2><div class="sub" style="margin-top:5px">표본 3건 미만은 insufficient_data로 표시합니다. 예외 규칙은 공개 페이지의 비표준 메타태그·User-Agent·canonical 차이만 보정합니다.</div><div id="publishers" class="grid cols" style="margin-top:12px"><div class="empty">불러오는 중...</div></div></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">실패 유형</h2><div id="failureTypes" style="margin-top:10px"></div></section>
<section class="card" style="margin-top:12px"><h2 style="margin:0;font-size:17px">최근 실패</h2><div id="failures" style="margin-top:10px"><div class="empty">불러오는 중...</div></div></section>
</main>
<script>
const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function publisherCard(x){const cats=Object.entries(x.failure_categories||{});return `<article class="card"><div class="publisher-head"><div><b>${esc(x.publisher||x.publisher_key||'-')}</b><div class="sub">${esc(x.domain||x.publisher_key||'-')} · 시도 ${esc(x.attempted_count||0)}건</div></div><span class="badge ${esc(x.health_status||'insufficient_data')}">${esc(x.health_status||'insufficient_data')}</span></div><div class="metrics"><div class="metric"><div class="sub">접근 성공률</div><b>${esc(x.access_success_rate||0)}%</b></div><div class="metric"><div class="sub">날짜 발견률</div><b>${esc(x.date_found_rate||0)}%</b></div><div class="metric"><div class="sub">접근 후 발견률</div><b>${esc(x.date_found_rate_given_access||0)}%</b></div></div><div class="sub" style="margin-top:8px">성공 ${esc(x.access_success_count||0)} · 발견 ${esc(x.date_found_count||0)} · 메타 없음 ${esc(x.metadata_not_found_count||0)} · 실패 ${esc(x.failed_count||0)}</div>${(x.exception_ids||[]).length?`<div class="sub" style="margin-top:5px">예외 적용: ${(x.exception_ids||[]).map(esc).join(', ')}</div>`:''}${cats.length?`<div class="sub" style="margin-top:5px">실패 유형: ${cats.map(([k,v])=>`${esc(k)} ${esc(v)}`).join(' · ')}</div>`:''}</article>`;}
(async()=>{try{const r=await fetch('./data/admin/original_news_date_enrichment.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw Error(r.status);const d=await r.json(),s=d.summary||{};$('updated').textContent=`갱신 ${d.updated_at||'Actions 실행 전'} · 자동 적용 ${s.auto_applied_count||0}건 · 예외 적용 언론사 ${s.exception_applied_count||0}개`;$('kpis').innerHTML=[['원문 확인',s.processed_count||0],['접근 성공률',(s.access_success_rate||0)+'%'],['날짜 발견률',(s.date_found_rate||0)+'%'],['언론사',s.publisher_count||0],['주의·위험',(s.warning_publisher_count||0)+(s.critical_publisher_count||0)],['실패',s.failed_count||0]].map(([a,b])=>`<div class="card"><div class="sub">${esc(a)}</div><div class="kpi">${esc(b)}</div></div>`).join('');const p=Array.isArray(d.publishers)?d.publishers:[];$('publishers').innerHTML=p.length?p.map(publisherCard).join(''):'<div class="empty">Actions 실행 후 언론사별 결과가 표시됩니다.</div>';const fc=Object.entries(s.failure_category_counts||{});$('failureTypes').innerHTML=fc.length?fc.map(([k,v])=>`<span class="badge ${k==='metadata_not_found'?'warn':'bad'}" style="margin:3px">${esc(k)} ${esc(v)}건</span>`).join(''):'<div class="empty">집계된 실패 유형 없음</div>';const f=Array.isArray(d.failures)?d.failures:[];$('failures').innerHTML=f.length?f.slice(0,40).map(x=>`<div class="row"><b>${esc(x.publisher||x.domain||x.event_id||'-')}</b> <span class="badge bad">${esc(x.failure_category||'error')}</span><div class="sub">HTTP ${esc(x.http_status||'-')} · ${esc(x.error||'-')}</div>${x.exception_id?`<div class="sub">예외 ${esc(x.exception_id)}</div>`:''}</div>`).join(''):'<div class="empty">기록된 접근 실패 없음</div>';}catch(e){$('updated').textContent='다음 Actions 실행 후 확인하세요.';$('publishers').innerHTML='<div class="empty">상태 파일을 불러오지 못했습니다.</div>';}})();
</script>
</body>
</html>
